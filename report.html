<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC Reports — Yearly Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--c1:#b45309;--c2:#d97706;--c3:#f59e0b}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.water-ripple{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(245,158,11,0.012) 2px,rgba(245,158,11,0.012) 4px);animation:rippleShift 10s linear infinite}
@keyframes rippleShift{0%{background-position:0 0}100%{background-position:0 80px}}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--amber);opacity:0;animation:fp var(--d,6s) var(--dl,0s) infinite ease-in}
@keyframes fp{0%{opacity:0;transform:translateY(0)}10%{opacity:.45}90%{opacity:.1}100%{opacity:0;transform:translateY(-115vh)}}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 28px 6px;border-bottom:1px solid rgba(245,158,11,0.2);background:linear-gradient(180deg,rgba(12,7,0,0.97) 0%,rgba(12,7,0,0.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,2.5vw,38px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);flex-shrink:0;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-back{display:flex;align-items:center;gap:6px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-back:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 28px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite;flex-shrink:0}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:80px 24px 60px;display:flex;align-items:flex-start;justify-content:center}
.card{background:rgba(15,10,3,0.92);border:1px solid rgba(245,158,11,0.22);border-radius:12px;box-shadow:0 8px 48px rgba(0,0,0,.6);width:100%;max-width:780px;overflow:hidden;backdrop-filter:blur(10px);animation:fadeUp .6s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-header{background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 50%,var(--c3) 100%);padding:20px 28px 16px;position:relative;overflow:hidden;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.card-header::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.05)}
.hdr-scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(180deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px)}
.header-label-input{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,0.3);color:rgba(255,255,255,0.65);text-align:center;outline:none;width:240px;margin-bottom:4px;position:relative;z-index:1;padding:1px 4px}
.card-header h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:5px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;line-height:1.1}
.title-input{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:5px;background:transparent;border:none;border-bottom:2px dashed rgba(255,255,255,0.3);color:white;text-align:center;outline:none;padding:0 4px;width:340px}
.title-input:focus{border-bottom-color:rgba(255,255,255,0.8)}
.header-meta{display:flex;gap:20px;margin-top:12px;position:relative;z-index:1;justify-content:center}
.meta-item{display:flex;flex-direction:column;gap:3px;align-items:center}
.meta-label-input{font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,0.25);color:rgba(255,255,255,0.55);text-align:center;outline:none;width:100px;padding:1px 2px}
.meta-input{background:rgba(0,0,0,0.25);border:1.5px solid rgba(255,255,255,0.25);border-radius:4px;color:white;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;text-align:center;outline:none;padding:3px 10px;width:140px;letter-spacing:1px}
.meta-input:focus{background:rgba(0,0,0,0.35);border-color:rgba(255,255,255,0.6)}
.card-body{padding:18px 24px 16px}
.section-label{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:transparent;border:none;border-bottom:1px dashed rgba(245,158,11,0.35);color:var(--amber);outline:none;padding:1px 2px;width:140px}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.action-btn{border:1px solid rgba(245,158,11,.3);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.btn-amber{background:rgba(245,158,11,.1);color:var(--amber-light)}
.btn-amber:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
#photo-upload{display:none}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.3),transparent);margin:14px 0}
.image-wrap{border-radius:8px;border:1px solid rgba(245,158,11,0.18);margin-bottom:10px;background:rgba(245,158,11,0.03);display:flex;align-items:center;justify-content:center;padding:12px;min-height:120px}
.image-inner{border-radius:6px;overflow:hidden;width:100%;display:flex;align-items:center;justify-content:center;position:relative}
.image-inner:hover .img-overlay{opacity:1}
.img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;border-radius:6px;pointer-events:none}
.img-overlay span{color:white;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:rgba(0,0,0,0.4);padding:5px 14px;border-radius:20px}
.image-wrap img{max-width:100%;max-height:200px;height:auto;display:block;border-radius:5px;cursor:pointer}
.placeholder-img{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:rgba(245,158,11,0.4);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;min-height:100px;width:100%;cursor:pointer}
.placeholder-img svg{width:36px;height:36px}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:absolute;top:20px;right:24px;color:rgba(245,158,11,0.7);font-size:28px;cursor:pointer;font-family:'Rajdhani',sans-serif}
.table-wrap{display:flex;justify-content:center;overflow-x:auto}
table{border-collapse:collapse;font-size:12px;width:auto;min-width:100%}
thead tr{background:linear-gradient(90deg,var(--c1),var(--c2));-webkit-print-color-adjust:exact;print-color-adjust:exact}
thead th{color:rgba(255,255,255,0.9);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;text-align:center;white-space:nowrap}
thead th:first-child{border-radius:6px 0 0 6px;padding-left:14px}
thead th:last-child{border-radius:0 6px 6px 0;padding-right:14px}
.col-header-input{background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,0.35);color:white;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;outline:none;width:60px;padding:1px 2px}
tbody tr{border-bottom:1px solid rgba(245,158,11,0.1)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(245,158,11,0.04)}
tbody td{padding:7px 10px;text-align:center;color:#fef3c7}
tbody td:first-child{padding-left:14px}
.point-label-input{background:transparent;border:none;border-bottom:1px dashed rgba(245,158,11,0.3);color:var(--amber);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;text-align:center;outline:none;width:42px;padding:1px 2px}
.reading-input{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;width:60px;text-align:center;outline:none;padding:4px 6px;transition:all .2s}
.reading-input:focus{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.5);color:white}
.table-controls-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
.ctrl-pill{display:flex;align-items:center;gap:4px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.18);border-radius:20px;padding:3px 12px 3px 10px}
.ctrl-pill-label{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;color:var(--amber);letter-spacing:2px;text-transform:uppercase}
.ctrl-pill-divider{width:1px;height:12px;background:rgba(245,158,11,0.2);margin:0 3px}
.cp-btn{background:none;border:none;cursor:pointer;color:var(--amber);font-size:16px;font-weight:700;line-height:1;padding:0 4px;font-family:'Rajdhani',sans-serif}
.card-footer{padding:10px 24px;background:rgba(245,158,11,0.04);border-top:1px solid rgba(245,158,11,0.12);display:flex;justify-content:space-between;align-items:center;gap:12px}
.footer-input{background:transparent;border:none;border-bottom:1px dashed rgba(245,158,11,0.25);color:rgba(245,158,11,0.5);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;outline:none;padding:1px 2px;min-width:60px;flex:1}
.footer-input:focus{color:rgba(245,158,11,0.8)}
#save-btn-wrap{position:fixed;bottom:28px;right:24px;z-index:300}
.save-btn{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.35);color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border-radius:4px;cursor:pointer;transition:all .2s}
.save-btn:hover{background:rgba(245,158,11,0.22);border-color:var(--amber);color:#fff}
@media print{.water-bg,.water-ripple,.particles,.scanlines,.topbar,.statusbar,#save-btn-wrap,.action-btn,.table-controls-row,.img-overlay,.lightbox{display:none!important}.title-input,.meta-label-input,.header-label-input,.section-label,.point-label-input,.footer-input,.col-header-input{border-bottom:none!important}}
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="water-ripple"></div>
<div class="particles" id="pts"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
<script>setTimeout(function(){var o=document.getElementById('cloud-overlay');if(o)o.style.display='none';},4000);</script>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Loading report...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Building Reports</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <a class="tb-back" id="back-btn" href="reports.html">Back</a>
  </div>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="hdr-scan"></div>
      <div style="position:relative;z-index:1;margin-bottom:3px">
        <input class="header-label-input" id="hl" type="text" placeholder="ANNUAL REPORT"/>
      </div>
      <h1><input class="title-input" id="t1" type="text" placeholder="MULTI YEAR TRACKER"/></h1>
      <div class="header-meta">
        <div class="meta-item">
          <input class="meta-label-input" id="ml2" type="text" placeholder="DATE"/>
          <input class="meta-input" id="mv2" type="text" placeholder="e.g. March 2026"/>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="row-between">
        <input class="section-label" id="img-label" type="text" placeholder="REFERENCE IMAGE"/>
        <button class="action-btn btn-amber" onclick="document.getElementById('photo-upload').click()">Change Image</button>
        <input type="file" id="photo-upload" accept="image/*" onchange="swapPhoto(event)"/>
      </div>
      <div class="image-wrap">
        <div class="image-inner">
          <div class="placeholder-img" id="placeholder" onclick="document.getElementById('photo-upload').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Click to upload an image
          </div>
          <img id="main-img" src="" alt="" style="display:none" onclick="openLightbox()"/>
          <div class="img-overlay"><span>Enlarge</span></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="row-between" style="margin-bottom:10px">
        <input class="section-label" id="table-label" type="text" placeholder="DATA READINGS"/>
      </div>
      <div class="table-wrap">
        <table id="data-table">
          <thead>
            <tr id="header-row">
              <th><input class="col-header-input" type="text" placeholder="Label" style="width:42px"/></th>
              <th><input class="col-header-input" type="text" placeholder="Year 1"/></th>
              <th><input class="col-header-input" type="text" placeholder="Year 2"/></th>
              <th><input class="col-header-input" type="text" placeholder="Year 3"/></th>
              <th><input class="col-header-input" type="text" placeholder="Year 4"/></th>
              <th><input class="col-header-input" type="text" placeholder="Year 5"/></th>
            </tr>
          </thead>
          <tbody id="readings-body">
            <tr><td><input class="point-label-input" type="text" value="1"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="2"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="3"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="4"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="5"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="6"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="7"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
            <tr><td><input class="point-label-input" type="text" value="8"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td><td><input class="reading-input" type="text" placeholder="-"/></td></tr>
          </tbody>
        </table>
      </div>
      <div class="table-controls-row">
        <div class="ctrl-pill"><span class="ctrl-pill-label">Rows</span><div class="ctrl-pill-divider"></div><button class="cp-btn" onclick="removeRow()">-</button><button class="cp-btn" onclick="addRow()">+</button></div>
        <div class="ctrl-pill"><span class="ctrl-pill-label">Cols</span><div class="ctrl-pill-divider"></div><button class="cp-btn" onclick="removeCol()">-</button><button class="cp-btn" onclick="addCol()">+</button></div>
      </div>
    </div>
    <div class="card-footer">
      <input class="footer-input" id="fl" type="text" placeholder="Location - Date"/>
      <input class="footer-input" id="fr" type="text" placeholder="Report Title" style="text-align:right"/>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">x</span>
  <img id="lightbox-img" src="" alt=""/>
</div>

<div id="save-btn-wrap">
  <button class="save-btn" onclick="savePage()">Save As File</button>
</div>

<div class="statusbar">
  <div class="sdot"></div><span>System Online</span><span>.</span><span>MHAC Yearly Report</span>
  <div class="wfall"><div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div><div class="wb" style="--d:.9s"></div></div>
</div>

<script>
const SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
const SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
const SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};
async function sbGet(k){try{const r=await fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',{headers:SB_H});if(!r.ok)throw 0;const d=await r.json();return d.length?d[0].value:null;}catch(e){return null;}}
async function sbSet(k,v){try{await fetch(SB_URL+'/rest/v1/app_data',{method:'POST',headers:Object.assign({},SB_H,{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})});}catch(e){}}

function swapPhoto(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=document.getElementById('main-img'),ph=document.getElementById('placeholder');
    img.src=e.target.result;img.style.display='block';ph.style.display='none';
    document.getElementById('lightbox-img').src=e.target.result;
  };reader.readAsDataURL(file);
}
function openLightbox(){var img=document.getElementById('main-img');if(!img.src||img.style.display==='none')return;document.getElementById('lightbox').classList.add('active');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active')}

function getColCount(){return document.querySelectorAll('#header-row th').length-1}
function getRowCount(){return document.querySelectorAll('#readings-body tr').length}
function addRow(){
  var tbody=document.getElementById('readings-body'),n=getRowCount()+1,cols=getColCount();
  var tr=document.createElement('tr');
  var cells='<td><input class="point-label-input" type="text" value="'+n+'"/></td>';
  for(var i=0;i<cols;i++) cells+='<td><input class="reading-input" type="text" placeholder="-"/></td>';
  tr.innerHTML=cells;tbody.appendChild(tr);
}
function removeRow(){var tbody=document.getElementById('readings-body');if(tbody.rows.length>1)tbody.deleteRow(tbody.rows.length-1)}
function addCol(){
  var n=getColCount()+1,headerRow=document.getElementById('header-row');
  var th=document.createElement('th');th.innerHTML='<input class="col-header-input" type="text" placeholder="Year '+n+'"/>';
  headerRow.appendChild(th);
  document.querySelectorAll('#readings-body tr').forEach(function(tr){var td=document.createElement('td');td.innerHTML='<input class="reading-input" type="text" placeholder="-"/>';tr.appendChild(td);});
}
function removeCol(){
  var headerRow=document.getElementById('header-row');if(headerRow.cells.length<=2)return;
  headerRow.deleteCell(headerRow.cells.length-1);
  document.querySelectorAll('#readings-body tr').forEach(function(tr){if(tr.cells.length>1)tr.deleteCell(tr.cells.length-1);});
}

function savePage(){
  var docCopy=document.documentElement.cloneNode(true);
  var liveInputs=document.querySelectorAll('input,textarea'),cloneInputs=docCopy.querySelectorAll('input,textarea');
  liveInputs.forEach(function(input,i){if(!cloneInputs[i])return;cloneInputs[i].setAttribute('value',input.value);});
  var img=document.getElementById('main-img'),cloneImg=docCopy.getElementById('main-img');
  if(img&&img.src&&img.src.startsWith('data:')&&cloneImg){cloneImg.setAttribute('src',img.src);cloneImg.style.display='block';var ph=docCopy.getElementById('placeholder');if(ph)ph.style.display='none';}
  var blob=new Blob([docCopy.outerHTML],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mhac-report.html';a.click();
}

(function(){var c=document.getElementById('pts');for(var i=0;i<30;i++){var p=document.createElement('div');p.className='p';p.style.cssText='left:'+Math.random()*100+'%;bottom:'+Math.random()*12+'%;--d:'+(5+Math.random()*9)+'s;--dl:'+Math.random()*12+'s';c.appendChild(p);}})();

(async function(){
  var params=new URLSearchParams(window.location.search);
  var reportId=params.get('id');
  var reportName=params.get('name')||'Report';
  var level=params.get('level')||'1';
  var zone=params.get('zone')||'';
  document.getElementById('back-btn').href='reports.html?level='+level+(zone?'&zone='+encodeURIComponent(zone):'');
  if(!reportId){document.getElementById('cloud-overlay').style.display='none';return;}
  var cloud=await sbGet('mhac-report-data-'+reportId);
  if(cloud!==null) localStorage.setItem('mhac-report-data-'+reportId,JSON.stringify(cloud));
  document.getElementById('cloud-overlay').style.display='none';
  var saved=null;
  try{saved=JSON.parse(localStorage.getItem('mhac-report-data-'+reportId));}catch(e){}
  if(saved){
    if(saved.inputs){Object.keys(saved.inputs).forEach(function(id){var el=document.getElementById(id);if(el)el.value=saved.inputs[id];});}
    if(saved.extraCols){for(var c=0;c<saved.extraCols;c++)addCol();}
    if(saved.extraRows){for(var r=0;r<saved.extraRows;r++)addRow();}
    if(saved.tableInputs){var all=document.querySelectorAll('#data-table input');saved.tableInputs.forEach(function(v,i){if(all[i])all[i].value=v;});}
    if(saved.imgSrc){var img=document.getElementById('main-img');var ph=document.getElementById('placeholder');img.src=saved.imgSrc;img.style.display='block';ph.style.display='none';document.getElementById('lightbox-img').src=saved.imgSrc;}
  } else {
    var t1=document.getElementById('t1');var hl=document.getElementById('hl');
    if(t1&&!t1.value)t1.value=reportName;
    if(hl&&!hl.value)hl.value=(zone?zone+' - ':')+'Level '+level;
  }
  function doSave(){
    var inputs={};
    ['hl','t1','ml2','mv2','img-label','table-label','fl','fr'].forEach(function(id){var el=document.getElementById(id);if(el)inputs[id]=el.value;});
    var tableInputs=[];
    document.querySelectorAll('#data-table input').forEach(function(el){tableInputs.push(el.value);});
    var imgSrc='';
    var imgEl=document.getElementById('main-img');
    if(imgEl&&imgEl.src&&imgEl.src.startsWith('data:'))imgSrc=imgEl.src;
    var payload={inputs:inputs,tableInputs:tableInputs,extraRows:Math.max(0,getRowCount()-8),extraCols:Math.max(0,getColCount()-5),imgSrc:imgSrc};
    localStorage.setItem('mhac-report-data-'+reportId,JSON.stringify(payload));
    sbSet('mhac-report-data-'+reportId,payload);
  }
  var saveTimer;
  function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(doSave,800);}
  document.addEventListener('input',debounceSave);
  document.addEventListener('change',debounceSave);
  var origSwap=window.swapPhoto;
  window.swapPhoto=function(e){origSwap(e);setTimeout(doSave,200);};
})();
</script>
</body>
</html>
