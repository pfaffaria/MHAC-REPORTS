<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 5 — Interactive Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.water-ripple{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(245,158,11,0.012) 2px,rgba(245,158,11,0.012) 4px);animation:rippleShift 10s linear infinite}
@keyframes rippleShift{0%{background-position:0 0}100%{background-position:0 80px}}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--amber);opacity:0;animation:fp var(--d,6s) var(--dl,0s) infinite ease-in}
@keyframes fp{0%{opacity:0;transform:translateY(0)}10%{opacity:.45}90%{opacity:.1}100%{opacity:0;transform:translateY(-115vh)}}
.page{position:relative;z-index:2;width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER — compact */
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:7px 28px 6px;border-bottom:1px solid rgba(245,158,11,0.2);background:linear-gradient(180deg,rgba(12,7,0,0.97) 0%,rgba(12,7,0,0.72) 100%);backdrop-filter:blur(14px)}
.h-left{display:flex;align-items:center;gap:12px}
.h-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase;outline:none;cursor:text;display:block}
.h-badge:focus{opacity:1}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,3.2vw,48px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite;outline:none;cursor:text;min-width:40px}
.h-title:focus{filter:drop-shadow(0 0 32px rgba(255,183,0,.9))}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.h-line{width:2px;height:32px;background:linear-gradient(180deg,transparent,var(--amber),transparent);flex-shrink:0;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.h-right{display:flex;align-items:center;gap:14px}
.h-meta{text-align:right}
.h-meta-line{display:block;font-size:9px;letter-spacing:2px;color:rgba(255,217,102,.38);text-transform:uppercase;line-height:1.9;outline:none;cursor:text}
.h-meta-line:focus{color:rgba(255,217,102,.85)}
.compass{width:28px;height:28px;flex-shrink:0;animation:cspin 25s linear infinite}
@keyframes cspin{100%{transform:rotate(360deg)}}

/* TOOLBAR — slim */
.toolbar{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:5px 28px;background:rgba(8,4,0,.7);border-bottom:1px solid rgba(245,158,11,.07)}
.tbtn{display:flex;align-items:center;gap:6px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tbtn:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff;box-shadow:0 0 10px rgba(245,158,11,.2)}
.tbtn.on{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.tsep{width:1px;height:18px;background:rgba(245,158,11,.1);margin:0 3px}
.zdisplay{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--amber-light);padding:4px 12px;border:1px solid rgba(245,158,11,.12);border-radius:4px;min-width:60px;text-align:center}
.zoom-hint{font-size:9.5px;letter-spacing:1.5px;color:rgba(245,158,11,.3);margin-left:6px}

/* MAP STAGE */
.map-stage{flex:1;position:relative;overflow:hidden;cursor:grab}
.map-stage:active{cursor:grabbing}
.map-canvas{position:absolute;top:50%;left:50%;transform-origin:center center;transform:translate(-50%,-50%) scale(1);will-change:transform}
.map-wrap{position:relative;display:inline-block;line-height:0;overflow:hidden}
.overlay-container{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}

.base-img{
  display:block;max-width:92vw;max-height:82vh;width:auto;height:auto;
  filter:
    drop-shadow(0 0 0 2.5px #000)
    drop-shadow(0 0 0 2px #000)
    drop-shadow(0 0 30px rgba(245,158,11,.18))
    drop-shadow(0 16px 50px rgba(0,0,0,.75));
  user-select:none;pointer-events:none;
  transition:filter .28s ease;
}
.map-wrap.zone-active .base-img{
  filter:
    drop-shadow(0 0 0 2.5px #000)
    drop-shadow(0 0 0 2px #000)
    brightness(0.65) saturate(0.4);
}

/* Glowy overlays — very translucent, blur bleeds softly past zone edges */
.zone-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;opacity:0;
  transition:opacity .25s ease;
  mix-blend-mode:screen;
  filter:blur(5px) brightness(1.1);
}
.zone-overlay.active{opacity:0.18}

/* LEGEND */
.legend{position:absolute;bottom:18px;right:20px;background:rgba(10,5,0,.93);border:1px solid rgba(245,158,11,.22);border-radius:10px;padding:14px 18px;backdrop-filter:blur(18px);z-index:10;min-width:178px;box-shadow:0 8px 32px rgba(0,0,0,.55)}
.leg-title{display:block;font-size:9px;letter-spacing:3px;color:var(--amber-light);text-transform:uppercase;margin-bottom:10px;opacity:.6;outline:none;cursor:text}
.leg-title:focus{opacity:1}
.leg-item{display:flex;align-items:center;gap:9px;margin-bottom:7px;cursor:pointer;padding:4px 6px;border-radius:5px;border:1.5px solid transparent;transition:all .2s}
.leg-item:hover{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.2)}
.leg-item.active{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.35)}
.leg-item:last-child{margin-bottom:0}
.leg-level-item{display:flex;align-items:center;gap:9px;margin-top:10px;padding:6px 6px;border-radius:5px;cursor:pointer;border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.06);transition:all .2s}
.leg-level-item:hover{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.4)}
.leg-level-dot{width:10px;height:10px;border-radius:50%;background:rgba(245,158,11,.7);box-shadow:0 0 8px rgba(245,158,11,.6)}
.leg-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;transition:transform .25s}
.leg-item.active .leg-swatch{transform:scale(1.3)}
.leg-label{font-size:11px;font-weight:600;letter-spacing:1px;color:rgba(255,244,204,.72);text-transform:uppercase;outline:none;cursor:text;flex:1}
.leg-label:focus{color:#fff}

.corner{position:absolute;width:14px;height:14px;opacity:.3;pointer-events:none}
.c-tl{top:6px;left:6px;border-top:2px solid var(--amber);border-left:2px solid var(--amber)}
.c-tr{top:6px;right:6px;border-top:2px solid var(--amber);border-right:2px solid var(--amber)}
.c-bl{bottom:6px;left:6px;border-bottom:2px solid var(--amber);border-left:2px solid var(--amber)}
.c-br{bottom:6px;right:6px;border-bottom:2px solid var(--amber);border-right:2px solid var(--amber)}
.coords{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.2);pointer-events:none;z-index:10}
.edit-hint{position:absolute;top:10px;right:28px;font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.22);pointer-events:none;z-index:10;animation:efade 7s ease forwards}
@keyframes efade{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}

.statusbar{flex-shrink:0;display:flex;align-items:center;gap:16px;padding:3px 28px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite;flex-shrink:0}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.stext{outline:none;cursor:text}
.stext:focus{color:rgba(245,158,11,.8)}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}

#zone-tooltip{position:fixed;pointer-events:none;z-index:200;background:rgba(10,5,0,.93);border:1px solid var(--amber);border-radius:6px;padding:5px 13px 6px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:#fff;text-transform:uppercase;box-shadow:0 0 16px rgba(245,158,11,.3);display:none;transform:translate(-50%,-130%);white-space:nowrap;text-align:center}
#zone-tooltip .tt-hint{display:block;font-size:8px;letter-spacing:1.5px;color:rgba(245,158,11,.5);font-weight:600;margin-top:1px}
</style>

const ZONE_ORDER=['olive','pink','blue','teal','orange'];
const baseImg=document.getElementById('baseImg');
baseImg.src=MAP_B64;
const mapWrap=document.getElementById('mapWrap');
const legendEl=document.getElementById('legend');
const tooltip=document.getElementById('zone-tooltip');
const overlays={},hitCtxs={};
let activeZone=null,isDragging=false;

const overlayContainer=document.getElementById('overlayContainer');
// Clear any stale saved labels so the baked-in names always show
['olive','pink','blue','teal','orange'].forEach(n=>localStorage.removeItem('zone-label-'+n));
baseImg.onload=()=>{
  ZONE_ORDER.forEach(name=>{
    if(!ZONES[name])return;
    const z=ZONES[name];
    const ov=document.createElement('img');
    ov.src=z.b64;ov.className='zone-overlay';ov.draggable=false;
    overlayContainer.appendChild(ov);overlays[name]=ov;
    const hc=document.createElement('canvas');hc.width=300;hc.height=300;hc.style.display='none';
    document.body.appendChild(hc);
    const ctx=hc.getContext('2d',{willReadFrequently:true});
    const ti=new Image();ti.onload=()=>ctx.drawImage(ti,0,0,300,300);ti.src=z.b64;
    hitCtxs[name]=ctx;
    const item=document.createElement('div');
    item.className='leg-item';item.dataset.zone=name;
    const savedLabel=localStorage.getItem('zone-label-'+name);
    const displayLabel=savedLabel!==null?savedLabel:z.label;
    item.innerHTML=`<div class="leg-swatch" style="background:${z.display};box-shadow:0 0 7px ${z.display}99"></div><span class="leg-label">${displayLabel}</span>`;
    legendEl.appendChild(item);
    const labelEl=item.querySelector('.leg-label');
    labelEl.addEventListener('mousedown',e=>e.stopPropagation());
    labelEl.addEventListener('input',()=>localStorage.setItem('zone-label-'+name,labelEl.textContent));
    labelEl.addEventListener('blur',()=>localStorage.setItem('zone-label-'+name,labelEl.textContent));
    item.addEventListener('mouseenter',()=>activateZone(name));
    item.addEventListener('mouseleave',()=>{if(activeZone===name)deactivateZone();});
  });

  // Add "Level 5" full-floor entry at bottom of legend
  const lvlItem=document.createElement('div');
  lvlItem.className='leg-level-item';
  lvlItem.innerHTML='<div class="leg-level-dot"></div><span style="font-family:Rajdhani,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:rgba(245,158,11,.8)">Level 5 &#8212; Full Floor</span>';
  lvlItem.addEventListener('click',function(){
    window.location.href='level-reports.html?level=5';
  });
  // Hover highlights all overlays
  lvlItem.addEventListener('mouseenter',function(){
    ZONE_ORDER.forEach(function(n){ if(overlays[n]) overlays[n].style.opacity='1'; });
  });
  lvlItem.addEventListener('mouseleave',function(){
    ZONE_ORDER.forEach(function(n){ if(overlays[n]) overlays[n].style.opacity='0'; });
  });
  legendEl.appendChild(lvlItem);
};

function getZoneAt(rx,ry){
  if(rx<0||ry<0||rx>1||ry>1)return null;
  const px=Math.round(rx*299),py=Math.round(ry*299);
  for(const n of ZONE_ORDER){
    if(!hitCtxs[n])continue;
    try{const d=hitCtxs[n].getImageData(px,py,1,1).data;if(d[3]>80)return n;}catch(e){}
  }
  return null;
}
function activateZone(name){
  if(activeZone===name)return;
  if(activeZone){overlays[activeZone]&&(overlays[activeZone].style.opacity='0');document.querySelector(`.leg-item[data-zone="${activeZone}"]`)?.classList.remove('active');}
  activeZone=name;mapWrap.classList.add('zone-active');
  overlays[name]&&(overlays[name].style.opacity='1');
  document.querySelector(`.leg-item[data-zone="${name}"]`)?.classList.add('active');
}
function deactivateZone(){
  if(activeZone){overlays[activeZone]&&(overlays[activeZone].style.opacity='0');document.querySelector(`.leg-item[data-zone="${activeZone}"]`)?.classList.remove('active');activeZone=null;}
  mapWrap.classList.remove('zone-active');tooltip.style.display='none';
}
mapWrap.addEventListener('mousemove',e=>{
  if(isDragging){tooltip.style.display='none';return;}
  const rect=baseImg.getBoundingClientRect();
  const found=getZoneAt((e.clientX-rect.left)/rect.width,(e.clientY-rect.top)/rect.height);
  if(found){
    activateZone(found);
    tooltip.innerHTML='<span>'+( localStorage.getItem('zone-label-'+found)||ZONES[found].label)+'</span><span class="tt-hint">Click to view reports</span>';
    tooltip.style.display='block';
    tooltip.style.left=e.clientX+'px';tooltip.style.top=e.clientY+'px';
    mapWrap.style.cursor='pointer';
  }else{deactivateZone();mapWrap.style.cursor='';}
});
mapWrap.addEventListener('mouseleave',()=>deactivateZone());
mapWrap.addEventListener('click',e=>{
  if(isDragging)return;
  const rect=baseImg.getBoundingClientRect();
  const found=getZoneAt((e.clientX-rect.left)/rect.width,(e.clientY-rect.top)/rect.height);
  if(found){
    const label=localStorage.getItem('zone-label-'+found)||ZONES[found].label;
    window.location.href='reports.html?level=5&zone='+encodeURIComponent(label);
  }
});
// Legend items also navigate on click
legendEl.addEventListener('click',e=>{
  const item=e.target.closest('.leg-item');
  if(!item)return;
  const zone=item.dataset.zone;
  if(!zone)return;
  const label=item.querySelector('.leg-label')?.textContent||ZONES[zone]?.label||zone;
  window.location.href='reports.html?level=5&zone='+encodeURIComponent(label);
});

(function(){const c=document.getElementById('pts');for(let i=0;i<30;i++){const p=document.createElement('div');p.className='p';p.style.cssText=`left:${Math.random()*100}%;bottom:${Math.random()*12}%;--d:${5+Math.random()*9}s;--dl:${Math.random()*12}s`;c.appendChild(p);}})();

// 100% zoom, centered
let scale=1.0,tx=0,ty=0,lx=0,ly=0;
const MIN=0.2,MAX=8;
const stage=document.getElementById('stage'),canvasEl=document.getElementById('canvas');
const zd=document.getElementById('zdisplay'),coordsEl=document.getElementById('coords');

function applyT(anim){
  canvasEl.style.transition=anim?'transform .28s cubic-bezier(.25,.46,.45,.94)':'none';
  canvasEl.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(${scale})`;
  zd.textContent=Math.round(scale*100)+'%';
}
function zoomBy(d,cx,cy){
  const rect=stage.getBoundingClientRect();
  const px=(cx!=null?cx:rect.left+rect.width/2)-rect.left,py=(cy!=null?cy:rect.top+rect.height/2)-rect.top;
  const ns=Math.max(MIN,Math.min(MAX,scale+d*scale)),ratio=ns/scale;
  tx=px-ratio*(px-tx);ty=py-ratio*(py-ty);scale=ns;applyT(true);
}
function resetView(){scale=1.0;tx=0;ty=0;applyT(true);}
function isEd(el){return el.isContentEditable||el.tagName==='INPUT';}
stage.addEventListener('mousedown',e=>{if(e.button!==0||isEd(e.target))return;isDragging=true;lx=e.clientX;ly=e.clientY;stage.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{
  const rect=stage.getBoundingClientRect();
  if(e.clientX>=rect.left&&e.clientX<=rect.right&&e.clientY>=rect.top&&e.clientY<=rect.bottom)
    coordsEl.textContent=`X: ${Math.round(e.clientX-rect.left-rect.width/2)} · Y: ${Math.round(e.clientY-rect.top-rect.height/2)}`;
  if(!isDragging)return;
  tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT(false);
});
window.addEventListener('mouseup',()=>{isDragging=false;stage.style.cursor='grab';});
stage.addEventListener('wheel',e=>{if(isEd(e.target))return;e.preventDefault();zoomBy(-e.deltaY*.001,e.clientX,e.clientY);},{passive:false});
let ld=null;
stage.addEventListener('touchstart',e=>{if(e.touches.length===1&&!isEd(e.target)){isDragging=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}else if(e.touches.length===2){isDragging=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ld=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
stage.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isDragging){tx+=e.touches[0].clientX-lx;ty+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;applyT(false);}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);if(ld){const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2,rect=stage.getBoundingClientRect(),ns=Math.max(MIN,Math.min(MAX,scale*(d/ld))),ratio=ns/scale;tx=(mx-rect.left)-ratio*((mx-rect.left)-tx);ty=(my-rect.top)-ratio*((my-rect.top)-ty);scale=ns;applyT(false);}ld=d;}},{passive:false});
stage.addEventListener('touchend',()=>{isDragging=false;ld=null;});
let legOn=true;
function toggleLeg(){legOn=!legOn;document.getElementById('legend').style.display=legOn?'block':'none';document.getElementById('btn-leg').classList.toggle('on',legOn);}
applyT(false);
</script>
</body>
