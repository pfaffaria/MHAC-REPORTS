<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Level Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script>
var SUPABASE_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
var SUPABASE_KEY='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
function isAdmin(){var s=getSession();return s&&s.role==='admin';}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97),rgba(12,7,0,.72));backdrop-filter:blur(14px)}
.tb-l{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-r{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.tb-btn.danger{border-color:rgba(239,68,68,.3);color:rgba(239,68,68,.6)}
.page{position:relative;z-index:2;min-height:100vh;padding:80px 20px 60px;max-width:900px;margin:0 auto}
.page-hdr{margin-bottom:32px;padding-top:8px}
.page-eyebrow{font-size:9px;letter-spacing:4px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,56px);letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,183,0,.4));line-height:1}
.page-sub{font-size:11px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-top:6px}
.rule{width:60px;height:2px;background:linear-gradient(90deg,var(--amber),transparent);margin-top:10px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.tile{position:relative;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:24px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;gap:12px;transition:all .25s;overflow:hidden;-webkit-tap-highlight-color:transparent}
.tile::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,.08) 0%,transparent 60%);opacity:0;transition:opacity .25s}
.tile:hover::before,.tile:active::before{opacity:1}
.tile:hover,.tile:active{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.45);transform:translateY(-3px);box-shadow:0 8px 32px rgba(245,158,11,.15)}
.tile-corner{position:absolute;width:10px;height:10px;opacity:0;transition:opacity .25s}
.tile-corner.tl{top:6px;left:6px;border-top:1.5px solid var(--amber);border-left:1.5px solid var(--amber)}
.tile-corner.tr{top:6px;right:6px;border-top:1.5px solid var(--amber);border-right:1.5px solid var(--amber)}
.tile-corner.bl{bottom:6px;left:6px;border-bottom:1.5px solid var(--amber);border-left:1.5px solid var(--amber)}
.tile-corner.br{bottom:6px;right:6px;border-bottom:1.5px solid var(--amber);border-right:1.5px solid var(--amber)}
.tile:hover .tile-corner{opacity:1}
.tile-icon{width:40px;height:40px;opacity:.55;transition:opacity .25s;flex-shrink:0}
.tile:hover .tile-icon{opacity:.9}
.tile-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.tile-desc{font-size:10px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;line-height:1.6}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<nav class="topbar">
  <div class="tb-l">
    <div class="tb-badge">Full Floor</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-r">
    <a class="tb-btn" id="back-btn" href="Level1.html">&#8592; Map</a>
    <button class="tb-btn danger" onclick="clearSession();window.location.href='index.html'">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-hdr">
    <div class="page-eyebrow">Full Floor Reports</div>
    <div class="page-title" id="page-title">LEVEL 1</div>
    <div class="page-sub" id="page-sub">Fire Safety &amp; Safety Inspections</div>
    <div class="rule"></div>
  </div>

  <div class="tiles">

    <a class="tile" id="tile-fe" href="fire-extinguisher.html">
      <div class="tile-corner tl"></div><div class="tile-corner tr"></div>
      <div class="tile-corner bl"></div><div class="tile-corner br"></div>
      <svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 3v1m0 0a3 3 0 0 0 3 3h1a3 3 0 0 1 3 3v1"/>
        <path d="M10 7V4a1 1 0 0 1 1-1h2"/>
        <rect x="7" y="11" width="7" height="10" rx="1"/>
        <line x1="10" y1="11" x2="10" y2="21"/>
      </svg>
      <div class="tile-name">Fire Extinguishers</div>
      <div class="tile-desc">Monthly checklist &amp; barcode scanner</div>
    </a>

    <a class="tile" id="tile-ew" href="eyewash-log.html">
      <div class="tile-corner tl"></div><div class="tile-corner tr"></div>
      <div class="tile-corner bl"></div><div class="tile-corner br"></div>
      <svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/>
        <path d="M2 12h4M18 12h4M12 2v4M12 18v4"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <div class="tile-name">Eyewash Log</div>
      <div class="tile-desc">Monthly temperature log &amp; trend tracking</div>
    </a>

  </div>
</div>

<div class="statusbar">
  <div class="sdot"></div>
  <span id="status-lbl">Level Reports</span>
  <div class="wfall">
    <div class="wb" style="--d:.7s"></div>
    <div class="wb" style="--d:1.1s"></div>
    <div class="wb" style="--d:.9s"></div>
  </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var level = params.get('level') || '1';

document.getElementById('page-title').textContent = 'LEVEL ' + level;
document.getElementById('page-sub').textContent = 'Level ' + level + ' — Fire Safety & Safety Inspections';
document.getElementById('back-btn').href = 'Level' + level + '.html';
document.getElementById('status-lbl').textContent = 'Level ' + level + ' — Full Floor Reports';

// Pass level param through to sub-pages
document.getElementById('tile-fe').href = 'fire-extinguisher.html?level=' + level;
document.getElementById('tile-ew').href = 'eyewash-log.html?level=' + level;
</script>
</body>
</html>
