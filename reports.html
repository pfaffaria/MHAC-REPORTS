<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC Reports — Select Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.water-ripple{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(245,158,11,0.012) 2px,rgba(245,158,11,0.012) 4px);animation:rippleShift 10s linear infinite}
@keyframes rippleShift{0%{background-position:0 0}100%{background-position:0 80px}}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--amber);opacity:0;animation:fp var(--d,6s) var(--dl,0s) infinite ease-in}
@keyframes fp{0%{opacity:0;transform:translateY(0)}10%{opacity:.45}90%{opacity:.1}100%{opacity:0;transform:translateY(-115vh)}}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 28px 6px;border-bottom:1px solid rgba(245,158,11,0.2);background:linear-gradient(180deg,rgba(12,7,0,0.97) 0%,rgba(12,7,0,0.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,2.5vw,38px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);flex-shrink:0;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-btn{display:flex;align-items:center;gap:6px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 28px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite;flex-shrink:0}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:80px 40px 60px;display:flex;flex-direction:column;align-items:center;gap:32px}
.heading{text-align:center;animation:fadeUp .6s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.heading-eyebrow{font-size:9px;letter-spacing:4px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-bottom:6px}
.heading-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,64px);letter-spacing:6px;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,183,0,.3))}
.heading-sub{font-size:10px;letter-spacing:3px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-top:4px}
.heading-rule{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);margin:8px auto 0;animation:lpulse 3s ease-in-out infinite}
.reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;width:100%;max-width:960px;animation:fadeUp .7s ease forwards}
.report-tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 16px 18px;min-height:160px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.18);border-radius:8px;cursor:pointer;transition:all .22s;overflow:hidden;animation:fadeUp .6s ease forwards;opacity:0}
.report-tile::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,.07) 0%,transparent 60%);opacity:0;transition:opacity .22s}
.report-tile:hover::before{opacity:1}
.report-tile:hover{background:rgba(245,158,11,.09);border-color:var(--amber);transform:translateY(-3px);box-shadow:0 8px 28px rgba(245,158,11,.15),0 0 0 1px rgba(245,158,11,.12)}
.tile-corner{position:absolute;width:9px;height:9px;opacity:0;transition:opacity .22s}
.tile-corner.tl{top:5px;left:5px;border-top:1.5px solid var(--amber);border-left:1.5px solid var(--amber)}
.tile-corner.tr{top:5px;right:5px;border-top:1.5px solid var(--amber);border-right:1.5px solid var(--amber)}
.tile-corner.bl{bottom:5px;left:5px;border-bottom:1.5px solid var(--amber);border-left:1.5px solid var(--amber)}
.tile-corner.br{bottom:5px;right:5px;border-bottom:1.5px solid var(--amber);border-right:1.5px solid var(--amber)}
.report-tile:hover .tile-corner{opacity:1}
.tile-icon{width:36px;height:36px;opacity:.5;transition:opacity .22s}
.report-tile:hover .tile-icon{opacity:.85}
.tile-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,244,204,.8);text-align:center;background:transparent;border:none;border-bottom:1px dashed transparent;outline:none;width:100%;padding:2px 4px;cursor:pointer;transition:all .2s}
.tile-name:focus{border-bottom-color:rgba(245,158,11,.4);color:#fff;cursor:text}
.tile-date{font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.tile-delete{position:absolute;top:7px;right:8px;background:none;border:none;color:rgba(245,158,11,.25);font-size:14px;cursor:pointer;line-height:1;padding:2px 4px;border-radius:3px;transition:all .2s;opacity:0}
.report-tile:hover .tile-delete{opacity:1}
.tile-delete:hover{color:#ff6b6b;background:rgba(255,107,107,.1)}
.add-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 16px;min-height:160px;background:transparent;border:1px dashed rgba(245,158,11,.18);border-radius:8px;cursor:pointer;transition:all .22s;animation:fadeUp .8s ease forwards;opacity:0}
.add-tile:hover{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.4);transform:translateY(-3px)}
.add-tile-icon{font-size:28px;color:rgba(245,158,11,.35);line-height:1;transition:color .22s}
.add-tile:hover .add-tile-icon{color:rgba(245,158,11,.7)}
.add-tile-label{font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.3);text-transform:uppercase;transition:color .22s}
.add-tile:hover .add-tile-label{color:rgba(245,158,11,.6)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.active{display:flex}
.modal{background:#100b02;border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:28px 32px;width:360px;max-width:90vw}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.modal-label{font-size:9px;letter-spacing:2.5px;color:rgba(245,158,11,.5);text-transform:uppercase;margin-bottom:6px;display:block}
.modal-input{width:100%;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;padding:8px 12px;outline:none;margin-bottom:18px;transition:all .2s}
.modal-input:focus{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.6)}
.modal-input::placeholder{color:rgba(245,158,11,.25)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-btn{padding:6px 18px;border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid}
.modal-btn-cancel{background:transparent;border-color:rgba(245,158,11,.2);color:rgba(245,158,11,.5)}
.modal-btn-cancel:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.8)}
.modal-btn-create{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:var(--amber-light)}
.modal-btn-create:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
</style>
<script>
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
function isAdmin(){var s=getSession();return s&&s.role==='admin';}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>
</head>
<body>
<div class="water-bg"></div>
<div class="water-ripple"></div>
<div class="particles" id="pts"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing data...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Building Reports</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <a class="tb-btn" id="back-btn" href="Level1.html">← Map</a>
    <button class="tb-btn" style="border-color:rgba(239,68,68,.25);color:rgba(239,68,68,.6)" onclick="clearSession();window.location.href='index.html'">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="heading">
    <div class="heading-eyebrow">Floor Reports</div>
    <div class="heading-title" id="page-title">LEVEL 1</div>
    <div class="heading-sub" id="page-sub">Select or create a report</div>
    <div class="heading-rule"></div>
  </div>
  <div class="reports-grid" id="reports-grid"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">New Report</div>
    <label class="modal-label">Report Name</label>
    <input class="modal-input" id="modal-input" type="text" placeholder="e.g. Annual Inspection 2026" maxlength="60"/>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-btn-create" onclick="createReport()">Create</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="sdot"></div>
  <span>System Online</span>
  <span>·</span>
  <span id="status-text">MHAC Reports</span>
  <div class="wfall">
    <div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div>
    <div class="wb" style="--d:.9s"></div><div class="wb" style="--d:1.3s"></div>
    <div class="wb" style="--d:.6s"></div>
  </div>
</div>

<script>
// ═══ SUPABASE SYNC ═══════════════════════════════════════════════════
const SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
const SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
const SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};
async function sbGet(k){
  var controller=typeof AbortController!=='undefined'?new AbortController():null;
  var timer=controller?setTimeout(function(){controller.abort();},5000):null;
  var opts={headers:SB_H};if(controller)opts.signal=controller.signal;
  return fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',opts)
    .then(function(r){clearTimeout(timer);return r.json();})
    .then(function(d){return d.length?d[0].value:null;})
    .catch(function(){clearTimeout(timer);return null;});
}
function sbSet(k,v){fetch(SB_URL+'/rest/v1/app_data',{method:'POST',headers:Object.assign({},SB_H,{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})}).catch(function(){});}

// ── URL PARAMS ──────────────────────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var level = params.get('level') || '1';
var zone = params.get('zone') || 'Zone';
var storageKey = 'mhac-reports-level-' + level + '-zone-' + zone;

document.getElementById('page-title').textContent = zone.toUpperCase();
document.getElementById('page-sub').textContent = 'Level ' + level + ' · ' + zone + ' · Select or create a report';
document.getElementById('status-text').textContent = 'Level ' + level + ' — ' + zone;
var bb = document.getElementById('back-btn');
if(bb) bb.href = 'Level' + level + '.html';

function loadReports() {
  try { return JSON.parse(localStorage.getItem(storageKey)) || []; }
  catch(e) { return []; }
}
function saveReports(reports) {
  localStorage.setItem(storageKey, JSON.stringify(reports));
  sbSet(storageKey, reports); // sync to cloud
}

function renderGrid() {
  var reports = loadReports();
  var grid = document.getElementById('reports-grid');
  grid.innerHTML = '';

  // Zone Inspection tile — always present
  var inspTile = document.createElement('a');
  inspTile.className = 'report-tile';
  inspTile.href = 'room-inspection.html?level=' + level + '&zone=' + encodeURIComponent(zone);
  inspTile.style.cssText = 'text-decoration:none;border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06)';
  inspTile.innerHTML = '<div class="tile-corner tl"></div><div class="tile-corner tr"></div><div class="tile-corner bl"></div><div class="tile-corner br"></div>' +
    '<svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>' +
    '<div class="tile-name" style="pointer-events:none;-webkit-text-fill-color:var(--amber-light)">Zone Inspection</div>' +
    '<div class="tile-date">Electrical · Plumbing · Building</div>';
  grid.appendChild(inspTile);

  reports.forEach(function(r, i) {
    var tile = document.createElement('div');
    tile.className = 'report-tile';
    tile.style.animationDelay = (i * 0.05) + 's';
    tile.innerHTML =
      '<div class="tile-corner tl"></div><div class="tile-corner tr"></div>' +
      '<div class="tile-corner bl"></div><div class="tile-corner br"></div>' +
      '<svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(245,158,11,0.7)" stroke-width="1.5">' +
        '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
        '<polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>' +
        '<line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>' +
      '</svg>' +
      '<input class="tile-name" type="text" value="' + escHtml(r.name) + '" placeholder="Untitled Report" data-idx="' + i + '"/>' +
      '<div class="tile-date">' + r.created + '</div>' +
      '<button class="tile-delete" data-idx="' + i + '" title="Delete">✕</button>';

    tile.addEventListener('click', function(e) {
      if (e.target.classList.contains('tile-name') || e.target.classList.contains('tile-delete')) return;
      openReport(i);
    });
    tile.querySelector('.tile-name').addEventListener('blur', function() {
      var reps = loadReports();
      reps[this.dataset.idx].name = this.value || 'Untitled Report';
      saveReports(reps);
    });
    tile.querySelector('.tile-name').addEventListener('keydown', function(e) { if (e.key === 'Enter') this.blur(); });
    tile.querySelector('.tile-delete').addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm('Delete "' + loadReports()[this.dataset.idx].name + '"?')) {
        var reps = loadReports();
        sbSet('mhac-report-data-' + reps[this.dataset.idx].id, null);
        localStorage.removeItem('mhac-report-data-' + reps[this.dataset.idx].id);
        reps.splice(this.dataset.idx, 1);
        saveReports(reps);
        renderGrid();
      }
    });
    grid.appendChild(tile);
  });

  var addTile = document.createElement('div');
  addTile.className = 'add-tile';
  addTile.style.animationDelay = (reports.length * 0.05) + 's';
  addTile.innerHTML = '<div class="add-tile-icon">+</div><div class="add-tile-label">New Report</div>';
  addTile.addEventListener('click', openModal);
  grid.appendChild(addTile);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openReport(idx) {
  var reports = loadReports();
  var r = reports[idx];
  window.location.href = 'report.html?id=' + encodeURIComponent(r.id) + '&level=' + level + '&zone=' + encodeURIComponent(zone) + '&name=' + encodeURIComponent(r.name);
}

function openModal() {
  document.getElementById('modal-bg').classList.add('active');
  setTimeout(function(){ document.getElementById('modal-input').focus(); }, 50);
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('active');
  document.getElementById('modal-input').value = '';
}
function createReport() {
  var name = document.getElementById('modal-input').value.trim() || 'Untitled Report';
  var reports = loadReports();
  var id = 'r-' + Date.now();
  var now = new Date();
  var created = now.toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'});
  reports.push({ id: id, name: name, created: created });
  saveReports(reports);
  closeModal();
  openReport(reports.length - 1);
}

document.getElementById('modal-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') createReport();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modal-bg').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

(function(){
  var c = document.getElementById('pts');
  for (var i = 0; i < 30; i++) {
    var p = document.createElement('div'); p.className = 'p';
    p.style.cssText = 'left:'+Math.random()*100+'%;bottom:'+Math.random()*12+'%;--d:'+(5+Math.random()*9)+'s;--dl:'+Math.random()*12+'s';
    c.appendChild(p);
  }
})();

// ── CLOUD INIT ──────────────────────────────────────────────────────
(function(){
  var done=false;
  function finish(v){
    if(done)return; done=true;
    if(v!==null) localStorage.setItem(storageKey, JSON.stringify(v));
    document.getElementById('cloud-overlay').style.display='none';
    renderGrid();
  }
  setTimeout(function(){finish(null);}, 5000);
  sbGet(storageKey).then(finish).catch(function(){finish(null);});
})();
</script>
</body>
</html>
