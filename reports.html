<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97),rgba(12,7,0,.72));backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,2.5vw,36px);letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;gap:8px}
.tb-btn{padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.page{position:relative;z-index:2;padding:72px 18px 60px;max-width:900px;margin:0 auto}
.heading{margin-bottom:24px;padding-top:8px}
.eyebrow{font-size:9px;letter-spacing:4px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-bottom:4px}
.zone-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,58px);letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sub{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-top:5px}
.rule{width:60px;height:1px;background:linear-gradient(90deg,var(--amber),transparent);margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:20px}
.tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:22px 14px 18px;min-height:155px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.16);border-radius:8px;cursor:pointer;transition:all .2s;overflow:hidden;text-decoration:none;color:inherit}
.tile:hover{background:rgba(245,158,11,.09);border-color:var(--amber);transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,158,11,.12)}
.tc{position:absolute;width:8px;height:8px;opacity:0;transition:opacity .2s}
.tc.tl{top:5px;left:5px;border-top:1.5px solid var(--amber);border-left:1.5px solid var(--amber)}
.tc.tr{top:5px;right:5px;border-top:1.5px solid var(--amber);border-right:1.5px solid var(--amber)}
.tc.bl{bottom:5px;left:5px;border-bottom:1.5px solid var(--amber);border-left:1.5px solid var(--amber)}
.tc.br{bottom:5px;right:5px;border-bottom:1.5px solid var(--amber);border-right:1.5px solid var(--amber)}
.tile:hover .tc{opacity:1}
.tile-icon{width:34px;height:34px;color:var(--amber);opacity:.65;transition:opacity .2s}
.tile:hover .tile-icon{opacity:1}
.tile-name{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,244,204,.85);text-align:center}
.tile-date{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.35);text-transform:uppercase;text-align:center}
.name-input{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,244,204,.85);background:transparent;border:none;border-bottom:1px dashed transparent;outline:none;width:100%;text-align:center;padding:2px 2px}
.name-input:focus{border-bottom-color:rgba(245,158,11,.4);color:#fff}
.del-btn{position:absolute;top:6px;right:7px;background:none;border:none;color:rgba(245,158,11,.2);font-size:13px;cursor:pointer;opacity:0;transition:all .2s;line-height:1;padding:2px 4px}
.tile:hover .del-btn{opacity:1}
.del-btn:hover{color:#f87171}
.add-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:22px 14px;min-height:155px;border:1px dashed rgba(245,158,11,.18);border-radius:8px;cursor:pointer;transition:all .2s}
.add-tile:hover{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.38);transform:translateY(-2px)}
.add-plus{font-size:26px;color:rgba(245,158,11,.35);line-height:1;transition:color .2s}
.add-tile:hover .add-plus{color:rgba(245,158,11,.65)}
.add-lbl{font-size:9px;letter-spacing:2.5px;color:rgba(245,158,11,.28);text-transform:uppercase}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:#0e0900;border:1px solid rgba(245,158,11,.28);border-radius:10px;padding:26px 28px;width:340px;max-width:92vw}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.modal-lbl{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.45);text-transform:uppercase;display:block;margin-bottom:5px}
.modal-inp{width:100%;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:7px 10px;outline:none;margin-bottom:16px}
.modal-inp:focus{border-color:rgba(245,158,11,.55)}
.modal-inp::placeholder{color:rgba(245,158,11,.22)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:6px 16px;border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.mbtn-cancel{background:transparent;border:1px solid rgba(245,158,11,.18);color:rgba(245,158,11,.45)}
.mbtn-cancel:hover{border-color:rgba(245,158,11,.35);color:rgba(245,158,11,.75)}
.mbtn-ok{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.32);color:var(--amber-light)}
.mbtn-ok:hover{background:rgba(245,158,11,.2);border-color:var(--amber)}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:14px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
</style>
<script>
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:9999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink .8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink .8s .2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink .8s .4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Building Reports</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <a class="tb-btn" id="back-btn" href="Level1.html">&#8592; Map</a>
    <button class="tb-btn" style="border-color:rgba(239,68,68,.25);color:rgba(239,68,68,.6)" onclick="clearSession();window.location.href='index.html'">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="heading">
    <div class="eyebrow">Floor Reports</div>
    <div class="zone-title" id="page-title">ZONE</div>
    <div class="sub" id="page-sub">Select or create a report</div>
    <div class="rule"></div>
  </div>
  <div class="grid" id="reports-grid"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">New Report</div>
    <label class="modal-lbl">Report Name</label>
    <input class="modal-inp" id="modal-inp" type="text" placeholder="e.g. Annual Inspection 2026" maxlength="60"/>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-ok" onclick="createReport()">Create</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="sdot"></div>
  <span>System Online</span>
  <span id="status-text">MHAC Reports</span>
  <div class="wfall"><div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div><div class="wb" style="--d:.9s"></div></div>
</div>

<script>
var SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
var SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
var SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};
function sbGet(k){
  var ctrl=typeof AbortController!=='undefined'?new AbortController():null;
  var t=ctrl?setTimeout(function(){ctrl.abort();},5000):null;
  var o={headers:SB_H};if(ctrl)o.signal=ctrl.signal;
  return fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',o)
    .then(function(r){clearTimeout(t);return r.json();})
    .then(function(d){return d.length?d[0].value:null;})
    .catch(function(){clearTimeout(t);return null;});
}
function sbSet(k,v){
  fetch(SB_URL+'/rest/v1/app_data',{method:'POST',headers:Object.assign({},SB_H,{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})}).catch(function(){});
}

var params=new URLSearchParams(window.location.search);
var level=params.get('level')||'1';
var zone=params.get('zone')||'Zone';
var storageKey='mhac-reports-level-'+level+'-zone-'+zone;

document.getElementById('page-title').textContent=zone.toUpperCase();
document.getElementById('page-sub').textContent='Level '+level+' \xb7 '+zone+' \xb7 Select or create a report';
document.getElementById('status-text').textContent='Level '+level+' \u2014 '+zone;
document.getElementById('back-btn').href='Level'+level+'.html';

function loadReports(){try{return JSON.parse(localStorage.getItem(storageKey))||[];}catch(e){return[];}}
function saveReports(r){localStorage.setItem(storageKey,JSON.stringify(r));sbSet(storageKey,r);}

function renderGrid(){
  var reports=loadReports();
  var grid=document.getElementById('reports-grid');
  grid.innerHTML='';

  // Zone Inspection tile
  var a=document.createElement('a');
  a.className='tile';
  a.href='room-inspection.html?level='+level+'&zone='+encodeURIComponent(zone);
  a.style.borderColor='rgba(245,158,11,.3)';
  a.style.background='rgba(245,158,11,.06)';
  a.innerHTML='<div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div>'+
    '<svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'+
    '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>'+
    '<div class="tile-name">Zone Inspection</div>'+
    '<div class="tile-date">Electrical \xb7 Plumbing \xb7 Building</div>';
  grid.appendChild(a);

  reports.forEach(function(r,i){
    var tile=document.createElement('div');
    tile.className='tile';
    tile.innerHTML='<div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div>'+
      '<svg class="tile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'+
      '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>'+
      '<polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>'+
      '</svg>'+
      '<input class="name-input" type="text" value="'+r.name.replace(/"/g,'&quot;')+'" data-idx="'+i+'"/>'+
      '<div class="tile-date">'+r.created+'</div>'+
      '<button class="del-btn" data-idx="'+i+'">&#x2715;</button>';
    tile.addEventListener('click',function(e){
      if(e.target.classList.contains('name-input')||e.target.classList.contains('del-btn'))return;
      window.location.href='report.html?id='+encodeURIComponent(r.id)+'&level='+level+'&zone='+encodeURIComponent(zone)+'&name='+encodeURIComponent(r.name);
    });
    tile.querySelector('.name-input').addEventListener('blur',function(){
      var reps=loadReports();reps[this.dataset.idx].name=this.value||'Untitled';saveReports(reps);
    });
    tile.querySelector('.name-input').addEventListener('keydown',function(e){if(e.key==='Enter')this.blur();});
    tile.querySelector('.del-btn').addEventListener('click',function(e){
      e.stopPropagation();
      if(!confirm('Delete this report?'))return;
      var reps=loadReports();
      localStorage.removeItem('mhac-report-data-'+reps[this.dataset.idx].id);
      sbSet('mhac-report-data-'+reps[this.dataset.idx].id,null);
      reps.splice(this.dataset.idx,1);saveReports(reps);renderGrid();
    });
    grid.appendChild(tile);
  });

  var add=document.createElement('div');
  add.className='add-tile';
  add.innerHTML='<div class="add-plus">+</div><div class="add-lbl">New Report</div>';
  add.addEventListener('click',openModal);
  grid.appendChild(add);
}

function openModal(){document.getElementById('modal-bg').classList.add('open');setTimeout(function(){document.getElementById('modal-inp').focus();},50);}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.getElementById('modal-inp').value='';}
function createReport(){
  var name=document.getElementById('modal-inp').value.trim()||'Untitled Report';
  var reports=loadReports();
  var id='r-'+Date.now();
  var created=new Date().toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'});
  reports.push({id:id,name:name,created:created});
  saveReports(reports);closeModal();
  window.location.href='report.html?id='+encodeURIComponent(id)+'&level='+level+'&zone='+encodeURIComponent(zone)+'&name='+encodeURIComponent(name);
}
document.getElementById('modal-inp').addEventListener('keydown',function(e){if(e.key==='Enter')createReport();if(e.key==='Escape')closeModal();});
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});

// Cloud init
(function(){
  var done=false;
  function finish(v){
    if(done)return;done=true;
    if(v!==null)localStorage.setItem(storageKey,JSON.stringify(v));
    document.getElementById('cloud-overlay').style.display='none';
    renderGrid();
  }
  setTimeout(function(){finish(null);},5000);
  sbGet(storageKey).then(finish).catch(function(){finish(null);});
})();
</script>
</body>
</html>
