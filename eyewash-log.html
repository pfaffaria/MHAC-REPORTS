<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Eyewash Temperature Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97) 0%,rgba(12,7,0,.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover,.tb-btn.primary{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35)}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:72px 16px 48px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;padding-top:8px;flex-wrap:wrap}
.tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.view{display:none}.view.active{display:block}
.lvl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.lvl-tab{padding:5px 14px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.lvl-tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.entry-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.meta-row{display:flex;gap:8px;flex-wrap:wrap}
.meta-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:5px 10px;outline:none}
.meta-in:focus{border-color:rgba(245,158,11,.5)}
.range-note{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:12px;padding:5px 10px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.1);border-radius:4px;display:inline-block}
.range-note span{color:rgba(34,197,94,.6)}
.ew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.ew-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:12px}
.ew-room{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light)}
.ew-loc{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-bottom:8px}
.ew-lbl{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700;margin-bottom:3px}
.temp-wrap{display:flex;align-items:center;gap:8px}
.temp-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;padding:5px 8px;outline:none;width:80px;text-align:center;transition:all .2s}
.temp-in:focus{border-color:rgba(245,158,11,.5)}
.temp-in.cold{border-color:rgba(59,130,246,.5);background:rgba(59,130,246,.08);color:#93c5fd}
.temp-in.hot{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08);color:#fca5a5}
.temp-in.ok{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06);color:#4ade80}
.pf-badge{display:flex;flex-direction:column;align-items:center;line-height:1.2;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;min-width:28px}
.pf-pass{color:#4ade80}.pf-fail{color:#f87171}
.flush-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.flush-lbl{font-size:8px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.flush-sel{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:4px 8px;outline:none;flex:1}
.flush-sel option{background:#0f0a03}
.act-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.btn-save{padding:8px 20px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-save:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.btn-sec{padding:8px 14px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-sec:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.7)}
.trend-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:8px}
.t-room{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--amber-light)}
.t-loc{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:10px}
.t-latest{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fef3c7}
.t-pass{color:#4ade80;font-weight:700;font-size:11px;letter-spacing:1px}
.t-fail{color:#f87171;font-weight:700;font-size:11px;letter-spacing:1px}
.t-avg{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-top:3px}
.bar{border-radius:2px 2px 0 0;min-height:3px}
.bar-ok{background:rgba(34,197,94,.6)}.bar-cold{background:rgba(59,130,246,.6)}.bar-hot{background:rgba(239,68,68,.6)}.bar-empty{background:rgba(245,158,11,.1)}
.no-data{text-align:center;padding:32px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;line-height:2}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* ── Edit Stations mode ── */
.edit-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.edit-hint{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.35);text-transform:uppercase}
.es-row{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:8px;margin-bottom:6px}
.es-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 8px;outline:none}
.es-in:focus{border-color:rgba(245,158,11,.5)}
.es-room{width:110px;flex-shrink:0}
.es-loc{flex:1;min-width:90px}
.es-del{flex-shrink:0;width:30px;height:30px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.06);border-radius:5px;color:#f87171;font-size:15px;font-weight:700;cursor:pointer;line-height:1}
.es-del:hover{background:rgba(239,68,68,.16)}
.es-add{padding:7px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:5px;color:#4ade80;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.es-add:hover{background:rgba(34,197,94,.18)}
.indi{font-size:10px;letter-spacing:1.5px;font-weight:600}
/* ── Map view ── */
.map-upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 20px;border:1px dashed rgba(245,158,11,.2);border-radius:10px;background:rgba(245,158,11,.02);text-align:center}
.map-upload-area.drag-over{border-color:var(--amber);background:rgba(245,158,11,.06)}
.map-upload-icon{font-size:32px;opacity:.4}
.map-upload-text{font-size:11px;letter-spacing:2px;color:rgba(245,158,11,.35);text-transform:uppercase;line-height:1.8}
.btn-upload{padding:8px 20px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.btn-upload:hover{background:rgba(245,158,11,.22)}
.map-container{position:relative;border-radius:10px;overflow:hidden;border:1px solid rgba(245,158,11,.15);background:#000;user-select:none;touch-action:none;cursor:grab}
.map-container.panning{cursor:grabbing}
.map-zoom-layer{position:absolute;inset:0;transform-origin:0 0;will-change:transform}
.map-zoom-layer img{display:block;width:100%;height:100%;pointer-events:none}
.map-pins-overlay{position:absolute;inset:0;pointer-events:none}
.map-controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.map-legend{display:flex;gap:12px;align-items:center;margin-left:auto;font-size:10px;letter-spacing:1px;color:rgba(245,158,11,.4);text-transform:uppercase}
.map-legend span{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#map-tooltip{position:absolute;pointer-events:none;z-index:50;background:rgba(10,5,0,.95);border:1px solid var(--amber);border-radius:6px;padding:6px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#fff;text-transform:uppercase;display:none;white-space:nowrap;transform:translate(-50%,-115%)}
#map-tooltip .tt-sub{display:block;font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.5);font-weight:600;margin-top:1px}
.map-pin-marker{position:absolute;transform:translate(-50%,-100%);pointer-events:all;cursor:pointer;z-index:10;width:30px;height:38px}
.map-pin-marker.hl{animation:pinPulse 1.2s ease-in-out infinite;z-index:20}
@keyframes pinPulse{0%,100%{transform:translate(-50%,-100%) scale(1)}50%{transform:translate(-50%,-100%) scale(1.18)}}
.btn-secondary{padding:8px 14px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.75)}
.btn-primary{padding:8px 16px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-primary:hover{background:rgba(245,158,11,.22)}
/* pin info panel */
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
#pin-info-panel{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:400;width:calc(100% - 32px);max-width:420px;background:rgba(10,5,0,.97);border:1px solid rgba(245,158,11,.35);border-radius:14px;padding:16px 18px;display:none;animation:slideUp .2s ease-out}
#pin-info-panel.show{display:block}
.pip-id{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--amber-light)}
.pip-loc{font-size:11px;letter-spacing:1px;color:rgba(245,158,11,.5);text-transform:uppercase;margin-bottom:8px}
.pip-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.pip-close{position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(245,158,11,.5);font-size:18px;cursor:pointer}
/* placement modal */
#placement-modal{position:fixed;inset:0;z-index:500;background:rgba(8,4,0,.92);display:none;align-items:center;justify-content:center;padding:16px}
#placement-modal.active{display:flex}
.placement-box{width:100%;max-width:520px;background:rgba(15,10,3,.98);border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:16px}
.placement-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--amber-light)}
.placement-sub{font-size:10px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-bottom:12px}
.placement-map-wrap{position:relative;border-radius:8px;overflow:hidden;border:1px solid rgba(245,158,11,.2);cursor:crosshair;background:#000}
.placement-map-wrap img{display:block;width:100%;height:auto;pointer-events:none}
.placement-map-wrap svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.placement-hint{font-size:10px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;text-align:center;margin-top:10px}
</style>
<script>
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing data...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Safety</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <button class="tb-btn primary" onclick="exportCSV()">&#8595; CSV</button>
    <a class="tb-btn" id="ew-back-btn" href="index.html">&#8592; Home</a>
    <button class="tb-btn" style="border-color:rgba(239,68,68,.25);color:rgba(239,68,68,.6)" onclick="clearSession();window.location.href='index.html'">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showView('entry',this)">Monthly Entry</button>
    <button class="tab" onclick="showView('trends',this)">Trend Log</button>
    <button class="tab" onclick="showView('map',this)">Map</button>
    <button class="tab" onclick="showView('edit',this)">Edit Stations</button>
  </div>

  <!-- ENTRY -->
  <div class="view active" id="view-entry">
    <div class="lvl-tabs" id="entry-lvl-tabs"></div>
    <div class="entry-hdr">
      <div class="entry-title">Eyewash Log &#8212; <span id="entry-lvl-lbl">Level 1</span></div>
      <div class="meta-row">
        <input type="date" class="meta-in" id="entry-date"/>
        <input type="text" class="meta-in" id="entry-tech" placeholder="Technician" style="width:140px"/>
      </div>
    </div>
    <div class="range-note">Safe range: <span>16&#176;C &#8211; 38&#176;C</span></div>
    <div class="ew-grid" id="ew-grid"></div>
    <div class="act-row">
      <button class="btn-save" onclick="saveEntry()">Save Entry</button>
      <button class="btn-sec" onclick="clearTemps()">Clear</button>
    </div>
  </div>

  <!-- TRENDS -->
  <div class="view" id="view-trends">
    <div class="lvl-tabs" id="trend-lvl-tabs"></div>
    <div id="trend-out"></div>
  </div>

  <!-- EDIT STATIONS -->
  <div class="view" id="view-edit">
    <div class="lvl-tabs" id="edit-lvl-tabs"></div>
    <div class="edit-bar">
      <div class="entry-title" style="font-size:18px"><span id="edit-lvl-lbl">Level 1</span> Stations</div>
      <div class="meta-row">
        <button class="btn-save" onclick="saveStations()">Save Stations</button>
        <button class="btn-sec" onclick="resetStationsToDefault()">Reset to Default</button>
      </div>
    </div>
    <div class="edit-hint">Edit room number &amp; description. Add or remove stations. &#8220;Save Stations&#8221; syncs to all devices.</div>
    <div id="es-list" style="margin-top:12px"></div>
    <button class="es-add" style="margin-top:10px" onclick="addStation()">+ Add Station</button>
  </div>

  <!-- MAP -->
  <input type="file" id="map-upload-input" accept="image/*" style="display:none" onchange="uploadMap(event)">
  <input type="file" id="map-replace-input" accept="image/*" style="display:none" onchange="uploadMap(event)">
  <div class="view" id="view-map">
    <div class="lvl-tabs" id="map-lvl-tabs"></div>

function sbGet(k){
  var controller=typeof AbortController!=='undefined'?new AbortController():null;
  var timer=controller?setTimeout(function(){controller.abort();},6000):null;
  var opts={headers:SB_H};if(controller)opts.signal=controller.signal;

    .then(function(r){if(timer)clearTimeout(timer);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){return {ok:true,value:d.length?d[0].value:null};})
    .catch(function(){if(timer)clearTimeout(timer);return {ok:false};});
}

function compressImage(file,callback){
  var rd=new FileReader();
  rd.onload=function(e){
    var im=new Image();
    im.onload=function(){
      var maxDim=2200,scale=Math.min(1,maxDim/Math.max(im.naturalWidth,im.naturalHeight));
      var w=Math.max(1,Math.round(im.naturalWidth*scale)),h=Math.max(1,Math.round(im.naturalHeight*scale));
      var c=document.createElement('canvas');c.width=w;c.height=h;
      try{c.getContext('2d').drawImage(im,0,0,w,h);}catch(err){callback(null);return;}
      c.toBlob(function(b){callback(b);},'image/jpeg',0.85);
    };
    im.onerror=function(){callback(null);};
    im.src=e.target.result;
  };
  rd.onerror=function(){callback(null);};
  rd.readAsDataURL(file);
}
function uploadMapToStorage(file,level,callback){
  compressImage(file,function(blob){
    if(!blob){callback('could not read image',null);return;}
    var filename='eyewash-map-'+String(level).replace(/[^a-zA-Z0-9]/g,'')+'-'+Date.now()+'.jpg';
    var path=BUCKET+'/'+filename;
    fetch(SB_STORAGE+'/'+path,{method:'POST',headers:{'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob})
      .then(function(r){if(r.ok){callback(null,SB_STORAGE_PUB+'/'+path+'?t='+Date.now());}else{r.text().then(function(t){callback('HTTP '+r.status+': '+(t||'').slice(0,100),null);});}})
      .catch(function(e){callback((e&&e.message)||'network error',null);});
  });
}

      e.readings && e.readings[room] && e.readings[room].temp!=='' && e.readings[room].temp!=null;
  });
}
function latestReading(level,room){
  var entries=loadLog().filter(function(e){return e.level===level && e.readings && e.readings[room] && e.readings[room].temp!=='';});
  if(!entries.length)return null;
  entries.sort(function(a,b){return a.date.localeCompare(b.date);});

}

// ═══ STATION ORDERING ════════════════════════════════════════════════
// Natural sort by room number so 1A.100A comes before 1A.185, etc.
function natKey(str){
  return String(str||'').toLowerCase().replace(/(\d+)/g, function(n){ return n.padStart(8,'0'); });
}
function getStations(lv){
  var arr = (STATIONS[lv] || []).slice();
  arr.sort(function(a,b){ return natKey(a.room) < natKey(b.room) ? -1 : (natKey(a.room) > natKey(b.room) ? 1 : 0); });
  return arr;
}

// ═══ ENTRY GRID ══════════════════════════════════════════════════════
function currentEntryFor(date, level){
  // Find an already-saved entry for this date+level, or null.
  var log = loadLog();
  return log.find(function(e){ return e.date === date && e.level === level; }) || null;
}
function renderGrid(){
  var stations = getStations(entryLevel);
  document.getElementById('entry-lvl-lbl').textContent = lvlLabel(entryLevel);
  document.getElementById('status-lbl').textContent = '· ' + lvlLabel(entryLevel) + ' · ' + stations.length + ' stations';
  var grid = document.getElementById('ew-grid');
  grid.innerHTML = '';
  if(!stations.length){ grid.innerHTML = '<div class="no-data">No stations on this level<br>Add some in Edit Stations</div>'; return; }
  var date = document.getElementById('entry-date').value;
  var existing = currentEntryFor(date, entryLevel);
  stations.forEach(function(s, i){
    var prev = existing && existing.readings && existing.readings[s.room] ? existing.readings[s.room] : null;
    var card = document.createElement('div');
    card.className = 'ew-card';
    card.innerHTML =
      '<div class="ew-room">' + esc(s.room) + '</div>' +
      '<div class="ew-loc">' + esc(s.loc||'') + '</div>' +
      '<div class="ew-lbl">Temp &#176;C</div>' +
      '<div class="temp-wrap">' +
        '<input class="temp-in" id="t_' + i + '" type="number" step="0.1" inputmode="decimal" placeholder="&mdash;" oninput="onTemp(this,' + i + ')" />' +
        '<div class="pf-badge" id="pf_' + i + '"></div>' +
      '</div>' +
      '<div class="flush-row">' +
        '<span class="flush-lbl">Flushed</span>' +
        '<select class="flush-sel" id="fl_' + i + '" onchange="autoSaveEntry()">' +
          '<option value="">&mdash;</option><option value="Yes">Yes</option><option value="No">No</option>' +
        '</select>' +
      '</div>';
    grid.appendChild(card);
    // Prefill from saved data so leaving and returning keeps your numbers
    if(prev){
      var t = card.querySelector('#t_'+i), f = card.querySelector('#fl_'+i);
      if(t && prev.temp!=null){ t.value = prev.temp; onTemp(t, i); }
      if(f && prev.flush!=null){ f.value = prev.flush; }
    }
  });
}

function onTemp(el, i){
  var v = parseFloat(el.value);
  el.classList.remove('cold','hot','ok');
  var pf = document.getElementById('pf_' + i);
  if (isNaN(v) || el.value === '') { pf.innerHTML = ''; }
  else if (v < 16) { el.classList.add('cold'); pf.innerHTML = '<span class="pf-fail">&#x2717;</span><span class="pf-fail">FAIL</span>'; }
  else if (v > 38) { el.classList.add('hot'); pf.innerHTML = '<span class="pf-fail">&#x2717;</span><span class="pf-fail">FAIL</span>'; }
  else { el.classList.add('ok'); pf.innerHTML = '<span class="pf-pass">&#x2713;</span><span class="pf-pass">PASS</span>'; }
  autoSaveEntry();
}

// Auto-save the current grid to the log as you type (debounced), so navigating away never loses data.
var _autoTimer;
function autoSaveEntry(){
  clearTimeout(_autoTimer);
  _autoTimer = setTimeout(function(){ writeEntry(true); }, 600);
}

function clearTemps(){
  var stations = getStations(entryLevel);
  stations.forEach(function(s,i){
    var t = document.getElementById('t_' + i), f = document.getElementById('fl_' + i), p = document.getElementById('pf_' + i);
    if (t) { t.value = ''; t.classList.remove('cold','hot','ok'); }
    if (f) f.value = '';
    if (p) p.innerHTML = '';
  });
  // Also drop any saved entry for this date+level so cleared really means cleared
  var date = document.getElementById('entry-date').value;
  var log = loadLog().filter(function(e){ return !(e.date === date && e.level === entryLevel); });
  saveLog(log);
}

// Shared writer. silent=true for autosave (no prompts/toasts); false for the explicit Save button.
function writeEntry(silent){
  var date = document.getElementById('entry-date').value;
  if (!date) { if(!silent) showToast('Select a date'); return false; }
  var tech = document.getElementById('entry-tech').value.trim();
  var stations = getStations(entryLevel);
  var readings = {};
  var anyValue = false;
  stations.forEach(function(s,i){
    var t = document.getElementById('t_' + i), f = document.getElementById('fl_' + i);
    var temp = t ? t.value : '', flush = f ? f.value : '';
    readings[s.room] = { temp: temp, flush: flush };
    if(temp!=='' || flush!=='') anyValue = true;
  });
  if(silent && !anyValue) return false; // nothing typed yet; don't create empty rows
  if(!silent){
    var missing = stations.filter(function(s){ return !readings[s.room] || !readings[s.room].temp; });
    if (missing.length) {
      var names = missing.map(function(s){ return s.room; }).join(', ');
      if (!confirm(missing.length + ' station(s) have no temperature:\n\n' + names + '\n\nSave anyway?')) return false;
    }
  }
  var log = loadLog();
  log = log.filter(function(e){ return !(e.date === date && e.level === entryLevel); });
  log.push({ date: date, level: entryLevel, tech: tech, readings: readings });
  log.sort(function(a,b){ return a.date.localeCompare(b.date); });
  saveLog(log);
  return true;
}

function saveEntry(){
  if(writeEntry(false)) showToast('Saved \u2713');
}

// ═══ TREND LOG ═══════════════════════════════════════════════════════
function renderTrend(){
  var out = document.getElementById('trend-out');
  var stations = getStations(trendLevel);
  var log = loadLog().filter(function(e){ return e.level === trendLevel; });
  out.innerHTML = '';
  if (!stations.length) { out.innerHTML = '<div class="no-data">No stations on ' + lvlLabel(trendLevel) + '</div>'; return; }
  stations.forEach(function(s){
    var entries = log.filter(function(e){ return e.readings && e.readings[s.room] && e.readings[s.room].temp !== ''; });
    var vals = entries.map(function(e){ return parseFloat(e.readings[s.room].temp); }).filter(function(v){ return !isNaN(v); });
    var card = document.createElement('div');
    card.className = 'trend-card';
    if (!vals.length) {
      card.innerHTML = '<div class="t-room">' + esc(s.room) + '</div><div class="t-loc">' + esc(s.loc||'') + '</div><div class="no-data" style="padding:8px;text-align:left">No readings yet</div>';
      out.appendChild(card); return;
    }
    var latest = vals[vals.length-1];
    var avg = (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1);
    var pass = latest>=16 && latest<=38;
    var bars = '';
    entries.slice(-12).forEach(function(e){
      var v = parseFloat(e.readings[s.room].temp), cls = 'bar-empty', h = 4;
      if(!isNaN(v)){ h = Math.max(4, Math.min(60, Math.round((v/45)*60))); cls = v<16?'bar-cold':(v>38?'bar-hot':'bar-ok'); }
      bars += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">' +
                '<div class="bar ' + cls + '" style="width:100%;height:' + h + 'px"></div>' +
                '<div style="font-size:7px;color:rgba(245,158,11,.3)">' + fmtShort(e.date) + '</div>' +
              '</div>';
    });
    card.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">' +
        '<div style="flex:1;min-width:0"><div class="t-room">' + esc(s.room) + '</div><div class="t-loc">' + esc(s.loc||'') + '</div>' +
          '<div style="display:flex;gap:6px;align-items:flex-end;height:64px;margin-top:6px">' + bars + '</div>' +
        '</div>' +
        '<div style="text-align:right"><div class="t-latest">' + latest + '&#176;</div>' +
          '<div class="' + (pass?'t-pass':'t-fail') + '">' + (pass?'PASS':'FAIL') + '</div>' +
          '<div class="t-avg">avg ' + avg + '&#176; · ' + vals.length + ' rdg</div>' +
        '</div>' +
      '</div>';
    out.appendChild(card);
  });
}

function saveStations(){

function pinSVG(color, glow){

    '<ellipse cx="15" cy="14.4" rx="5" ry="2" fill="#aeb2b8"/>'+
    '<path d="M11 14 q-1 -4 1 -6" fill="none" stroke="#c7cace" stroke-width="1.2" stroke-linecap="round"/>'+
    '<path d="M19 14 q1 -4 -1 -5.5" fill="none" stroke="#c7cace" stroke-width="1.2" stroke-linecap="round"/>'+
    '<circle cx="12" cy="7.6" r="1.9" fill="#f59e0b"/>'+
    '<circle cx="18.2" cy="8.4" r="1.9" fill="#f59e0b"/>'+
    '</svg>';
}

function renderMap(highlightRoom){
  document.getElementById('map-title').textContent = lvlLabel(mapLevel) + ' \u2014 Floor Plan';
  var content = document.getElementById('map-content');
  if(!_maps[mapLevel]){
    var dz = document.createElement('div');
    dz.className='map-upload-area'; dz.id='drop-zone';
    dz.innerHTML='<div class="map-upload-icon">&#x1F5FA;</div>'+
      '<div class="map-upload-text">No floor plan for '+lvlLabel(mapLevel)+'<br>Upload one to place eyewash pins</div>'+
      '<button class="btn-upload" onclick="document.getElementById(\'map-upload-input\').click()">&#8593; Upload Floor Plan</button>'+
      '<div style="font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.2);text-transform:uppercase">JPG &middot; PNG &middot; Drag &amp; drop</div>';
    content.innerHTML=''; content.appendChild(dz);
    dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
    dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(!f||!f.type.match(/image/)){showToast('Drop an image file');return;}doMapUpload(f);});
    return;
  }
  content.innerHTML=
    '<div class="map-container" id="map-container" style="height:260px">'+
      '<div class="map-zoom-layer" id="map-zoom-layer">'+
        '<img id="map-img" src="'+_maps[mapLevel]+'" alt="Floor Plan">'+
        '<div class="map-pins-overlay" id="map-pins-overlay"></div>'+
      '</div>'+
      '<div id="map-tooltip"></div>'+
    '</div>'+
    '<div class="map-controls">'+
      '<button class="btn-secondary" onclick="document.getElementById(\'map-replace-input\').click()">\u2191 Replace Map</button>'+
      '<button class="btn-secondary" onclick="clearMap()" style="color:rgba(239,68,68,.5);border-color:rgba(239,68,68,.2)">\u2715 Clear Map</button>'+
      '<div class="map-legend">'+
        '<span><span class="legend-dot" style="background:#22c55e;box-shadow:0 0 6px #4ade8099"></span>Logged this month</span>'+
        '<span><span class="legend-dot" style="background:#f59e0b;box-shadow:0 0 6px #f59e0b99"></span>Not yet</span>'+
      '</div>'+
    '</div>';
  buildMapPins(highlightRoom);
  setupMapZoom();
}

function buildMapPins(highlightRoom){
  var overlay=document.getElementById('map-pins-overlay'); if(!overlay)return; overlay.innerHTML='';
  var pins=_pins[mapLevel]||{};
  getStations(mapLevel).forEach(function(s){
    var p=pins[s.room]; if(!p)return;
    var logged=loggedThisMonth(mapLevel,s.room);
    var color=logged?'#22c55e':'#f59e0b', glow=logged?'#4ade80':'#f59e0b';
    var isHl=(s.room===highlightRoom);
    var marker=document.createElement('div');
    marker.className='map-pin-marker'+(isHl?' hl':'');
    marker.style.left=(p.x*100).toFixed(2)+'%';
    marker.style.top=(p.y*100).toFixed(2)+'%';
    marker.innerHTML=pinSVG(color,glow);
    marker._room=s.room;
    marker.addEventListener('mouseenter',function(e){mapPinEnter(s.room);});
    marker.addEventListener('mouseleave',mapPinLeave);
    overlay.appendChild(marker);
  });
}

function mapPinEnter(room){
  var tt=document.getElementById('map-tooltip'); if(!tt)return;
  var p=(_pins[mapLevel]||{})[room]; if(!p)return;
  var st=getStations(mapLevel).find(function(s){return s.room===room;})||{};
  var lr=latestReading(mapLevel,room);
  tt.innerHTML=esc(room)+(st.loc?'<span class="tt-sub">'+esc(st.loc)+'</span>':'')+
    (lr?'<span class="tt-sub" style="color:'+(parseFloat(lr.temp)>=16&&parseFloat(lr.temp)<=38?'#4ade80':'#f87171')+'">'+lr.temp+'\u00b0C \u00b7 '+fmtShort(lr.date)+'</span>':'<span class="tt-sub">No readings</span>');
  var ov=document.getElementById('map-pins-overlay'),W=ov?ov.clientWidth:300,H=ov?ov.clientHeight:300;
  tt.style.left=(p.x*W)+'px'; tt.style.top=(p.y*H)+'px'; tt.style.display='block';
}
function mapPinLeave(){var tt=document.getElementById('map-tooltip');if(tt)tt.style.display='none';}

function mapPinClick(room){
  var st=getStations(mapLevel).find(function(s){return s.room===room;})||{};
  var lr=latestReading(mapLevel,room), logged=loggedThisMonth(mapLevel,room);
  _pipRoom=room;
  document.getElementById('pip-id').textContent=room;
  document.getElementById('pip-loc').textContent=st.loc||'No description';
  var dot=document.getElementById('pip-dot'), txt=document.getElementById('pip-status-text');
  dot.style.cssText='width:8px;height:8px;border-radius:50%;flex-shrink:0;background:'+(logged?'#4ade80':'#f59e0b')+';box-shadow:0 0 6px '+(logged?'#4ade80':'#f59e0b');
  txt.textContent=logged?('\u2713 Logged this month'+(lr?' \u2014 '+lr.temp+'\u00b0C':'')):(lr?('Last: '+lr.temp+'\u00b0C on '+fmtShort(lr.date)):'Not logged yet');
  txt.style.color=logged?'#4ade80':'rgba(245,158,11,.7)';
  document.getElementById('pin-info-panel').classList.add('show');
}
function closePinInfo(){document.getElementById('pin-info-panel').classList.remove('show');_pipRoom=null;}
function pinGoEntry(){
  if(!_pipRoom)return;
  closePinInfo();
  entryLevel=mapLevel;
  // sync entry level tabs highlight
  var c=document.getElementById('entry-lvl-tabs');
  if(c){c.querySelectorAll('.lvl-tab').forEach(function(t){t.classList.toggle('active',t.textContent===lvlLabel(mapLevel));});}
  renderGrid();
  document.querySelector('.tab').click(); // first tab = Monthly Entry
}

// ── pan / zoom / pinch / tap (ported from fire-extinguisher) ──
function setupMapZoom(){
  var con=document.getElementById('map-container'),layer=document.getElementById('map-zoom-layer'),img=document.getElementById('map-img');
  if(!con||!layer||!img)return;
  function setH(){if(img.naturalWidth&&img.naturalHeight){var r=img.naturalHeight/img.naturalWidth;con.style.height=Math.round((con.clientWidth||360)*r)+'px';layer.style.width='100%';layer.style.height='100%';}}
  if(img.complete&&img.naturalWidth)setH();else img.onload=setH;
  var sc=1,tx=0,ty=0;
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function clT(s,x,y){var w=con.clientWidth,h=con.clientHeight;return{x:clamp(x,w-w*s,0),y:clamp(y,h-h*s,0)};}
  function apT(){layer.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')';}
  con.addEventListener('wheel',function(e){e.preventDefault();var r=con.getBoundingClientRect(),ox=e.clientX-r.left,oy=e.clientY-r.top;var ns=clamp(sc*(e.deltaY<0?1.15:0.87),1,6),ratio=ns/sc;tx=ox-(ox-tx)*ratio;ty=oy-(oy-ty)*ratio;sc=ns;var t=clT(sc,tx,ty);tx=t.x;ty=t.y;apT();},{passive:false});
  var touches={},lDist=null,lMid=null,tapStart=null,tapMoved=false;
  function findPin(cx,cy){var r=con.getBoundingClientRect();var px=(cx-r.left-tx)/sc,py=(cy-r.top-ty)/sc;var ov=document.getElementById('map-pins-overlay');if(!ov)return null;var W=ov.clientWidth,H=ov.clientHeight;var pins=ov.children,best=null,bestD=9999;for(var i=0;i<pins.length;i++){var p=pins[i];if(!p._room)continue;var pinX=parseFloat(p.style.left)/100*W;var pinY=parseFloat(p.style.top)/100*H;var d=Math.sqrt((px-pinX)*(px-pinX)+(py-pinY)*(py-pinY));if(d<22&&d<bestD){best=p._room;bestD=d;}}return best;}
  con.addEventListener('touchstart',function(e){e.preventDefault();Array.from(e.changedTouches).forEach(function(t){touches[t.identifier]=t;});if(Object.keys(touches).length===1){var t0=e.changedTouches[0];tapStart={x:t0.clientX,y:t0.clientY,time:Date.now()};tapMoved=false;}else{tapStart=null;}lDist=null;lMid=null;},{passive:false});
  con.addEventListener('touchmove',function(e){e.preventDefault();Array.from(e.changedTouches).forEach(function(t){touches[t.identifier]=t;});if(tapStart){var t0=e.changedTouches[0];var dx=t0.clientX-tapStart.x,dy=t0.clientY-tapStart.y;if(Math.sqrt(dx*dx+dy*dy)>10)tapMoved=true;}var ids=Object.keys(touches),r=con.getBoundingClientRect();if(ids.length===2){var t1=touches[ids[0]],t2=touches[ids[1]];var dx2=t1.clientX-t2.clientX,dy2=t1.clientY-t2.clientY;var dist=Math.sqrt(dx2*dx2+dy2*dy2);var mid={x:((t1.clientX+t2.clientX)/2)-r.left,y:((t1.clientY+t2.clientY)/2)-r.top};if(lDist!==null){var ns=clamp(sc*(dist/lDist),1,6),ratio=ns/sc;tx=mid.x-(mid.x-tx)*ratio;ty=mid.y-(mid.y-ty)*ratio;sc=ns;}if(lMid!==null){tx+=mid.x-lMid.x;ty+=mid.y-lMid.y;}lDist=dist;lMid=mid;}else if(ids.length===1){var t=touches[ids[0]];if(lMid!==null){tx+=t.clientX-r.left-lMid.x;ty+=t.clientY-r.top-lMid.y;}lMid={x:t.clientX-r.left,y:t.clientY-r.top};}var cl=clT(sc,tx,ty);tx=cl.x;ty=cl.y;apT();},{passive:false});
  con.addEventListener('touchend',function(e){var t0=e.changedTouches[0];var wasTap=tapStart&&!tapMoved&&(Date.now()-tapStart.time)<400&&Object.keys(touches).length===1;if(wasTap){var hitId=findPin(t0.clientX,t0.clientY);if(hitId)mapPinClick(hitId);else closePinInfo();}Array.from(e.changedTouches).forEach(function(t){delete touches[t.identifier];});if(Object.keys(touches).length<2)lDist=null;if(Object.keys(touches).length===0){lMid=null;tapStart=null;}},{passive:false});
  var drag=false,ds=null;
  con.addEventListener('mousedown',function(e){drag=true;ds={x:e.clientX-tx,y:e.clientY-ty};con.classList.add('panning');});
  window.addEventListener('mousemove',function(e){if(!drag||!ds)return;tx=e.clientX-ds.x;ty=e.clientY-ds.y;var cl=clT(sc,tx,ty);tx=cl.x;ty=cl.y;apT();});
  window.addEventListener('mouseup',function(){drag=false;ds=null;con.classList.remove('panning');});
  con.addEventListener('click',function(e){if(e.target===con||e.target===layer||e.target.tagName==='IMG'){var hit=findPin(e.clientX,e.clientY);if(hit)mapPinClick(hit);else closePinInfo();}});
}

// ── map upload (Storage) ──
function doMapUpload(file){
  setIndicator('Uploading map…','#fcd34d');
  uploadMapToStorage(file,mapLevel,function(err,url){
    if(err||!url){setIndicator('Map upload failed — '+err,'#ef4444');showToast('Map upload failed');return;}
    _maps[mapLevel]=url;
    sbSet(MAPS_KEY,_maps).then(function(){setIndicator('Map saved','#22c55e');setTimeout(function(){setIndicator('','');},2500);}).catch(function(){});
    showToast('Map uploaded \u2713');
    renderMap();
  });
}
function uploadMap(event){var f=event.target.files[0];if(!f)return;doMapUpload(f);event.target.value='';}
function clearMap(){
  if(!confirm('Remove floor plan for '+lvlLabel(mapLevel)+'?'))return;
  delete _maps[mapLevel]; sbSet(MAPS_KEY,_maps); renderMap(); showToast('Map removed');
}

// ── placement modal (called from Edit Stations "Place" button) ──
function openPlacement(level, room){
  if(!_maps[level]){showToast('Upload a floor plan for '+lvlLabel(level)+' first');mapLevel=level;syncMapTabs();showView('map');return;}
  _pendingPlace={level:level,room:room};_placeX=null;_placeY=null;
  document.getElementById('pm-title').textContent='Set Location \u2014 '+room;
  document.getElementById('pm-sub').textContent=lvlLabel(level)+' \u00b7 Tap map to place pin';
  document.getElementById('pm-confirm').style.display='none';
  document.getElementById('placement-img').src=_maps[level];
  renderPlaceSVG(null,null);
  var existing=(_pins[level]||{})[room];
  if(existing){_placeX=existing.x;_placeY=existing.y;renderPlaceSVG(existing.x,existing.y);document.getElementById('pm-confirm').style.display='flex';}
  document.getElementById('placement-modal').classList.add('active');
  var wrap=document.getElementById('placement-map-wrap');
  wrap._ch=function(e){var imgEl=document.getElementById('placement-img');var rect=imgEl.getBoundingClientRect();_placeX=Math.max(0.01,Math.min(0.99,(e.clientX-rect.left)/rect.width));_placeY=Math.max(0.01,Math.min(0.99,(e.clientY-rect.top)/rect.height));renderPlaceSVG(_placeX,_placeY);document.getElementById('pm-confirm').style.display='flex';};
  wrap.addEventListener('click',wrap._ch);
}
function renderPlaceSVG(px,py){
  var svg=document.getElementById('placement-svg');if(px===null){svg.innerHTML='';return;}
  var x=(px*100).toFixed(2),y=(py*100).toFixed(2);
  svg.innerHTML='<circle cx="'+x+'" cy="'+y+'" r="3" fill="rgba(245,158,11,.3)" stroke="#f59e0b" stroke-width="0.8"/><circle cx="'+x+'" cy="'+y+'" r="1.1" fill="#f59e0b"/><line x1="'+x+'" y1="0" x2="'+x+'" y2="100" stroke="rgba(245,158,11,.25)" stroke-width="0.4" stroke-dasharray="2 2"/><line x1="0" y1="'+y+'" x2="100" y2="'+y+'" stroke="rgba(245,158,11,.25)" stroke-width="0.4" stroke-dasharray="2 2"/>';
}
function confirmPlacement(){
  if(!_pendingPlace||_placeX===null)return;
  var lv=_pendingPlace.level, room=_pendingPlace.room;
  if(!_pins[lv])_pins[lv]={};
  _pins[lv][room]={x:_placeX,y:_placeY};
  try{localStorage.setItem(PINS_KEY,JSON.stringify(_pins));}catch(e){}
  sbSet(PINS_KEY,_pins).then(function(){setIndicator('Pin saved','#22c55e');setTimeout(function(){setIndicator('','');},2000);}).catch(function(){});
  showToast('Location saved \u2713');
  closePlacement();
  if(document.getElementById('view-edit').classList.contains('active'))renderEdit();
  if(document.getElementById('view-map').classList.contains('active'))renderMap();
}
function closePlacement(){
  document.getElementById('placement-modal').classList.remove('active');
  var wrap=document.getElementById('placement-map-wrap');if(wrap._ch){wrap.removeEventListener('click',wrap._ch);wrap._ch=null;}
  _pendingPlace=null;_placeX=null;_placeY=null;
}
function syncMapTabs(){
  var c=document.getElementById('map-lvl-tabs');
  if(c)c.querySelectorAll('.lvl-tab').forEach(function(t){t.classList.toggle('active',t.textContent===lvlLabel(mapLevel));});
}

// ═══ CSV EXPORT ══════════════════════════════════════════════════════
function exportCSV(){
  var log = loadLog();
  var csv = 'Date,Level,Technician,Room,Location,Temp(C),Flushed\n';
  log.forEach(function(e){
    var stations = STATIONS[e.level] || [];
    Object.keys(e.readings || {}).forEach(function(room){
      var r = e.readings[room], st = stations.find(function(s){ return s.room === room; }) || {};
      csv += '"' + e.date + '","' + lvlLabel(e.level) + '","' + (e.tech||'') + '","' + room + '","' + (st.loc||'') + '","' + (r.temp||'') + '","' + (r.flush||'') + '"\n';
    });
  });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'mhac-eyewash-log.csv';
  a.click();
  showToast('Exported \u2713');
}

// ═══ HELPERS ═════════════════════════════════════════════════════════
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showView(name, btn){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'trends') renderTrend();
  if (name === 'edit') renderEdit();
  if (name === 'map') { syncMapTabs(); renderMap(); }
}
function fmtShort(d){
  if (!d) return '';
  var parts = d.split('-');
  return ['J','F','M','A','M','J','J','A','S','O','N','D'][parseInt(parts[1])-1] + parts[2];
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ═══ INIT ════════════════════════════════════════════════════════════
var urlLvl = new URLSearchParams(window.location.search).get('level');
if(urlLvl && (LEVEL_ORDER.indexOf(urlLvl) !== -1)){ entryLevel = urlLvl; trendLevel = urlLvl; editLevel = urlLvl; mapLevel = urlLvl; }
var ewBb = document.getElementById('ew-back-btn');
if(ewBb && urlLvl) ewBb.href = 'level-reports.html?level=' + urlLvl;

mkTabs('entry-lvl-tabs', entryLevel, function(l){ entryLevel = l; renderGrid(); });
mkTabs('trend-lvl-tabs', trendLevel, function(l){ trendLevel = l; renderTrend(); });
mkTabs('edit-lvl-tabs',  editLevel,  function(l){ editLevel = l;  renderEdit(); });
mkTabs('map-lvl-tabs',   mapLevel,   function(l){ mapLevel = l;   closePinInfo(); renderMap(); });
document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
document.getElementById('entry-date').addEventListener('change', function(){ renderGrid(); });
document.getElementById('entry-tech').addEventListener('input', function(){ autoSaveEntry(); });

// CLOUD INIT — load the reading log AND the station roster, then render.
(function(){
  var done=false;
  function finish(){
    if(done)return;done=true;
    document.getElementById('cloud-overlay').style.display='none';
    renderGrid();
  }
  var pending=4;
  function step(){ if(--pending<=0) finish(); }

  // 1) Station roster
  sbGet(STATIONS_KEY).then(function(res){
    if(res.ok){
      if(res.value && typeof res.value==='object'){
        // merge: ensure every known level key exists
        STATIONS = res.value;
        LEVEL_ORDER.forEach(function(lv){ if(!STATIONS[lv]) STATIONS[lv]=[]; });
        _stationsBlocked=false;
      } else {
        // no roster in cloud yet -> seed defaults up so all devices share them
        _stationsBlocked=false;
        saveStationsToCloud();
      }
    } else {
      // fetch failed: use local copy if present, otherwise defaults; don't overwrite cloud
      try{ var loc=JSON.parse(localStorage.getItem(STATIONS_KEY)); if(loc) STATIONS=loc; }catch(e){}
      _stationsBlocked=true;
    }
    step();
  });

  // 2) Reading log
  sbGet(LOG_KEY).then(function(res){
    if(res.ok && res.value!==null){
      try{ localStorage.setItem(LOG_KEY, JSON.stringify(res.value)); }catch(e){}
    }
    step();
  });

  // 3) Map image URLs
  sbGet(MAPS_KEY).then(function(res){
    if(res.ok && res.value && typeof res.value==='object') _maps=res.value;
    step();
  });

  // 4) Pin coordinates
  sbGet(PINS_KEY).then(function(res){
    if(res.ok && res.value && typeof res.value==='object') _pins=res.value;
    else { try{ var lp=JSON.parse(localStorage.getItem(PINS_KEY)); if(lp) _pins=lp; }catch(e){} }
    step();
  });

  setTimeout(finish, 12000); // safety net
})();
</script>
