<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Eyewash Temperature Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97) 0%,rgba(12,7,0,.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover,.tb-btn.primary{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35)}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:72px 16px 48px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;padding-top:8px;flex-wrap:wrap}
.tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.view{display:none}.view.active{display:block}
.lvl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.lvl-tab{padding:5px 14px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.lvl-tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.entry-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.meta-row{display:flex;gap:8px;flex-wrap:wrap}
.meta-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:5px 10px;outline:none}
.meta-in:focus{border-color:rgba(245,158,11,.5)}
.range-note{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:12px;padding:5px 10px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.1);border-radius:4px;display:inline-block}
.range-note span{color:rgba(34,197,94,.6)}
.ew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.ew-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:12px}
.ew-room{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light)}
.ew-loc{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-bottom:8px}
.ew-lbl{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700;margin-bottom:3px}
.temp-wrap{display:flex;align-items:center;gap:8px}
.temp-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;padding:5px 8px;outline:none;width:80px;text-align:center;transition:all .2s}
.temp-in:focus{border-color:rgba(245,158,11,.5)}
.temp-in.cold{border-color:rgba(59,130,246,.5);background:rgba(59,130,246,.08);color:#93c5fd}
.temp-in.hot{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08);color:#fca5a5}
.temp-in.ok{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06);color:#4ade80}
.pf-badge{display:flex;flex-direction:column;align-items:center;line-height:1.2;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;min-width:28px}
.pf-pass{color:#4ade80}.pf-fail{color:#f87171}
.flush-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.flush-lbl{font-size:8px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.flush-sel{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:4px 8px;outline:none;flex:1}
.flush-sel option{background:#0f0a03}
.act-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.btn-save{padding:8px 20px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-save:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.btn-sec{padding:8px 14px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-sec:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.7)}
.trend-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:8px}
.t-room{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--amber-light)}
.t-loc{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:10px}
.t-latest{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fef3c7}
.t-pass{color:#4ade80;font-weight:700;font-size:11px;letter-spacing:1px}
.t-fail{color:#f87171;font-weight:700;font-size:11px;letter-spacing:1px}
.t-avg{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-top:3px}
.bar{border-radius:2px 2px 0 0;min-height:3px}
.bar-ok{background:rgba(34,197,94,.6)}.bar-cold{background:rgba(59,130,246,.6)}.bar-hot{background:rgba(239,68,68,.6)}.bar-empty{background:rgba(245,158,11,.1)}
.no-data{text-align:center;padding:32px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;line-height:2}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* ── Edit Stations mode ── */
.edit-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.edit-hint{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.35);text-transform:uppercase}
.es-row{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:8px;margin-bottom:6px}
.es-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 8px;outline:none}
.es-in:focus{border-color:rgba(245,158,11,.5)}
.es-room{width:110px;flex-shrink:0}
.es-loc{flex:1;min-width:90px}
.es-del{flex-shrink:0;width:30px;height:30px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.06);border-radius:5px;color:#f87171;font-size:15px;font-weight:700;cursor:pointer;line-height:1}
.es-del:hover{background:rgba(239,68,68,.16)}
.es-add{padding:7px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:5px;color:#4ade80;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.es-add:hover{background:rgba(34,197,94,.18)}
.indi{font-size:10px;letter-spacing:1.5px;font-weight:600}
</style>
<script>
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>

<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing data...</div>

</div>

<nav class="topbar">

  </div>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showView('entry',this)">Monthly Entry</button>

  <!-- ENTRY -->

        <input type="date" class="meta-in" id="entry-date"/>
        <input type="text" class="meta-in" id="entry-tech" placeholder="Technician" style="width:140px"/>
      </div>

  <!-- TRENDS -->

    <div class="lvl-tabs" id="trend-lvl-tabs"></div>

  </div>

  <!-- EDIT STATIONS -->
  <div class="view" id="view-edit">

      <div class="entry-title" style="font-size:18px"><span id="edit-lvl-lbl">Level 1</span> Stations</div>
      <div class="meta-row">
        <button class="btn-save" onclick="saveStations()">Save Stations</button>
        <button class="btn-sec" onclick="resetStationsToDefault()">Reset to Default</button>
      </div>
    </div>
    <div class="edit-hint">Edit room number &amp; description. Add or remove stations. &#8220;Save Stations&#8221; syncs to all devices.</div>
    <div id="es-list" style="margin-top:12px"></div>

<div class="statusbar">

  <span id="status-lbl"></span>
  <span class="indi" id="sync-indi"></span>

</div>
<div class="toast" id="toast"></div>

<script>
// ═══ SUPABASE SYNC ═══════════════════════════════════════════════════
const SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
const SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
const SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};

function sbGet(k){
  var controller=typeof AbortController!=='undefined'?new AbortController():null;
  var timer=controller?setTimeout(function(){controller.abort();},6000):null;
  var opts={headers:SB_H};if(controller)opts.signal=controller.signal;
  return fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',opts)
    .then(function(r){if(timer)clearTimeout(timer);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){return {ok:true,value:d.length?d[0].value:null};})
    .catch(function(){if(timer)clearTimeout(timer);return {ok:false};});
}
function sbSet(k,v){
  return fetch(SB_URL+'/rest/v1/app_data',{
    method:'POST',
    headers:Object.assign({},SB_H,{'Prefer':'resolution=merge-duplicates'}),
    body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})
  });
}

// ═══ KEYS ════════════════════════════════════════════════════════════
const LOG_KEY='mhac-eyewash-log';        // reading history (unchanged from before)
const STATIONS_KEY='mhac-eyewash-stations'; // editable station roster (new, cloud-synced)

// ═══ DEFAULT STATION ROSTER (first digit = floor; PH = penthouse) ═════
// 41 stations transcribed from the Emergency Shower Checklist.
var DEFAULT_STATIONS = {
  'PH': [
    {room:'PH WEST', loc:'Glycol Pumps'},
    {room:'PH EAST', loc:'HVAC Shaft 5'}
  ],
  '5': [
    {room:'5A.588', loc:'Housekeeping'},
    {room:'5A.587', loc:'Housekeeping'}
  ],
  '4': [
    {room:'4A.100A', loc:'Medication Room'},
    {room:'4A.350', loc:'Maintenance Shop'},
    {room:'4A.322A', loc:'Chemical/Housekeeping'},
    {room:'4A.322 NE', loc:'North East'},
    {room:'4A.322 NW', loc:'North West'},
    {room:'4A.322 Shower', loc:'North Shower'},
    {room:'4A.161', loc:'Servery'},
    {room:'4A.100H', loc:'Housekeeping'},
    {room:'4A.100B', loc:'Soiled Utility'}
  ],
  '3': [
    {room:'3A.146', loc:'Storage/Equipment'},
    {room:'3A.100A', loc:'Medication Room'},
    {room:'3A.323', loc:'Housekeeping'},
    {room:'3A.161', loc:'Servery'},
    {room:'3A.100H', loc:'Housekeeping'},
    {room:'3A.100B', loc:'Soiled Utility'}
  ],
  '2': [
    {room:'2A.353', loc:'BioMedical Warehouse'},
    {room:'2A.340A', loc:'Medication Room'},
    {room:'2A.100A', loc:'Medication Room'},
    {room:'2A.351', loc:'Facilities Warehouse'},
    {room:'2A.323', loc:'Housekeeping'},
    {room:'2A.212', loc:'Housekeeping'},
    {room:'2A.161', loc:'Servery'},
    {room:'2A.100H', loc:'Housekeeping'},
    {room:'2A.100b', loc:'Soiled Utility'}
  ],
  '1': [
    {room:'1A.231', loc:'Medication Room'},
    {room:'1A.100A', loc:'Housekeeping'},
    {room:'1A.185', loc:'Soiled Utility'},
    {room:'1A.100B', loc:'Medication Room'},
    {room:'1A.301 E', loc:'Pharmacy EAST'},
    {room:'1A.301 S', loc:'Pharmacy SOUTH'},
    {room:'1A.353', loc:'Laundry Room'},
    {room:'1A.305', loc:'Housekeeping'},
    {room:'1A.226', loc:'Soiled Utility'},
    {room:'1A.224', loc:'Housekeeping'},
    {room:'1A.191', loc:'Servery'},
    {room:'1A.350', loc:'Storage'},
    {room:'1A.351', loc:'Soiled Utility'}
  ]
};
var LEVEL_ORDER = ['PH','5','4','3','2','1'];
function lvlLabel(lv){ return lv === 'PH' ? 'Penthouse' : 'Level ' + lv; }

// Live roster (starts as a deep copy of defaults; replaced by cloud data if present)
var STATIONS = JSON.parse(JSON.stringify(DEFAULT_STATIONS));

var entryLevel = '1';
var trendLevel = '1';
var editLevel  = '1';
var _stationsBlocked = false; // true only if cloud roster fetch failed -> don't overwrite cloud

// ═══ LOG STORAGE ═════════════════════════════════════════════════════
function loadLog(){ try{ return JSON.parse(localStorage.getItem(LOG_KEY))||[]; }catch(e){return[];} }
function saveLog(d){
  try{ localStorage.setItem(LOG_KEY, JSON.stringify(d)); }catch(e){}
  setIndicator('Saving…','#fcd34d');
  sbSet(LOG_KEY, d).then(function(r){
    if(!r||!r.ok)throw 0;
    setIndicator('Saved','#22c55e'); setTimeout(function(){setIndicator('','');},2500);
  }).catch(function(){ setIndicator('Cloud save failed — saved on device','#ef4444'); });
}

// ═══ STATION ROSTER STORAGE ══════════════════════════════════════════
function saveStationsToCloud(){
  try{ localStorage.setItem(STATIONS_KEY, JSON.stringify(STATIONS)); }catch(e){}
  if(_stationsBlocked){ setIndicator('Offline — roster saved on device only','#f59e0b'); return; }
  setIndicator('Saving roster…','#fcd34d');
  sbSet(STATIONS_KEY, STATIONS).then(function(r){
    if(!r||!r.ok)throw 0;
    setIndicator('Roster saved','#22c55e'); setTimeout(function(){setIndicator('','');},2500);
  }).catch(function(){ setIndicator('Roster cloud save failed — on device only','#ef4444'); });
}

function setIndicator(text,color){ var s=document.getElementById('sync-indi'); if(s){ s.textContent=text?('· '+text):''; s.style.color=color||''; } }

// ═══ LEVEL TABS ══════════════════════════════════════════════════════
function mkTabs(containerId, activeLevel, onSelect){
  var c = document.getElementById(containerId);
  c.innerHTML = '';
  LEVEL_ORDER.forEach(function(lv){
    var b = document.createElement('button');
    b.className = 'lvl-tab' + (lv === activeLevel ? ' active' : '');
    b.textContent = lvlLabel(lv);
    b.onclick = function(){
      c.querySelectorAll('.lvl-tab').forEach(function(t){ t.classList.remove('active'); });
      b.classList.add('active');
      onSelect(lv);
    };
    c.appendChild(b);
  });
}

// ═══ ENTRY GRID ══════════════════════════════════════════════════════
function renderGrid(){
  var stations = STATIONS[entryLevel] || [];
  document.getElementById('entry-lvl-lbl').textContent = lvlLabel(entryLevel);
  document.getElementById('status-lbl').textContent = '· ' + lvlLabel(entryLevel) + ' · ' + stations.length + ' stations';
  var grid = document.getElementById('ew-grid');
  grid.innerHTML = '';
  if(!stations.length){ grid.innerHTML = '<div class="no-data">No stations on this level<br>Add some in Edit Stations</div>'; return; }
  stations.forEach(function(s, i){
    var key = entryLevel + '|' + i; // stable per-position id
    var card = document.createElement('div');
    card.className = 'ew-card';
    card.innerHTML =
      '<div class="ew-room">' + esc(s.room) + '</div>' +
      '<div class="ew-loc">' + esc(s.loc||'') + '</div>' +
      '<div class="ew-lbl">Temp &#176;C</div>' +
      '<div class="temp-wrap">' +
        '<input class="temp-in" id="t_' + i + '" type="number" step="0.1" inputmode="decimal" placeholder="&mdash;" oninput="onTemp(this,' + i + ')" />' +
        '<div class="pf-badge" id="pf_' + i + '"></div>' +
      '</div>' +
      '<div class="flush-row">' +
        '<span class="flush-lbl">Flushed</span>' +
        '<select class="flush-sel" id="fl_' + i + '">' +
          '<option value="">&mdash;</option><option value="Yes">Yes</option><option value="No">No</option>' +
        '</select>' +
      '</div>';
    grid.appendChild(card);
  });
}

function onTemp(el, i){
  var v = parseFloat(el.value);
  el.classList.remove('cold','hot','ok');
  var pf = document.getElementById('pf_' + i);
  if (isNaN(v) || el.value === '') { pf.innerHTML = ''; return; }
  if (v < 16) { el.classList.add('cold'); pf.innerHTML = '<span class="pf-fail">&#x2717;</span><span class="pf-fail">FAIL</span>'; }
  else if (v > 38) { el.classList.add('hot'); pf.innerHTML = '<span class="pf-fail">&#x2717;</span><span class="pf-fail">FAIL</span>'; }
  else { el.classList.add('ok'); pf.innerHTML = '<span class="pf-pass">&#x2713;</span><span class="pf-pass">PASS</span>'; }
}

function clearTemps(){
  var stations = STATIONS[entryLevel] || [];
  stations.forEach(function(s,i){
    var t = document.getElementById('t_' + i), f = document.getElementById('fl_' + i), p = document.getElementById('pf_' + i);
    if (t) { t.value = ''; t.classList.remove('cold','hot','ok'); }
    if (f) f.value = '';
    if (p) p.innerHTML = '';
  });
}

function saveEntry(){
  var date = document.getElementById('entry-date').value;
  var tech = document.getElementById('entry-tech').value.trim();
  if (!date) { showToast('Select a date'); return; }
  var stations = STATIONS[entryLevel] || [];
  var readings = {};
  stations.forEach(function(s,i){
    var t = document.getElementById('t_' + i), f = document.getElementById('fl_' + i);
    readings[s.room] = { temp: t ? t.value : '', flush: f ? f.value : '' };
  });
  var missing = stations.filter(function(s){ return !readings[s.room] || !readings[s.room].temp; });
  if (missing.length) {
    var names = missing.map(function(s){ return s.room; }).join(', ');
    if (!confirm(missing.length + ' station(s) have no temperature:\n\n' + names + '\n\nSave anyway?')) return;
  }
  var log = loadLog();
  log = log.filter(function(e){ return !(e.date === date && e.level === entryLevel); });
  log.push({ date: date, level: entryLevel, tech: tech, readings: readings });
  log.sort(function(a,b){ return a.date.localeCompare(b.date); });
  saveLog(log);
  showToast('Saved \u2713');
}

// ═══ TREND LOG ═══════════════════════════════════════════════════════
function renderTrend(){
  var out = document.getElementById('trend-out');
  var stations = STATIONS[trendLevel] || [];
  var log = loadLog().filter(function(e){ return e.level === trendLevel; });
  out.innerHTML = '';
  if (!stations.length) { out.innerHTML = '<div class="no-data">No stations on ' + lvlLabel(trendLevel) + '</div>'; return; }
  stations.forEach(function(s){
    var entries = log.filter(function(e){ return e.readings && e.readings[s.room] && e.readings[s.room].temp !== ''; });
    var vals = entries.map(function(e){ return parseFloat(e.readings[s.room].temp); }).filter(function(v){ return !isNaN(v); });
    var card = document.createElement('div');
    card.className = 'trend-card';
    if (!vals.length) {
      card.innerHTML = '<div class="t-room">' + esc(s.room) + '</div><div class="t-loc">' + esc(s.loc||'') + '</div><div class="no-data" style="padding:8px;text-align:left">No readings yet</div>';
      out.appendChild(card); return;
    }
    var latest = vals[vals.length-1];
    var avg = (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1);
    var pass = latest>=16 && latest<=38;
    var bars = '';
    entries.slice(-12).forEach(function(e){
      var v = parseFloat(e.readings[s.room].temp), cls = 'bar-empty', h = 4;
      if(!isNaN(v)){ h = Math.max(4, Math.min(60, Math.round((v/45)*60))); cls = v<16?'bar-cold':(v>38?'bar-hot':'bar-ok'); }
      bars += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">' +
                '<div class="bar ' + cls + '" style="width:100%;height:' + h + 'px"></div>' +
                '<div style="font-size:7px;color:rgba(245,158,11,.3)">' + fmtShort(e.date) + '</div>' +
              '</div>';
    });
    card.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">' +
        '<div style="flex:1;min-width:0"><div class="t-room">' + esc(s.room) + '</div><div class="t-loc">' + esc(s.loc||'') + '</div>' +
          '<div style="display:flex;gap:6px;align-items:flex-end;height:64px;margin-top:6px">' + bars + '</div>' +
        '</div>' +
        '<div style="text-align:right"><div class="t-latest">' + latest + '&#176;</div>' +
          '<div class="' + (pass?'t-pass':'t-fail') + '">' + (pass?'PASS':'FAIL') + '</div>' +
          '<div class="t-avg">avg ' + avg + '&#176; · ' + vals.length + ' rdg</div>' +
        '</div>' +
      '</div>';
    out.appendChild(card);
  });
}

// ═══ EDIT STATIONS ═══════════════════════════════════════════════════
function renderEdit(){
  document.getElementById('edit-lvl-lbl').textContent = lvlLabel(editLevel);
  var list = document.getElementById('es-list');
  var stations = STATIONS[editLevel] || (STATIONS[editLevel] = []);
  list.innerHTML = '';
  stations.forEach(function(s,i){
    var row = document.createElement('div');
    row.className = 'es-row';
    row.innerHTML =
      '<input class="es-in es-room" value="' + esc(s.room) + '" placeholder="Room #" oninput="editField(' + i + ',\'room\',this.value)"/>' +
      '<input class="es-in es-loc" value="' + esc(s.loc||'') + '" placeholder="Description" oninput="editField(' + i + ',\'loc\',this.value)"/>' +
      '<button class="es-del" title="Remove" onclick="removeStation(' + i + ')">&times;</button>';
    list.appendChild(row);
  });
  if(!stations.length){ list.innerHTML = '<div class="no-data" style="padding:18px">No stations on this level yet</div>'; }
}
function editField(i, field, val){ STATIONS[editLevel][i][field] = val; }
function addStation(){ STATIONS[editLevel] = STATIONS[editLevel]||[]; STATIONS[editLevel].push({room:'', loc:''}); renderEdit(); }
function removeStation(i){
  if(!confirm('Remove this station?')) return;
  STATIONS[editLevel].splice(i,1); renderEdit();
}
function saveStations(){
  // strip fully-empty rows
  LEVEL_ORDER.forEach(function(lv){
    if(STATIONS[lv]) STATIONS[lv] = STATIONS[lv].filter(function(s){ return (s.room&&s.room.trim()) || (s.loc&&s.loc.trim()); });
  });
  saveStationsToCloud();
  renderEdit(); renderGrid();
  showToast('Stations saved \u2713');
}
function resetStationsToDefault(){
  if(!confirm('Reset ALL levels back to the original 41 stations? This replaces your current roster everywhere.')) return;
  STATIONS = JSON.parse(JSON.stringify(DEFAULT_STATIONS));
  saveStationsToCloud();
  renderEdit(); renderGrid();
  showToast('Roster reset \u2713');
}

// ═══ CSV EXPORT ══════════════════════════════════════════════════════
function exportCSV(){
  var log = loadLog();
  var csv = 'Date,Level,Technician,Room,Location,Temp(C),Flushed\n';
  log.forEach(function(e){
    var stations = STATIONS[e.level] || [];
    Object.keys(e.readings || {}).forEach(function(room){
      var r = e.readings[room], st = stations.find(function(s){ return s.room === room; }) || {};
      csv += '"' + e.date + '","' + lvlLabel(e.level) + '","' + (e.tech||'') + '","' + room + '","' + (st.loc||'') + '","' + (r.temp||'') + '","' + (r.flush||'') + '"\n';
    });
  });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'mhac-eyewash-log.csv';
  a.click();
  showToast('Exported \u2713');
}

// ═══ HELPERS ═════════════════════════════════════════════════════════
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showView(name, btn){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'trends') renderTrend();
  if (name === 'edit') renderEdit();
}
function fmtShort(d){
  if (!d) return '';
  var parts = d.split('-');
  return ['J','F','M','A','M','J','J','A','S','O','N','D'][parseInt(parts[1])-1] + parts[2];
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ═══ INIT ════════════════════════════════════════════════════════════
var urlLvl = new URLSearchParams(window.location.search).get('level');
if(urlLvl && (LEVEL_ORDER.indexOf(urlLvl) !== -1)){ entryLevel = urlLvl; trendLevel = urlLvl; editLevel = urlLvl; }
var ewBb = document.getElementById('ew-back-btn');
if(ewBb && urlLvl) ewBb.href = 'level-reports.html?level=' + urlLvl;

mkTabs('entry-lvl-tabs', entryLevel, function(l){ entryLevel = l; renderGrid(); });
mkTabs('trend-lvl-tabs', trendLevel, function(l){ trendLevel = l; renderTrend(); });
mkTabs('edit-lvl-tabs',  editLevel,  function(l){ editLevel = l;  renderEdit(); });
document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

// CLOUD INIT — load the reading log AND the station roster, then render.
(function(){
  var done=false;
  function finish(){
    if(done)return;done=true;
    document.getElementById('cloud-overlay').style.display='none';
    renderGrid();
  }
  var pending=2;
  function step(){ if(--pending<=0) finish(); }

  // 1) Station roster
  sbGet(STATIONS_KEY).then(function(res){
    if(res.ok){
      if(res.value && typeof res.value==='object'){
        // merge: ensure every known level key exists
        STATIONS = res.value;
        LEVEL_ORDER.forEach(function(lv){ if(!STATIONS[lv]) STATIONS[lv]=[]; });
        _stationsBlocked=false;
      } else {
        // no roster in cloud yet -> seed defaults up so all devices share them
        _stationsBlocked=false;
        saveStationsToCloud();
      }
    } else {
      // fetch failed: use local copy if present, otherwise defaults; don't overwrite cloud
      try{ var loc=JSON.parse(localStorage.getItem(STATIONS_KEY)); if(loc) STATIONS=loc; }catch(e){}
      _stationsBlocked=true;
    }
    step();
  });

  // 2) Reading log
  sbGet(LOG_KEY).then(function(res){
    if(res.ok && res.value!==null){
      try{ localStorage.setItem(LOG_KEY, JSON.stringify(res.value)); }catch(e){}
    }
    step();
  });

  setTimeout(finish, 12000); // safety net
})();
</script>
