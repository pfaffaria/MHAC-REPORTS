<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MHAC — Eyewash Temperature Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--green:#22c55e;--red:#ef4444}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97) 0%,rgba(12,7,0,.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tb-btn:hover,.tb-btn.primary{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35)}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:72px 16px 48px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;padding-top:8px}
.tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.view{display:none}.view.active{display:block}
.lvl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.lvl-tab{padding:5px 14px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.lvl-tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.entry-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.meta-row{display:flex;gap:8px;flex-wrap:wrap}
.meta-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:5px 10px;outline:none}
.meta-in:focus{border-color:rgba(245,158,11,.5)}
.range-note{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:12px;padding:5px 10px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.1);border-radius:4px;display:inline-block}
.range-note span{color:rgba(34,197,94,.6)}
.ew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:16px}
.ew-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:12px;transition:border-color .2s}
.ew-card.complete{border-color:rgba(34,197,94,.3)}
.ew-room{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light)}
.ew-loc{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-bottom:8px}
.ew-lbl{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700;margin-bottom:3px}
.temp-wrap{display:flex;align-items:center;gap:8px}
.temp-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;padding:5px 8px;outline:none;width:80px;text-align:center;transition:all .2s}
.temp-in:focus{border-color:rgba(245,158,11,.5)}
.temp-in.cold{border-color:rgba(59,130,246,.5);background:rgba(59,130,246,.08);color:#93c5fd}
.temp-in.hot{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08);color:#fca5a5}
.temp-in.ok{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06);color:#4ade80}
.pf-badge{display:flex;flex-direction:column;align-items:center;line-height:1.2;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;min-width:28px}
.pf-pass{color:#4ade80}.pf-fail{color:#f87171}
.flush-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.flush-lbl{font-size:8px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.flush-sel{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:4px 8px;outline:none;flex:1}
.flush-sel option{background:#0f0a03}
/* MIXING VALVE */
.valve-section{margin-top:10px;padding-top:10px;border-top:1px solid rgba(245,158,11,.08)}
.valve-check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.valve-cb{width:18px;height:18px;border-radius:3px;border:2px solid rgba(245,158,11,.3);cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .2s;background:transparent}
.valve-cb:checked{background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.5 3.5l-7.5 7.5-3.5-3.5' stroke='white' stroke-width='2' fill='none'/%3E%3C/svg%3E");background-size:11px;background-repeat:no-repeat;background-position:center}
.valve-cb-lbl{font-size:10px;letter-spacing:1px;color:rgba(245,158,11,.6);text-transform:uppercase;font-weight:700;cursor:pointer}
.valve-date-row{display:flex;align-items:center;gap:6px}
.valve-date-lbl{font-size:8px;letter-spacing:1.5px;color:rgba(245,158,11,.35);text-transform:uppercase;font-weight:700;white-space:nowrap}
.valve-date-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.15);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;padding:4px 7px;outline:none;flex:1}
.valve-date-in:focus{border-color:rgba(245,158,11,.4)}
/* COMPLETION BANNER */
.complete-banner{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.complete-banner.show{display:flex}
.complete-banner-text{font-size:11px;letter-spacing:1.5px;color:rgba(34,197,94,.8);text-transform:uppercase;font-weight:700}
/* AUTO-DELETE NOTICE */
.expire-notice{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.45);text-transform:uppercase;display:none}
.expire-notice.show{display:block}
.act-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.btn-save{padding:8px 20px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-save:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.btn-complete{padding:8px 20px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:5px;color:rgba(34,197,94,.8);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;opacity:.4;pointer-events:none}
.btn-complete.ready{opacity:1;pointer-events:auto;box-shadow:0 0 14px rgba(34,197,94,.15)}
.btn-complete.ready:hover{background:rgba(34,197,94,.2);border-color:var(--green);color:#4ade80}
.btn-pdf{padding:8px 20px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:5px;color:rgba(147,197,253,.8);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:none}
.btn-pdf.show{display:inline-flex;align-items:center;gap:5px}
.btn-pdf:hover{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.5);color:#93c5fd}
.btn-sec{padding:8px 14px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-sec:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.7)}
.trend-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:8px}
.t-room{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--amber-light)}
.t-loc{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:10px}
.t-latest{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fef3c7}
.t-pass{color:#4ade80;font-weight:700;font-size:11px;letter-spacing:1px}
.t-fail{color:#f87171;font-weight:700;font-size:11px;letter-spacing:1px}
.t-avg{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);text-transform:uppercase;margin-top:3px}
.t-valve{font-size:9px;letter-spacing:1px;color:rgba(34,197,94,.5);text-transform:uppercase;margin-top:2px}
.bar{border-radius:2px 2px 0 0;min-height:3px}
.bar-ok{background:rgba(34,197,94,.6)}.bar-cold{background:rgba(59,130,246,.6)}.bar-hot{background:rgba(239,68,68,.6)}.bar-empty{background:rgba(245,158,11,.1)}
.no-data{text-align:center;padding:32px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;line-height:2}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* PRINT / PDF */
.print-out{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;color-adjust:exact!important}
  .topbar,.statusbar,.water-bg,.scanlines,.tabs,.lvl-tabs,.act-row,.complete-banner,
  .expire-notice,.toast,#cloud-overlay{display:none!important}
  body{background:#fff!important;color:#000!important;font-family:Arial,sans-serif}
  .page{padding:0!important;max-width:none!important}
  .view{display:none!important}
  .print-out{display:block!important}
  /* Cover */
  .pdf-cover{padding:20px 0 14px;border-bottom:3px solid #000;margin-bottom:16px}
  .pdf-org{font-size:36px;font-weight:900;letter-spacing:8px;color:#000;font-family:Arial Black,sans-serif}
  .pdf-title{font-size:15px;color:#333;margin-top:3px;font-weight:bold}
  .pdf-meta-row{display:flex;gap:20px;margin-top:8px;font-size:11px;color:#555;flex-wrap:wrap}
  .pdf-meta-row span strong{color:#000}
  .pdf-stats{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .pdf-stat{background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:6px 14px;text-align:center}
  .pdf-stat-val{font-size:22px;font-weight:bold;color:#000;line-height:1.1}
  .pdf-stat-lbl{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:1px}
  /* Table */
  .pdf-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
  .pdf-table th{background:#222;color:#fff;padding:6px 10px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
  .pdf-table td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:top}
  .pdf-table tr:nth-child(even) td{background:#fafafa}
  .pdf-table tr.has-fail td{background:#fff5f5}
  .pdf-pass{color:#16a34a;font-weight:bold}.pdf-fail{color:#dc2626;font-weight:bold}
  .pdf-yes{color:#16a34a}.pdf-no{color:#dc2626}
  .pdf-footer{margin-top:20px;padding-top:10px;border-top:1px solid #ccc;font-size:9px;color:#999;display:flex;justify-content:space-between}
  .pdf-expire{color:#d97706;font-style:italic}
}
</style>
<script>
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing data...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Safety</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <button class="tb-btn primary" onclick="exportCSV()">&#8595; CSV</button>
    <a class="tb-btn" id="ew-back-btn" href="index.html">&#8592; Home</a>
    <button class="tb-btn" style="border-color:rgba(239,68,68,.25);color:rgba(239,68,68,.6)" onclick="clearSession();window.location.href='index.html'">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showView('entry',this)">Monthly Entry</button>
    <button class="tab" onclick="showView('trends',this)">Trend Log</button>
  </div>

  <!-- ENTRY VIEW -->
  <div class="view active" id="view-entry">
    <div class="lvl-tabs" id="entry-lvl-tabs"></div>
    <div class="expire-notice" id="expire-notice"></div>
    <div class="entry-hdr">
      <div class="entry-title">Eyewash Log &#8212; Level <span id="entry-lvl-lbl">1</span></div>
      <div class="meta-row">
        <input type="date" class="meta-in" id="entry-date"/>
        <input type="text" class="meta-in" id="entry-tech" placeholder="Technician" style="width:140px" autocomplete="off" autocorrect="off"/>
      </div>
    </div>
    <div class="range-note">Safe range: <span>16&#176;C &#8211; 38&#176;C</span></div>
    <div class="ew-grid" id="ew-grid"></div>
    <div class="complete-banner" id="complete-banner">
      <span class="complete-banner-text">&#10003; All stations complete &#8212; ready to save</span>
    </div>
    <div class="act-row">
      <button class="btn-save" onclick="saveEntry()">Save</button>
      <button class="btn-complete" id="btn-complete" onclick="completeInspection()">&#10003; Complete Inspection</button>
      <button class="btn-pdf show" id="btn-pdf" onclick="printLog()" style="display:none">&#128438; Save PDF</button>
      <button class="btn-sec" onclick="clearTemps()">Clear</button>
    </div>
  </div>

  <!-- TREND VIEW -->
  <div class="view" id="view-trends">
    <div class="lvl-tabs" id="trend-lvl-tabs"></div>
    <div id="trend-out"></div>
  </div>
</div>

<!-- PRINT OUTPUT (hidden on screen, shown at print) -->
<div class="print-out" id="print-out"></div>

<div class="statusbar">
  <div class="sdot"></div>
  <span>Eyewash Temperature Log</span>
  <span id="status-lbl"></span>
  <div class="wfall"><div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div><div class="wb" style="--d:.9s"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══ SUPABASE ════════════════════════════════════════════════════════
const SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
const SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
const SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};
async function sbGet(k){
  var controller=typeof AbortController!=='undefined'?new AbortController():null;
  var timer=controller?setTimeout(function(){controller.abort();},5000):null;
  var opts={headers:SB_H};if(controller)opts.signal=controller.signal;
  return fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',opts)
    .then(function(r){clearTimeout(timer);return r.json();})
    .then(function(d){return d.length?d[0].value:null;})
    .catch(function(){clearTimeout(timer);return null;});
}
async function sbSet(k,v){
  var payload=JSON.stringify({key:k,value:v});
  await fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k),{method:'DELETE',headers:SB_H}).catch(function(){});
  return fetch(SB_URL+'/rest/v1/app_data',{method:'POST',headers:Object.assign({},SB_H,{'Prefer':'return=minimal'}),body:payload}).catch(function(){});
}

// ═══ STATIONS DATA ═══════════════════════════════════════════════════
// Add your eyewash station data here — this is never auto-deleted
var STATIONS = {
  '1': [
    /* Example: {room:'1A-101', loc:'Patient Room South West'} */
    /* Paste your Level 1 stations here */
  ],
  '2': [
    /* Paste your Level 2 stations here */
  ],

// ═══ KEYS ════════════════════════════════════════════════════════════
var LOG_KEY = 'mhac-ew-log';

// ═══ STATE ═══════════════════════════════════════════════════════════
var entryLevel = '1';
var trendLevel = '1';

// ═══ STORAGE ═════════════════════════════════════════════════════════
function loadLog(){ try{ return JSON.parse(localStorage.getItem(LOG_KEY))||[]; }catch(e){return[];} }
function saveLog(d){
  localStorage.setItem(LOG_KEY, JSON.stringify(d));
  sbSet(LOG_KEY, d);
}

// ═══ AUTO-DELETE ══════════════════════════════════════════════════════
// Completed entries are deleted 7 days after their completedAt date.
// STATIONS are never touched by this function.
function pruneOldEntries(){
  var log = loadLog();
  var now = Date.now();
  var WEEK = 7 * 24 * 60 * 60 * 1000;
  var before = log.length;
  log = log.filter(function(e){
    if(!e.completedAt) return true; // keep uncompleted entries indefinitely
    return (now - new Date(e.completedAt).getTime()) < WEEK;
  });
  if(log.length < before){
    saveLog(log);
    showToast('Old log cleared \u2713');
  }
  updateExpireNotice(log);
}

function updateExpireNotice(log){
  var notice = document.getElementById('expire-notice');
  if(!notice) return;
  var completed = log.filter(function(e){ return e.completedAt && e.level === entryLevel; });
  if(!completed.length){ notice.classList.remove('show'); return; }
  var latest = completed.sort(function(a,b){ return b.completedAt.localeCompare(a.completedAt); })[0];
  var savedDate = new Date(latest.completedAt);
  var expiresDate = new Date(savedDate.getTime() + 7*24*60*60*1000);
  var fmt = function(d){ return d.toLocaleDateString('en-CA',{month:'short',day:'numeric'}); };
  notice.textContent = 'Last completed: ' + fmt(savedDate) + ' · Clears: ' + fmt(expiresDate);
  notice.classList.add('show');
}

// ═══ TABS ════════════════════════════════════════════════════════════
function mkTabs(containerId, activeLevel, onSelect) {
  var c = document.getElementById(containerId);
  c.innerHTML = '';
  for (var i = 1; i <= 5; i++) {
    (function(lv){
      var b = document.createElement('button');
      b.className = 'lvl-tab' + (lv === activeLevel ? ' active' : '');
      b.textContent = 'Level ' + lv;
      b.onclick = function() {
        c.querySelectorAll('.lvl-tab').forEach(function(t){ t.classList.remove('active'); });
        b.classList.add('active');
        onSelect(lv);
      };
      c.appendChild(b);
    })(String(i));
  }
}

// ═══ RENDER GRID ══════════════════════════════════════════════════════
function renderGrid() {
  var stations = STATIONS[entryLevel] || [];
  document.getElementById('entry-lvl-lbl').textContent = entryLevel;
  document.getElementById('status-lbl').textContent = '· Level ' + entryLevel + ' · ' + stations.length + ' stations';
  var grid = document.getElementById('ew-grid');
  grid.innerHTML = '';
  if(!stations.length){
    grid.innerHTML = '<div class="no-data">No stations on Level '+entryLevel+'<br>Add stations to the STATIONS object in the code</div>';
    checkCompletion();
    return;
  }
  stations.forEach(function(s) {
    var rid = s.room.replace(/[^a-zA-Z0-9]/g,'_');
    var card = document.createElement('div');
    card.className = 'ew-card';
    card.id = 'card_' + rid;
    card.innerHTML =
      '<div class="ew-room">Room ' + s.room + '</div>' +
      '<div class="ew-loc">' + s.loc + '</div>' +
      '<div class="ew-lbl">Temperature (&deg;C)</div>' +
      '<div class="temp-wrap">' +
        '<input class="temp-in" id="t_' + rid + '" type="number" step="0.1" placeholder="&mdash;" oninput="onTemp(this,\'' + rid + '\',\'' + s.room + '\')" />' +
        '<div class="pf-badge" id="pf_' + rid + '"></div>' +
      '</div>' +
      '<div class="flush-row">' +
        '<span class="flush-lbl">Flushed</span>' +
        '<select class="flush-sel" id="fl_' + rid + '" onchange="checkCompletion()">' +
          '<option value="">&#8212;</option><option value="Yes">Yes</option><option value="No">No</option>' +
        '</select>' +
      '</div>' +
      '<div class="valve-section">' +
        '<div class="valve-check-row">' +
          '<input type="checkbox" class="valve-cb" id="mv_' + rid + '" onchange="checkCompletion()"/>' +
          '<label class="valve-cb-lbl" for="mv_' + rid + '">Mixing Valve Cleaned</label>' +
        '</div>' +
        '<div class="valve-date-row">' +
          '<span class="valve-date-lbl">Clean Date</span>' +
          '<input type="date" class="valve-date-in" id="mvd_' + rid + '" onchange="checkCompletion()"/>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
  checkCompletion();
  updateExpireNotice(loadLog());
}

// ═══ TEMP INPUT ════════════════════════════════════════════════════
function onTemp(el, rid, room) {
  var v = parseFloat(el.value);
  el.classList.remove('cold','hot','ok');
  var pf = document.getElementById('pf_' + rid);
  if (isNaN(v) || el.value === '') { pf.innerHTML = ''; checkCompletion(); return; }
  if (v < 16) { el.classList.add('cold'); pf.innerHTML = '<span class="pf-fail">&#x2717;</span><span class="pf-fail">FAIL</span>'; }
  else if (v > 38) { el.classList.add('hot'); pf.innerHTML = '<span class="pf-fail">&#x2717;</span><span class="pf-fail">FAIL</span>'; }
  else { el.classList.add('ok'); pf.innerHTML = '<span class="pf-pass">&#x2713;</span><span class="pf-pass">PASS</span>'; }
  checkCompletion();
}

// ═══ COMPLETION CHECK ════════════════════════════════════════════════
// All stations need a temp AND a flush selection to unlock Complete
function checkCompletion(){
  var stations = STATIONS[entryLevel] || [];
  var allDone = stations.length > 0 && stations.every(function(s){
    var rid = s.room.replace(/[^a-zA-Z0-9]/g,'_');
    var t = document.getElementById('t_' + rid);
    var f = document.getElementById('fl_' + rid);
    return t && t.value !== '' && f && f.value !== '';
  });
  var btn = document.getElementById('btn-complete');
  var banner = document.getElementById('complete-banner');
  if(btn){ btn.classList.toggle('ready', allDone); }
  if(banner){ banner.classList.toggle('show', allDone); }
  // Update card complete styling
  stations.forEach(function(s){
    var rid = s.room.replace(/[^a-zA-Z0-9]/g,'_');
    var card = document.getElementById('card_' + rid);
    var t = document.getElementById('t_' + rid);
    var f = document.getElementById('fl_' + rid);
    if(card) card.classList.toggle('complete', t&&t.value!==''&&f&&f.value!=='');
  });
}

// ═══ CLEAR ═══════════════════════════════════════════════════════════
function clearTemps() {
  var stations = STATIONS[entryLevel] || [];
  stations.forEach(function(s) {
    var rid = s.room.replace(/[^a-zA-Z0-9]/g,'_');
    var t = document.getElementById('t_' + rid);
    var f = document.getElementById('fl_' + rid);
    var p = document.getElementById('pf_' + rid);
    var mv = document.getElementById('mv_' + rid);
    var mvd = document.getElementById('mvd_' + rid);
    if(t){ t.value=''; t.classList.remove('cold','hot','ok'); }
    if(f) f.value='';
    if(p) p.innerHTML='';
    if(mv) mv.checked=false;
    if(mvd) mvd.value='';
    var card = document.getElementById('card_' + rid);
    if(card) card.classList.remove('complete');
  });
  document.getElementById('btn-pdf').style.display='none';
  checkCompletion();
}

// ═══ SAVE (partial) ═══════════════════════════════════════════════
function saveEntry() {
  var date = document.getElementById('entry-date').value;
  var tech = document.getElementById('entry-tech').value.trim();
  if (!date) { showToast('Select a date'); return; }
  var stations = STATIONS[entryLevel] || [];
  var readings = {};
  stations.forEach(function(s) {
    var rid = s.room.replace(/[^a-zA-Z0-9]/g,'_');
    var t = document.getElementById('t_' + rid);
    var f = document.getElementById('fl_' + rid);
    var mv = document.getElementById('mv_' + rid);
    var mvd = document.getElementById('mvd_' + rid);
    readings[s.room] = {
      temp: t ? t.value : '',
      flush: f ? f.value : '',
      valve_cleaned: mv ? mv.checked : false,
      valve_date: mvd ? mvd.value : ''
    };
  });
  var missing = stations.filter(function(s){ return !readings[s.room].temp; });
  if (missing.length) {
    var names = missing.map(function(s){ return s.room; }).join(', ');
    if (!confirm(missing.length + ' station(s) have no temperature:\n\n' + names + '\n\nSave anyway?')) return;
  }
  _commitEntry(date, tech, readings, false);
  showToast('Saved \u2713');
}

// ═══ COMPLETE INSPECTION ═════════════════════════════════════════════
function completeInspection(){
  var date = document.getElementById('entry-date').value;
  var tech = document.getElementById('entry-tech').value.trim();
  if (!date) { showToast('Select a date'); return; }
  var stations = STATIONS[entryLevel] || [];
  var readings = {};
  stations.forEach(function(s) {
    var rid = s.room.replace(/[^a-zA-Z0-9]/g,'_');
    var t = document.getElementById('t_' + rid);
    var f = document.getElementById('fl_' + rid);
    var mv = document.getElementById('mv_' + rid);
    var mvd = document.getElementById('mvd_' + rid);
    readings[s.room] = {
      temp: t ? t.value : '',
      flush: f ? f.value : '',
      valve_cleaned: mv ? mv.checked : false,
      valve_date: mvd ? mvd.value : ''
    };
  });
  _commitEntry(date, tech, readings, true);
  // Show PDF button
  var pdfBtn = document.getElementById('btn-pdf');
  if(pdfBtn) pdfBtn.style.display='inline-flex';
  showToast('Inspection complete \u2713');
  updateExpireNotice(loadLog());
}

function _commitEntry(date, tech, readings, isComplete){
  var log = loadLog();
  log = log.filter(function(e){ return !(e.date === date && e.level === entryLevel); });
  var entry = { date: date, level: entryLevel, tech: tech, readings: readings };
  if(isComplete) entry.completedAt = new Date().toISOString();
  log.push(entry);
  log.sort(function(a,b){ return a.date.localeCompare(b.date); });
  saveLog(log);
}

// ═══ PDF / PRINT ══════════════════════════════════════════════════════
function printLog(){
  var log = loadLog();
  var date = document.getElementById('entry-date').value;
  var tech = document.getElementById('entry-tech').value.trim() || '—';
  // Find the current entry or use current form values
  var entry = log.find(function(e){ return e.level === entryLevel && e.date === date; });
  var stations = STATIONS[entryLevel] || [];
  var dateStr = date ? new Date(date + 'T12:00:00').toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'}) : '—';

  // Stats
  var total = stations.length, pass = 0, fail = 0, valves = 0;
  stations.forEach(function(s){
    var r = entry ? (entry.readings[s.room]||{}) : {};
    var temp = entry ? parseFloat(r.temp) : NaN;
    if(!isNaN(temp)){ if(temp>=16&&temp<=38) pass++; else fail++; }
    if(r.valve_cleaned) valves++;
  });

  var rows = '';
  stations.forEach(function(s){
    var r = entry ? (entry.readings[s.room]||{}) : {};
    var temp = r.temp || '—';
    var tempNum = parseFloat(r.temp);
    var pfHtml = isNaN(tempNum) ? '<span style="color:#aaa">—</span>'
      : (tempNum>=16&&tempNum<=38 ? '<span class="pdf-pass">&#10003; Pass</span>' : '<span class="pdf-fail">&#10007; Fail</span>');
    var flushHtml = r.flush==='Yes'?'<span class="pdf-yes">Yes</span>':r.flush==='No'?'<span class="pdf-no">No</span>':'<span style="color:#aaa">—</span>';
    var valveHtml = r.valve_cleaned?'<span class="pdf-yes">&#10003; Yes</span>':'<span style="color:#aaa">No</span>';
    var valveDate = r.valve_date ? new Date(r.valve_date+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}) : '—';
    var hasFail = !isNaN(tempNum) && (tempNum<16||tempNum>38);
    rows += '<tr'+(hasFail?' class="has-fail"':'')+'>'
      +'<td><strong>'+s.room+'</strong></td>'
      +'<td>'+s.loc+'</td>'
      +'<td>'+(isNaN(tempNum)?'—':temp+'&deg;C')+'</td>'
      +'<td>'+pfHtml+'</td>'
      +'<td>'+flushHtml+'</td>'
      +'<td>'+valveHtml+'</td>'
      +'<td>'+valveDate+'</td>'
      +'</tr>';
  });

  var completedStr = entry&&entry.completedAt
    ? new Date(entry.completedAt).toLocaleString('en-CA',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})
    : 'Not yet completed';
  var expireDate = entry&&entry.completedAt
    ? new Date(new Date(entry.completedAt).getTime()+7*24*60*60*1000).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})
    : '—';

  var html = '<div class="pdf-cover">'
    +'<div class="pdf-org">MHAC</div>'
    +'<div class="pdf-title">Eyewash Inspection Report &mdash; Level '+entryLevel+'</div>'
    +'<div class="pdf-meta-row">'
    +'<span><strong>Date:</strong> '+dateStr+'</span>'
    +'<span><strong>Technician:</strong> '+tech+'</span>'
    +'<span><strong>Stations:</strong> '+total+'</span>'
    +'</div>'
    +'<div class="pdf-stats">'
    +'<div class="pdf-stat"><div class="pdf-stat-val">'+total+'</div><div class="pdf-stat-lbl">Total</div></div>'
    +'<div class="pdf-stat" style="border-color:#16a34a"><div class="pdf-stat-val" style="color:#16a34a">'+pass+'</div><div class="pdf-stat-lbl">Pass</div></div>'
    +(fail?'<div class="pdf-stat" style="border-color:#dc2626"><div class="pdf-stat-val" style="color:#dc2626">'+fail+'</div><div class="pdf-stat-lbl">Fail</div></div>':'')
    +'<div class="pdf-stat"><div class="pdf-stat-val">'+valves+'</div><div class="pdf-stat-lbl">Valves Cleaned</div></div>'
    +'</div></div>'
    +'<table class="pdf-table">'
    +'<thead><tr>'
    +'<th>Room</th><th>Location</th><th>Temp</th><th>Result</th>'
    +'<th>Flushed</th><th>Valve Cleaned</th><th>Valve Clean Date</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table>'
    +'<div class="pdf-footer">'
    +'<span>Completed: '+completedStr+'</span>'
    +'<span class="pdf-expire">Auto-clears: '+expireDate+'</span>'
    +'</div>';

  document.getElementById('print-out').innerHTML = html;
  window.print();
}

// ═══ TREND VIEW ══════════════════════════════════════════════════════
function renderTrend() {
  var out = document.getElementById('trend-out');
  var stations = STATIONS[trendLevel] || [];
  var log = loadLog().filter(function(e){ return e.level === trendLevel; });
  out.innerHTML = '';
  if (!stations.length) { out.innerHTML = '<div class="no-data">No stations on Level ' + trendLevel + '</div>'; return; }
  stations.forEach(function(s) {
    var entries = log.filter(function(e){ return e.readings && e.readings[s.room] && e.readings[s.room].temp !== ''; });
    var vals = entries.map(function(e){ return parseFloat(e.readings[s.room].temp); }).filter(function(v){ return !isNaN(v); });
    var last = vals.length ? vals[vals.length - 1] : null;
    var avg = vals.length ? (vals.reduce(function(a,b){return a+b;},0) / vals.length).toFixed(1) : null;
    var minV = vals.length ? Math.min.apply(null, vals) : 0;
    var maxV = vals.length ? Math.max.apply(null, vals) : 40;
    var statusHtml = '';
    if (last !== null) { statusHtml = (last < 16 || last > 38) ? '<div class="t-fail">&#x2717; FAIL</div>' : '<div class="t-pass">&#x2713; PASS</div>'; }
    // Latest valve info
    var latestEntry = entries.length ? entries[entries.length-1] : null;
    var latestR = latestEntry ? (latestEntry.readings[s.room]||{}) : {};
    var valveHtml = latestR.valve_cleaned
      ? '<div class="t-valve">&#10003; Valve cleaned '+(latestR.valve_date?fmtDate(latestR.valve_date):'')+'</div>'
      : '';
    var last10 = entries.slice(-10);
    var barsHtml = '', labelsHtml = '', barW = 14;
    last10.forEach(function(e) {
      var v = parseFloat(e.readings[s.room].temp), cls = 'bar-empty', h = 4;
      if (!isNaN(v)) { cls = v < 16 ? 'bar-cold' : v > 38 ? 'bar-hot' : 'bar-ok'; var range = (maxV - minV) || 1; h = Math.max(4, Math.round(((v - minV) / range) * 40) + 4); }
      barsHtml += '<div class="bar ' + cls + '" style="width:' + barW + 'px;height:' + h + 'px;flex-shrink:0"></div>';
      labelsHtml += '<div style="width:' + barW + 'px;font-size:7px;color:rgba(245,158,11,.3);text-align:center;flex-shrink:0">' + fmtShort(e.date) + '</div>';
    });
    var card = document.createElement('div');
    card.className = 'trend-card';
    card.innerHTML = '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">' +
      '<div style="flex:1;min-width:0"><div class="t-room">Room ' + s.room + '</div><div class="t-loc">' + s.loc + '</div>' +
      (vals.length ? '<div style="display:flex;align-items:flex-end;gap:2px;height:48px">' + barsHtml + '</div><div style="display:flex;gap:2px;margin-top:3px">' + labelsHtml + '</div>' : '<div style="font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.2);text-transform:uppercase">No readings yet</div>') +
      '</div><div style="text-align:right;flex-shrink:0"><div class="t-latest">' + (last !== null ? last + '&deg;C' : '&mdash;') + '</div>' + statusHtml + (avg ? '<div class="t-avg">Avg ' + avg + '&deg;C</div>' : '') + valveHtml + '</div></div>';
    out.appendChild(card);
  });
}

// ═══ CSV EXPORT ═══════════════════════════════════════════════════════
function exportCSV() {
  var log = loadLog();
  if (!log.length) { showToast('No data to export'); return; }
  var csv = 'Date,Level,Tech,Room,Location,Temp (C),Flushed,Valve Cleaned,Valve Clean Date,Completed At\n';
  log.forEach(function(e) {
    var stations = STATIONS[e.level] || [];
    Object.keys(e.readings || {}).forEach(function(room) {
      var r = e.readings[room];
      var st = stations.find(function(s){ return s.room === room; }) || {};
      csv += '"'+e.date+'","'+e.level+'","'+(e.tech||'')+'","'+room+'","'+(st.loc||'')
        +'","'+(r.temp||'')+'","'+(r.flush||'')
        +'","'+(r.valve_cleaned?'Yes':'No')+'","'+(r.valve_date||'')
        +'","'+(e.completedAt||'')+'"\n';
    });
  });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'mhac-eyewash-log.csv';
  a.click();
  showToast('Exported \u2713');
}

// ═══ UI HELPERS ═══════════════════════════════════════════════════════
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'trends') renderTrend();
}

function fmtShort(d) {
  if (!d) return '';
  var parts = d.split('-');
  return ['J','F','M','A','M','J','J','A','S','O','N','D'][parseInt(parts[1])-1] + parts[2];
}

function fmtDate(d){
  if(!d) return '';
  var p=d.split('-');
  return parseInt(p[2])+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[1])-1]+' '+p[0];
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
