<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Pump Inspection Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--card:#0d0800}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,0.2);background:linear-gradient(180deg,rgba(12,7,0,0.97) 0%,rgba(12,7,0,0.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);flex-shrink:0;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover{background:rgba(245,158,11,.15);color:#fff}
.tb-btn.primary{border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.1)}
.tb-btn.primary:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:72px 16px 48px;max-width:1200px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;padding-top:8px}
.tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.8)}
.tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.view{display:none}.view.active{display:block}
.entry-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.entry-header h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.date-input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 12px;outline:none}
.date-input:focus{border-color:rgba(245,158,11,.6)}
.tech-input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 12px;outline:none;width:160px}
.tech-input::placeholder{color:rgba(245,158,11,.3)}
.pump-group{margin-bottom:24px}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--amber);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(245,158,11,.15);text-transform:uppercase}
.pump-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.pump-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:12px 14px}
.pump-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pump-name span{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);font-family:'Rajdhani',sans-serif;font-weight:600}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.field{display:flex;flex-direction:column;gap:2px}
.field.full{grid-column:span 2}
.field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.field input,.field select{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:4px 8px;outline:none;width:100%;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.1)}
.field input::placeholder{color:rgba(245,158,11,.2)}
.field select option{background:#0f0a03;color:#fef3c7}
.field input.alarm{border-color:rgba(255,80,80,.5);background:rgba(255,80,80,.08)}
.trend-controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.pump-select{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;outline:none;min-width:200px}
.trend-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:16px;margin-bottom:16px;overflow-x:auto}
.trend-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--amber);margin-bottom:14px}
.trend-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.trend-table th{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,158,11,.5);font-weight:700;padding:6px 10px;text-align:left;border-bottom:1px solid rgba(245,158,11,.1);white-space:nowrap}
.trend-table td{padding:6px 10px;border-bottom:1px solid rgba(245,158,11,.06);color:#fef3c7;font-weight:600;white-space:nowrap}
.trend-table tr:last-child td{border-bottom:none}
.trend-table tr:hover td{background:rgba(245,158,11,.04)}
.trend-table td.alarm-yes{color:#ff6b6b}
.trend-table td.standby{color:rgba(245,158,11,.5)}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s}
.history-item:hover{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
.history-date{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--amber-light)}
.history-meta{font-size:10px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase}
.history-del{background:none;border:1px solid rgba(255,80,80,.2);color:rgba(255,80,80,.5);border-radius:4px;padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.history-del:hover{border-color:rgba(255,80,80,.6);color:#ff6b6b;background:rgba(255,80,80,.08)}
.submit-row{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(245,158,11,.1)}
.btn-submit{padding:10px 28px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.btn-clear{padding:10px 18px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-clear:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.7)}
.no-data{text-align:center;padding:40px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing data...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Penthouse</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <button class="tb-btn primary" onclick="exportCSV()">↓ Export CSV</button>
    <a class="tb-btn" href="index.html">← Home</a>
  </div>
</nav>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showView('entry',this)">New Entry</button>
    <button class="tab" onclick="showView('trends',this)">Trend Log</button>
    <button class="tab" onclick="showView('history',this)">History</button>
  </div>

  <div class="view active" id="view-entry">
    <div class="entry-header">
      <h2>Monthly Pump Checks</h2>
      <input type="date" class="date-input" id="entry-date"/>
      <input type="text" class="tech-input" id="entry-tech" placeholder="Technician name"/>
    </div>
    <div id="pump-form"></div>
    <div class="submit-row">
      <button class="btn-submit" onclick="saveEntry()">Save Entry</button>
      <button class="btn-clear" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="view" id="view-trends">
    <div class="trend-controls">
      <select class="pump-select" id="trend-pump-select" onchange="renderTrend()">
        <option value="">— Select a pump —</option>
      </select>
    </div>
    <div id="trend-output"></div>
  </div>

  <div class="view" id="view-history">
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="statusbar">
  <div class="sdot"></div>
  <span>Pump Inspection Tracker</span>
  <span id="entry-count-label">·</span>
  <div class="wfall">
    <div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div>
    <div class="wb" style="--d:.9s"></div><div class="wb" style="--d:1.3s"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══ SUPABASE SYNC ═══════════════════════════════════════════════════
const SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
const SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
const SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};
async function sbGet(k){try{const r=await fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',{headers:SB_H});if(!r.ok)throw 0;const d=await r.json();return d.length?d[0].value:null;}catch(e){return null;}}
async function sbSet(k,v){try{await fetch(SB_URL+'/rest/v1/app_data',{method:'POST',headers:Object.assign({},SB_H,{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})});}catch(e){}}
// ════════════════════════════════════════════════════════════════════

const PUMP_GROUPS = [
  {group:'Primary Chilled Water Pumps',pumps:['CHW-PH-01A','CHW-PH-01B'],fields:['standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp']},
  {group:'AHU Chilled Water Pumps',pumps:['CHW-PH-02A','CHW-PH-02B'],fields:['standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp']},
  {group:'Heat Recovery Chiller Pump',pumps:['CHW-PH-03'],fields:['standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp']},
  {group:'Process Cooling Chilled Water Pumps',pumps:['CHW-PH-04A','CHW-PH-04B'],fields:['standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp']},
  {group:'Heat Exchanger Pumps',pumps:['DHW-PH-01A','DHW-PH-01B'],fields:['standby','alarm','hrs','freq','pOut','pIn','motorTemp']},
  {group:'Recirculation Pumps Level 3/4/5',pumps:['DHWR-PH-02A','DHWR-PH-02B'],fields:['standby','alarm','hrs','freq','pOut','pIn','motorTemp']},
  {group:'Recirculation Pumps Level 1/2',pumps:['DHWR-PH-01A','DHWR-PH-01B'],fields:['standby','alarm','hrs','freq','pOut','pIn','motorTemp']},
  {group:'Hot Water Pre Heat Pumps',pumps:['PHT-PH-01A','PHT-PH-01B'],fields:['standby','alarm','hrs','freq','pOut','pIn','motorTemp']},
  {group:'AHU Hot Glycol Pumps',pumps:['HGL-PH-01A','HGL-PH-01B'],fields:['standby','alarm','hrs','freq','pOut','pIn','motorTemp']},
  {group:'Heat Recovery Chiller Pump (Hot)',pumps:['HTG-PH-02'],fields:['standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp']},
  {group:'Snow Melt',pumps:['SM-PH-01'],fields:['standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp']},
  {group:'Primary Hot Water Heating Pumps',pumps:['HTG-PH-01A','HTG-PH-01B','HTG-PH-01C'],fields:['standby','alarm','hrs','freq','pOut','pIn','motorTemp']}
];

const FIELD_LABELS = {standby:'Stand By',alarm:'Alarm',hrs:'Hrs',freq:'Freq (Hz)',pOut:'P Out',pIn:'P In',sealFlow:'Seal Flow',motorTemp:'Motor Temp'};
const FIELD_TYPES = {standby:'select-yesno',alarm:'select-yesno',hrs:'number',freq:'number',pOut:'number',pIn:'number',sealFlow:'text',motorTemp:'number'};
const ALL_PUMPS = PUMP_GROUPS.flatMap(g => g.pumps);
const STORE_KEY = 'mhac-pump-entries';

function loadEntries(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||[]; }catch(e){return[];} }
function saveEntries(arr){
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
  sbSet(STORE_KEY, arr); // sync to cloud
}

function buildForm(){
  const form = document.getElementById('pump-form');
  form.innerHTML = '';
  PUMP_GROUPS.forEach(g => {
    const grpDiv = document.createElement('div');
    grpDiv.className = 'pump-group';
    grpDiv.innerHTML = `<div class="group-title">${g.group}</div><div class="pump-grid" id="grid-${g.group.replace(/\s+/g,'_')}"></div>`;
    form.appendChild(grpDiv);
    const grid = grpDiv.querySelector('.pump-grid');
    g.pumps.forEach(pumpId => {
      const card = document.createElement('div');
      card.className = 'pump-card';
      let fieldsHtml = '<div class="fields">';
      g.fields.forEach(f => {
        const isFull = (f === 'sealFlow') ? ' full' : '';
        if(FIELD_TYPES[f] === 'select-yesno'){
          fieldsHtml += `<div class="field${isFull}"><label>${FIELD_LABELS[f]}</label><select id="${pumpId}_${f}"><option value="">—</option><option value="✓">✓ Yes</option><option value="No">No</option></select></div>`;
        } else {
          fieldsHtml += `<div class="field${isFull}"><label>${FIELD_LABELS[f]}</label><input type="${FIELD_TYPES[f]==='number'?'number':'text'}" id="${pumpId}_${f}" placeholder="—" step="0.1"/></div>`;
        }
      });
      fieldsHtml += '</div>';
      card.innerHTML = `<div class="pump-name">${pumpId} <span>${g.group}</span></div>${fieldsHtml}`;
      grid.appendChild(card);
    });
  });
}

function saveEntry(){
  const date = document.getElementById('entry-date').value;
  const tech = document.getElementById('entry-tech').value.trim();
  if(!date){ showToast('Please select a date'); return; }
  const data = { id: Date.now(), date, tech, pumps: {} };
  PUMP_GROUPS.forEach(g => {
    g.pumps.forEach(pumpId => {
      data.pumps[pumpId] = {};
      g.fields.forEach(f => { const el = document.getElementById(`${pumpId}_${f}`); data.pumps[pumpId][f] = el ? el.value : ''; });
    });
  });
  const entries = loadEntries();
  const idx = entries.findIndex(e => e.date === date);
  if(idx >= 0){ entries.splice(idx,1); }
  entries.push(data);
  entries.sort((a,b) => a.date.localeCompare(b.date));
  saveEntries(entries);
  updateStatusLabel();
  showToast('Entry saved ✓');
}

function clearForm(){
  document.getElementById('entry-tech').value = '';
  ALL_PUMPS.forEach(pumpId => {
    PUMP_GROUPS.forEach(g => {
      if(!g.pumps.includes(pumpId)) return;
      g.fields.forEach(f => { const el = document.getElementById(`${pumpId}_${f}`); if(el) el.value = ''; });
    });
  });
}

function populatePumpSelect(){
  const sel = document.getElementById('trend-pump-select');
  sel.innerHTML = '<option value="">— Select a pump —</option>';
  PUMP_GROUPS.forEach(g => {
    const optGroup = document.createElement('optgroup');
    optGroup.label = g.group;
    g.pumps.forEach(p => { const opt = document.createElement('option'); opt.value = p; opt.textContent = p; optGroup.appendChild(opt); });
    sel.appendChild(optGroup);
  });
}

function renderTrend(){
  const pumpId = document.getElementById('trend-pump-select').value;
  const out = document.getElementById('trend-output');
  if(!pumpId){ out.innerHTML = '<div class="no-data">Select a pump to view its trend log</div>'; return; }
  const entries = loadEntries();
  const pumpEntries = entries.filter(e => e.pumps && e.pumps[pumpId]);
  if(!pumpEntries.length){ out.innerHTML = '<div class="no-data">No entries recorded for this pump yet</div>'; return; }
  const group = PUMP_GROUPS.find(g => g.pumps.includes(pumpId));
  const fields = group ? group.fields : [];
  let html = `<div class="trend-card"><div class="trend-title">${pumpId} — Trend Log</div><table class="trend-table"><thead><tr><th>Date</th><th>Tech</th>`;
  fields.forEach(f => { html += `<th>${FIELD_LABELS[f]}</th>`; });
  html += '</tr></thead><tbody>';
  pumpEntries.slice().reverse().forEach(e => {
    const d = e.pumps[pumpId];
    html += `<tr><td>${formatDate(e.date)}</td><td>${e.tech||'—'}</td>`;
    fields.forEach(f => {
      const val = d[f]||'—';
      let cls = '';
      if(f==='alarm' && val && val!=='No' && val!=='—') cls = 'alarm-yes';
      if(f==='standby' && (val==='✓'||val==='No')) cls = 'standby';
      html += `<td class="${cls}">${val}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  out.innerHTML = html;
}

function renderHistory(){
  const entries = loadEntries();
  const list = document.getElementById('history-list');
  if(!entries.length){ list.innerHTML = '<div class="no-data">No entries saved yet</div>'; return; }
  list.innerHTML = '';
  entries.slice().reverse().forEach(e => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const pumpsWithData = Object.keys(e.pumps||{}).filter(p => Object.values(e.pumps[p]).some(v=>v&&v!==''));
    const alarms = Object.entries(e.pumps||{}).filter(([,v])=>v.alarm&&v.alarm!=='No'&&v.alarm!=='').length;
    item.innerHTML = `<div><div class="history-date">${formatDate(e.date)}</div><div class="history-meta">${e.tech||'Unknown tech'} · ${pumpsWithData.length} pumps recorded${alarms?` · <span style="color:#ff6b6b">${alarms} alarm(s)</span>`:''}</div></div><div style="display:flex;gap:8px;align-items:center"><button class="tb-btn" onclick="loadEntry('${e.id}');event.stopPropagation()">Load</button><button class="history-del" onclick="deleteEntry('${e.id}');event.stopPropagation()">Delete</button></div>`;
    item.addEventListener('click', ()=>loadEntry(e.id));
    list.appendChild(item);
  });
}

function loadEntry(id){
  const entries = loadEntries();
  const entry = entries.find(e => String(e.id)===String(id));
  if(!entry) return;
  document.getElementById('entry-date').value = entry.date;
  document.getElementById('entry-tech').value = entry.tech||'';
  PUMP_GROUPS.forEach(g => {
    g.pumps.forEach(pumpId => {
      if(!entry.pumps[pumpId]) return;
      g.fields.forEach(f => { const el = document.getElementById(`${pumpId}_${f}`); if(el) el.value = entry.pumps[pumpId][f]||''; });
    });
  });
  showView('entry', document.querySelector('.tab'));
  document.querySelector('.tab').classList.add('active');
  showToast('Entry loaded');
}

function deleteEntry(id){
  if(!confirm('Delete this entry?')) return;
  const entries = loadEntries().filter(e=>String(e.id)!==String(id));
  saveEntries(entries);
  renderHistory();
  updateStatusLabel();
  showToast('Entry deleted');
}

function exportCSV(){
  const entries = loadEntries();
  if(!entries.length){ showToast('No entries to export'); return; }
  const allFields = ['date','tech','pump','standby','alarm','hrs','freq','pOut','pIn','sealFlow','motorTemp'];
  let csv = allFields.join(',')+'\n';
  entries.forEach(e => {
    ALL_PUMPS.forEach(pumpId => {
      if(!e.pumps[pumpId]) return;
      const d = e.pumps[pumpId];
      const row = [e.date, e.tech||'', pumpId, d.standby||'', d.alarm||'', d.hrs||'', d.freq||'', d.pOut||'', d.pIn||'', d.sealFlow||'', d.motorTemp||''];
      csv += row.map(v=>`"${v}"`).join(',')+'\n';
    });
  });
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mhac-pump-inspections.csv';
  a.click();
  showToast('CSV exported ✓');
}

function showView(name, btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='trends'){ populatePumpSelect(); renderTrend(); }
  if(name==='history') renderHistory();
}

function formatDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function updateStatusLabel(){
  const count = loadEntries().length;
  document.getElementById('entry-count-label').textContent = `· ${count} entr${count===1?'y':'ies'} saved`;
}

buildForm();
document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

// ── CLOUD INIT ──────────────────────────────────────────────────────
(async function(){
  const cloud = await sbGet(STORE_KEY);
  if(cloud !== null) localStorage.setItem(STORE_KEY, JSON.stringify(cloud));
  document.getElementById('cloud-overlay').style.display = 'none';
  updateStatusLabel();
})();
</script>
