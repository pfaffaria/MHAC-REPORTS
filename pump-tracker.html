<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Pump Inspection Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--card:#0d0800}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,0.2);background:linear-gradient(180deg,rgba(12,7,0,0.97) 0%,rgba(12,7,0,0.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);flex-shrink:0;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover{background:rgba(245,158,11,.15);color:#fff}
.tb-btn.primary{border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.1)}
.tb-btn.primary:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.indi{font-size:10px;letter-spacing:1.5px;font-weight:600}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:72px 16px 48px;max-width:1200px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;padding-top:8px}
.tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.8)}
.tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.view{display:none}.view.active{display:block}
.entry-header{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.entry-header h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.month-note{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-bottom:18px}
.date-input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 12px;outline:none}
.date-input:focus{border-color:rgba(245,158,11,.6)}
.tech-input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 12px;outline:none;width:160px}
.tech-input::placeholder{color:rgba(245,158,11,.3)}
.pump-group{margin-bottom:24px}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--amber);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(245,158,11,.15);text-transform:uppercase}
.pump-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.pump-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:12px 14px}
.pump-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pump-name span{font-size:9px;letter-spacing:1px;color:rgba(245,158,11,.35);font-family:'Rajdhani',sans-serif;font-weight:600}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.field{display:flex;flex-direction:column;gap:2px}
.field.full{grid-column:span 2}
.field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.field input,.field select{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:4px 8px;outline:none;width:100%;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.1)}
.field input::placeholder{color:rgba(245,158,11,.2)}
.field select option{background:#0f0a03;color:#fef3c7}
.field input.alarm{border-color:rgba(255,80,80,.5);background:rgba(255,80,80,.08)}
.trend-controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.pump-select{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;outline:none;min-width:200px}
.trend-card{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:16px;margin-bottom:16px;overflow-x:auto}
.trend-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--amber);margin-bottom:14px}
.trend-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.trend-table th{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,158,11,.5);font-weight:700;padding:6px 10px;text-align:left;border-bottom:1px solid rgba(245,158,11,.1);white-space:nowrap}
.trend-table td{padding:6px 10px;border-bottom:1px solid rgba(245,158,11,.06);color:#fef3c7;font-weight:600;white-space:nowrap}
.trend-table tr:last-child td{border-bottom:none}
.trend-table tr:hover td{background:rgba(245,158,11,.04)}
.trend-table td.alarm-yes{color:#ff6b6b}
.trend-table td.standby{color:rgba(245,158,11,.5)}
.submit-row{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(245,158,11,.1);flex-wrap:wrap}
.btn-submit{padding:10px 28px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.btn-clear{padding:10px 18px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-clear:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.7)}
.no-data{text-align:center;padding:40px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<div id="cloud-overlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,5,0,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MHAC</div>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.5);text-transform:uppercase">Syncing data...</div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.2s ease-in-out infinite"></div>
    <div style="width:7px;height:7px;border-radius:50%;background:#f59e0b;animation:sblink 0.8s 0.4s ease-in-out infinite"></div>
  </div>
</div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Penthouse</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <button class="tb-btn primary" onclick="exportExcel()">&#8595; Excel</button>
    <a class="tb-btn" id="pump-back-btn" href="Penthouse.html">&#8592; Back</a>
  </div>
</nav>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showView('entry',this)">Monthly Entry</button>
    <button class="tab" onclick="showView('trends',this)">Trend Log</button>
  </div>

  <!-- ENTRY -->
  <div class="view active" id="view-entry">
    <div class="entry-header">
      <h2>Monthly Pump Checks</h2>
      <input type="text" class="tech-input" id="entry-tech" placeholder="Technician"/>
      <input type="date" class="date-input" id="entry-date"/>
    </div>
    <div class="month-note" id="month-note">Penthouse</div>
    <div id="pump-form"></div>
    <div class="submit-row">
      <button class="btn-submit" onclick="exportExcel()">&#8595; Save / Print as Excel</button>
      <button class="btn-clear" onclick="clearMonth()">Clear This Month</button>
    </div>
  </div>

  <!-- TRENDS -->
  <div class="view" id="view-trends">
    <div class="trend-controls">
      <select class="pump-select" id="trend-pump-select" onchange="renderTrend()">
        <option value="">— Select a pump —</option>
      </select>
    </div>
    <div id="trend-out"></div>
  </div>
</div>

<div class="statusbar">
  <div class="sdot"></div>
  <span>Pump Inspection Tracker</span>
  <span id="status-lbl">·</span>
  <span class="indi" id="sync-indi"></span>
  <div class="wfall"><div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div><div class="wb" style="--d:.9s"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══ SUPABASE SYNC ═══════════════════════════════════════════════════
const SB_URL='https://nqlpevxqedqxfjnlxxws.supabase.co';
const SB_PUB='sb_publishable_Ug-6aCZ-InZVnrCTqcLv2w_BheY4Kj5';
const SB_H={'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':'application/json'};
function sbGet(k){
  var controller=typeof AbortController!=='undefined'?new AbortController():null;
  var timer=controller?setTimeout(function(){controller.abort();},6000):null;
  var opts={headers:SB_H};if(controller)opts.signal=controller.signal;
  return fetch(SB_URL+'/rest/v1/app_data?key=eq.'+encodeURIComponent(k)+'&select=value',opts)
    .then(function(r){if(timer)clearTimeout(timer);if(!r.ok)throw 0;return r.json();})
    .then(function(d){return {ok:true,value:d.length?d[0].value:null};})
    .catch(function(){if(timer)clearTimeout(timer);return {ok:false};});
}
function sbSet(k,v){return fetch(SB_URL+'/rest/v1/app_data',{method:'POST',headers:Object.assign({},SB_H,{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})});}

// ═══ DATA MODEL ══════════════════════════════════════════════════════
// Field order matches the paper form. Last field is Seal Flow OR Motor Temp per group.
var BASE_FIELDS=['standby','alarm','hrs','freq','pout','pin'];
var FIELD_LABELS={standby:'Stand by',alarm:'ALARM',hrs:'Hrs',freq:'Freq',pout:'P Out',pin:'P In',sealflow:'Seal Flow',motortemp:'Motor Temp'};
// PUMP_GROUPS — ordered to match the penthouse check route (left-to-right, top-to-bottom).
var PUMP_GROUPS=[
  {group:'Primary Hot Water Heating Pumps',      pumps:['HTG-PH-01A','HTG-PH-01B','HTG-PH-01C'], last:'sealflow'},
  {group:'Heat Recovery Chiller',                pumps:['HTG-PH-02'],               last:'sealflow'},
  {group:'Snow Melt',                            pumps:['SM-PH-01'],                last:'sealflow'},
  {group:'AHU Hot Glycol Pumps',                 pumps:['HGL-PH-01A','HGL-PH-01B'], last:'sealflow'},
  {group:'Hot Water Pre Heat Pumps',             pumps:['PHT-PH-01-A','PHT-PH-01-B'],last:'motortemp'},
  {group:'Recirculation Pump Level 3/4/5',       pumps:['DHWR-PH-02A','DHWR-PH-02B'],last:'motortemp'},
  {group:'Recirculation Pumps',                  pumps:['DHWR-PH-01A','DHWR-PH-01B'],last:'motortemp'},
  {group:'Heat Exchanger Pumps',                 pumps:['DHW-PH-01A','DHW-PH-01B'], last:'motortemp'},
  {group:'Process Cooling Chilled Water Pumps',  pumps:['CHW-PH-04A','CHW-PH-04B'], last:'sealflow'},
  {group:'AHU Chilled Water Pumps',              pumps:['CHW-PH-02A','CHW-PH-02B'], last:'sealflow'},
  {group:'Heat Recovery Chiller Pump',           pumps:['CHW-PH-03'],               last:'sealflow'},
  {group:'Primary Chilled Water Pumps',          pumps:['CHW-PH-01A','CHW-PH-01B'], last:'sealflow'}
];
function groupFields(g){ return BASE_FIELDS.concat([g.last]); }
function pumpGroup(pumpId){ return PUMP_GROUPS.find(function(g){return g.pumps.indexOf(pumpId)!==-1;}); }
var ALL_PUMPS=[]; PUMP_GROUPS.forEach(function(g){g.pumps.forEach(function(p){ALL_PUMPS.push(p);});});

// ═══ STORAGE (month-scoped, autosaved, auto-pruned) ══════════════════
const DATA_KEY='mhac-pump-rounds'; // {"YYYY-MM": {tech, date, pumps:{id:{field:val}}}}
function curMonth(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function prevMonth(){var n=new Date();n.setMonth(n.getMonth()-1);return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function monthLabel(ym){var p=(ym||curMonth()).split('-');return ['January','February','March','April','May','June','July','August','September','October','November','December'][parseInt(p[1])-1]+' '+p[0];}
function loadAll(){try{return JSON.parse(localStorage.getItem(DATA_KEY))||{};}catch(e){return{};}}
function pruneAll(all){var keep={},c=curMonth(),p=prevMonth();if(all[c])keep[c]=all[c];if(all[p])keep[p]=all[p];return keep;}
function curEntry(){var all=loadAll();return all[curMonth()]||{tech:'',date:'',pumps:{}};}
var _saveBlocked=false;
function saveCur(entry){
  var all=loadAll(); all[curMonth()]=entry; all=pruneAll(all);
  try{localStorage.setItem(DATA_KEY,JSON.stringify(all));}catch(e){}
  if(_saveBlocked){setIndicator('Offline — saved on device','#f59e0b');return;}
  setIndicator('Saving…','#fcd34d');
  sbSet(DATA_KEY,all).then(function(r){
    if(!r||!r.ok)throw 0;
    setIndicator('Saved','#22c55e');setTimeout(function(){setIndicator('','');},2000);
  }).catch(function(){setIndicator('Cloud save failed — on device','#ef4444');});
}
function setIndicator(t,c){var s=document.getElementById('sync-indi');if(s){s.textContent=t?('· '+t):'';s.style.color=c||'';}}

// Debounced autosave: gather the whole form and write to the current month.
var _saveTimer;
function autoSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(writeForm,500);}
function writeForm(){
  var entry={tech:val('entry-tech'),date:val('entry-date'),pumps:{}};
  PUMP_GROUPS.forEach(function(g){
    var fields=groupFields(g);
    g.pumps.forEach(function(id){
      entry.pumps[id]={};
      fields.forEach(function(f){var el=document.getElementById(id+'_'+f);if(el)entry.pumps[id][f]=el.value;});
    });
  });
  saveCur(entry);
}
function val(id){var el=document.getElementById(id);return el?el.value:'';}

// ═══ RENDER ENTRY FORM ═══════════════════════════════════════════════
function renderForm(){
  var entry=curEntry();
  document.getElementById('entry-tech').value=entry.tech||'';
  document.getElementById('entry-date').value=entry.date|| (new Date().toISOString().split('T')[0]);
  document.getElementById('month-note').textContent='Penthouse · '+monthLabel(curMonth())+' — autosaves as you type';
  document.getElementById('status-lbl').textContent='· '+monthLabel(curMonth())+' · '+ALL_PUMPS.length+' pumps';
  var form=document.getElementById('pump-form'); form.innerHTML='';
  PUMP_GROUPS.forEach(function(g){
    var fields=groupFields(g);
    var grp=document.createElement('div'); grp.className='pump-group';
    var grid='';
    g.pumps.forEach(function(id){
      var saved=(entry.pumps&&entry.pumps[id])||{};
      var fh='';
      fields.forEach(function(f){
        var v=saved[f]!=null?saved[f]:'';
        if(f==='standby'||f==='alarm'){
          fh+='<div class="field"><label>'+FIELD_LABELS[f]+'</label><select id="'+id+'_'+f+'" onchange="onField(this,\''+f+'\');autoSave()">'+
              '<option value="">—</option><option value="Yes"'+(v==='Yes'?' selected':'')+'>Yes</option><option value="No"'+(v==='No'?' selected':'')+'>No</option></select></div>';
        } else {
          var full=(f===g.last)?' full':'';
          fh+='<div class="field'+full+'"><label>'+FIELD_LABELS[f]+'</label><input type="text" inputmode="decimal" id="'+id+'_'+f+'" placeholder="—" value="'+esc(v)+'" oninput="autoSave()"/></div>';
        }
      });
      grid+='<div class="pump-card"><div class="pump-name">'+id+' <span>'+g.group+'</span></div><div class="fields">'+fh+'</div></div>';
    });
    grp.innerHTML='<div class="group-title">'+g.group+'</div><div class="pump-grid">'+grid+'</div>';
    form.appendChild(grp);
  });
  // apply alarm styling on load
  PUMP_GROUPS.forEach(function(g){g.pumps.forEach(function(id){var a=document.getElementById(id+'_alarm');if(a)onField(a,'alarm');});});
}
function onField(el,f){
  if(f==='alarm'){
    var inp=el; // it's a select; color the card hint via the standby/alarm value
    if(el.value==='Yes'){el.style.borderColor='rgba(255,80,80,.6)';el.style.background='rgba(255,80,80,.1)';}
    else{el.style.borderColor='';el.style.background='';}
  }
}
function clearMonth(){
  if(!confirm('Clear all readings for '+monthLabel(curMonth())+'? This starts the month fresh.'))return;
  saveCur({tech:val('entry-tech'),date:val('entry-date'),pumps:{}});
  renderForm();
  showToast('Month cleared');
}

// ═══ TREND LOG ═══════════════════════════════════════════════════════
function fillTrendSelect(){
  var sel=document.getElementById('trend-pump-select');
  sel.innerHTML='<option value="">— Select a pump —</option>';
  PUMP_GROUPS.forEach(function(g){
    var og=document.createElement('optgroup');og.label=g.group;
    g.pumps.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;og.appendChild(o);});
    sel.appendChild(og);
  });
}
function renderTrend(){
  var out=document.getElementById('trend-out');
  var id=document.getElementById('trend-pump-select').value;
  if(!id){out.innerHTML='<div class="no-data">Select a pump to view its pressure trend</div>';return;}
  var g=pumpGroup(id);
  var fields=['pout','pin']; // pressure only
  var all=loadAll();
  var months=Object.keys(all).sort();
  if(!months.length){out.innerHTML='<div class="no-data">No saved data yet</div>';return;}
  var head='<th>Month</th>'+fields.map(function(f){return '<th>'+FIELD_LABELS[f]+'</th>';}).join('');
  var rows='';
  months.forEach(function(m){
    var p=(all[m].pumps&&all[m].pumps[id])||{};
    rows+='<tr><td>'+monthLabel(m)+'</td>'+fields.map(function(f){
      return '<td>'+esc(p[f]||'—')+'</td>';
    }).join('')+'</tr>';
  });
  out.innerHTML='<div class="trend-card"><div class="trend-title">'+id+' · Pressure</div><table class="trend-table"><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// ═══ EXCEL EXPORT (client-side, mirrors the paper form) ══════════════
function exportExcel(){
  if(typeof XLSX==='undefined'){showToast('Excel library not loaded — check connection');return;}
  writeForm(); // make sure latest typing is captured
  var entry=curEntry();
  var aoa=[];
  aoa.push(['Monthly Pump Checks — Penthouse']);
  aoa.push(['Month:', monthLabel(curMonth()), '', 'Technician:', entry.tech||'', '', 'Date:', entry.date||'']);
  aoa.push([]);
  PUMP_GROUPS.forEach(function(g){
    var fields=groupFields(g);
    aoa.push([g.group]);
    // header row: blank + pump ids
    aoa.push([''].concat(g.pumps));
    fields.forEach(function(f){
      var row=[FIELD_LABELS[f]];
      g.pumps.forEach(function(id){var p=(entry.pumps&&entry.pumps[id])||{};row.push(p[f]!=null?p[f]:'');});
      aoa.push(row);
    });
    aoa.push([]);
  });
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:14},{wch:16},{wch:16},{wch:16},{wch:16}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Pump Rounds');
  var fname='MHAC-Pump-Rounds-PH-'+curMonth()+'.xlsx';
  XLSX.writeFile(wb,fname);
  showToast('Excel exported ✓');
}

// ═══ HELPERS / VIEWS ═════════════════════════════════════════════════
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showView(name,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='trends'){fillTrendSelect();renderTrend();}
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

var urlLvl=new URLSearchParams(window.location.search).get('level');
var bb=document.getElementById('pump-back-btn'); if(bb&&urlLvl)bb.href='level-reports.html?level='+urlLvl;

(function(){
  var done=false;
  function finish(){if(done)return;done=true;document.getElementById('cloud-overlay').style.display='none';renderForm();}
  setTimeout(finish,8000);
  sbGet(DATA_KEY).then(function(res){
    if(res.ok){
      if(res.value && typeof res.value==='object'){
        var pruned=pruneAll(res.value);
        try{localStorage.setItem(DATA_KEY,JSON.stringify(pruned));}catch(e){}
      }
      _saveBlocked=false;
    } else { _saveBlocked=true; }
    finish();
  });
})();
