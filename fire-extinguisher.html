<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Fire Extinguisher Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--green:#22c55e}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 24px 6px;border-bottom:1px solid rgba(245,158,11,0.2);background:linear-gradient(180deg,rgba(12,7,0,0.97) 0%,rgba(12,7,0,0.72) 100%);backdrop-filter:blur(14px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.55;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,34px);letter-spacing:6px;line-height:1;background:linear-gradient(130deg,#fff8dc 0%,#ffd966 40%,#ffb700 75%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,183,0,.55));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(255,183,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(255,183,0,.8))}}
.tb-line{width:2px;height:28px;background:linear-gradient(180deg,transparent,var(--amber),transparent);flex-shrink:0;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.tb-btn:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:16px;padding:3px 24px;background:rgba(8,4,0,.88);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
.page{position:relative;z-index:2;min-height:100vh;padding:72px 16px 48px;max-width:700px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:20px;padding-top:8px}
.tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.5);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.8)}
.tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.view{display:none}.view.active{display:block}
.level-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.level-tab{padding:5px 14px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.level-tab:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.7)}
.level-tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.checklist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.checklist-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-pill{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:20px;padding:3px 12px}
.progress-pill.complete{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#4ade80}
.checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;cursor:pointer;transition:all .22s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.check-item:hover{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)}
.check-item.checked{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.3)}
.check-box{width:28px;height:28px;border-radius:6px;border:2px solid rgba(245,158,11,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-item.checked .check-box{background:var(--green);border-color:var(--green)}
.check-box svg{display:none}
.check-item.checked .check-box svg{display:block}
.check-info{flex:1;min-width:0}
.check-id{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--amber-light);transition:color .2s}
.check-item.checked .check-id{color:#4ade80}
.check-loc{font-size:10px;letter-spacing:1px;color:rgba(245,158,11,.4);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.check-time{font-size:9px;letter-spacing:1px;color:rgba(34,197,94,.6);text-transform:uppercase;flex-shrink:0}
.check-del{background:none;border:none;color:rgba(245,158,11,.2);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:3px;transition:all .2s;flex-shrink:0;line-height:1}
.check-del:hover{color:#f87171;background:rgba(239,68,68,.1)}
.action-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn-primary{padding:8px 16px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:5px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.btn-secondary{padding:8px 14px;background:transparent;border:1px solid rgba(245,158,11,.15);border-radius:5px;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.7)}
.btn-scan{padding:8px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:5px;color:#fca5a5;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-scan:hover{background:rgba(239,68,68,.18);border-color:#f87171;color:#fff}
.btn-scan.scanning{background:rgba(239,68,68,.2);border-color:#ef4444;color:#fff;animation:scanpulse 1s ease-in-out infinite}
@keyframes scanpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
#scanner-container{margin-bottom:16px;display:none;border-radius:10px;overflow:hidden;border:1px solid rgba(239,68,68,.3)}
#scanner-container.active{display:block}
#reader{width:100%}
.scanner-hint{padding:8px;text-align:center;font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;background:rgba(0,0,0,.3)}
.add-form{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:14px;margin-bottom:16px;display:none}
.add-form.active{display:block}
.add-form-title{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase;font-weight:700;margin-bottom:10px}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.add-field{display:flex;flex-direction:column;gap:3px}
.add-field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.add-field input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:6px 10px;outline:none;width:100%}
.add-field input:focus{border-color:rgba(245,158,11,.5)}
.add-field input::placeholder{color:rgba(245,158,11,.25)}
.history-item{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.history-date{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--amber-light);margin-bottom:4px}
.history-meta{font-size:10px;letter-spacing:1px;color:rgba(245,158,11,.4);text-transform:uppercase;margin-bottom:8px}
.history-checks{display:flex;flex-wrap:wrap;gap:4px}
.hc{font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:3px;text-transform:uppercase;font-weight:700}
.hc.done{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80}
.hc.missed{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.12);color:rgba(245,158,11,.35)}
.no-data{text-align:center;padding:32px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;line-height:2}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
<script>
function getSession(){try{return JSON.parse(sessionStorage.getItem('mhac-session'))||null;}catch(e){return null;}}
function clearSession(){sessionStorage.removeItem('mhac-session');}
(function(){if(!getSession()){window.location.href='index.html';}})();
</script>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<nav class="topbar">
  <div class="tb-left">
    <div class="tb-badge">Fire Safety</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
  </div>
  <div class="tb-right">
    <a class="tb-btn" id="back-btn" href="index.html">← Home</a>
    <button class="tb-btn" style="border-color:rgba(239,68,68,.25);color:rgba(239,68,68,.6)" onclick="clearSession();window.location.href='index.html'">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showView('checklist',this)">Checklist</button>
    <button class="tab" onclick="showView('history',this)">History</button>
  </div>

  <!-- CHECKLIST -->
  <div class="view active" id="view-checklist">
    <div class="level-tabs" id="level-tabs"></div>

    <div class="checklist-header">
      <div class="checklist-title" id="cl-title">Level 1</div>
      <div class="progress-pill" id="cl-progress">0 / 0</div>
    </div>

    <div id="scanner-container">
      <div id="reader"></div>
      <div class="scanner-hint">Point camera at barcode · tap Stop when done</div>
    </div>

    <div class="action-row">
      <button class="btn-scan" id="scan-btn" onclick="toggleScanner()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><line x1="16" y1="11" x2="21" y2="11"/><line x1="11" y1="3" x2="11" y2="5"/><line x1="11" y1="8" x2="11" y2="13"/></svg>
        Scan Barcode
      </button>
      <button class="btn-primary" onclick="toggleAddForm()">+ Add</button>
      <button class="btn-secondary" onclick="resetChecks()">Reset</button>
      <button class="btn-secondary" onclick="saveMonth()">Save Month</button>
    </div>

    <div class="add-form" id="add-form">
      <div class="add-form-title">Add Extinguisher</div>
      <div class="add-form-grid">
        <div class="add-field"><label>ID / Barcode</label><input id="new-id" placeholder="e.g. FE-L1-01" autocomplete="off"/></div>
        <div class="add-field"><label>Location</label><input id="new-loc" placeholder="e.g. Near stairwell" autocomplete="off"/></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary" onclick="addExt()">Add</button>
        <button class="btn-secondary" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>

    <div class="checklist" id="checklist"></div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">History</div>
      <div class="level-tabs" id="hist-level-tabs" style="margin:0"></div>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<div class="statusbar">
  <div class="sdot"></div>
  <span>Fire Extinguisher Checklist</span>
  <span id="status-lbl">·</span>
  <div class="wfall"><div class="wb" style="--d:.7s"></div><div class="wb" style="--d:1.1s"></div><div class="wb" style="--d:.9s"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const LOCS_KEY='mhac-fe-locs', CHKS_KEY='mhac-fe-chks', HIST_KEY='mhac-fe-hist';
let curLevel='1', histLevel='1', scanner=null, scanning=false;

const load = k=>{ try{ return JSON.parse(localStorage.getItem(k))||{}; }catch(e){return{};} };
const save = (k,d)=>localStorage.setItem(k,JSON.stringify(d));
const loadArr = k=>{ try{ return JSON.parse(localStorage.getItem(k))||[]; }catch(e){return[];} };

function mkLevelTabs(id, active, cb){
  const c=document.getElementById(id); c.innerHTML='';
  for(let i=1;i<=5;i++){
    const b=document.createElement('button');
    b.className='level-tab'+(String(i)===active?' active':'');
    b.textContent='Level '+i;
    b.onclick=()=>cb(String(i));
    c.appendChild(b);
  }
}

function render(){
  const locs=(load(LOCS_KEY)[curLevel]||[]);
  const chks=(load(CHKS_KEY)[curLevel]||{});
  const done=Object.values(chks).filter(Boolean).length;
  document.getElementById('cl-title').textContent='Level '+curLevel;
  const pill=document.getElementById('cl-progress');
  pill.textContent=done+' / '+locs.length;
  pill.className='progress-pill'+(done===locs.length&&locs.length>0?' complete':'');
  document.getElementById('status-lbl').textContent=`· ${done}/${locs.length} checked`;

  const list=document.getElementById('checklist');
  list.innerHTML='';
  if(!locs.length){
    list.innerHTML='<div class="no-data">No extinguishers on Level '+curLevel+'<br>Tap "+ Add" to add locations</div>';
    return;
  }
  locs.forEach(loc=>{
    const checked=!!chks[loc.id];
    const el=document.createElement('div');
    el.className='check-item'+(checked?' checked':'');
    el.innerHTML=`
      <div class="check-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="check-info">
        <div class="check-id">${loc.id}</div>
        <div class="check-loc">${loc.location||'No description'}</div>
      </div>
      ${checked?`<div class="check-time">${chks[loc.id]}</div>`:''}
      <button class="check-del" onclick="delExt('${loc.id}');event.stopPropagation()">✕</button>`;
    el.addEventListener('click',e=>{ if(e.target.classList.contains('check-del'))return; toggleChk(loc.id); });
    list.appendChild(el);
  });
}

function toggleChk(id){
  const chks=load(CHKS_KEY);
  if(!chks[curLevel]) chks[curLevel]={};
  if(chks[curLevel][id]){ delete chks[curLevel][id]; }
  else { const n=new Date(); chks[curLevel][id]=n.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}); }
  save(CHKS_KEY,chks); render();
}

function resetChecks(){
  if(!confirm('Reset all checks for Level '+curLevel+'?')) return;
  const chks=load(CHKS_KEY); chks[curLevel]={}; save(CHKS_KEY,chks); render(); showToast('Reset ✓');
}

function saveMonth(){
  const locs=load(LOCS_KEY)[curLevel]||[];
  if(!locs.length){ showToast('No extinguishers on this level'); return; }
  const chks=load(CHKS_KEY)[curLevel]||{};
  const missed=locs.filter(l=>!chks[l.id]);
  if(missed.length>0){
    const names=missed.map(l=>l.id).join(', ');
    if(!confirm(missed.length+' extinguisher'+(missed.length>1?'s':'')+' not checked:\n\n'+names+'\n\nSave anyway?')) return;
  }
  const hist=loadArr(HIST_KEY);
  hist.unshift({ date:new Date().toISOString().split('T')[0], level:curLevel,
    items:locs.map(l=>({id:l.id,location:l.location,checked:!!chks[l.id],time:chks[l.id]||''}))});
  save(HIST_KEY,hist); showToast('Month saved ✓');
}

function toggleAddForm(){
  const f=document.getElementById('add-form'); f.classList.toggle('active');
  if(f.classList.contains('active')) document.getElementById('new-id').focus();
}

function addExt(){
  const id=document.getElementById('new-id').value.trim();
  const loc=document.getElementById('new-loc').value.trim();
  if(!id){ showToast('Enter an ID'); return; }
  const locs=load(LOCS_KEY);
  if(!locs[curLevel]) locs[curLevel]=[];
  if(locs[curLevel].find(l=>l.id===id)){ showToast('Already exists'); return; }
  locs[curLevel].push({id,location:loc});
  save(LOCS_KEY,locs);
  document.getElementById('new-id').value='';
  document.getElementById('new-loc').value='';
  document.getElementById('add-form').classList.remove('active');
  render(); showToast('Added ✓');
}

function delExt(id){
  if(!confirm('Remove '+id+' from Level '+curLevel+'?')) return;
  const locs=load(LOCS_KEY); locs[curLevel]=(locs[curLevel]||[]).filter(l=>l.id!==id); save(LOCS_KEY,locs);
  const chks=load(CHKS_KEY); if(chks[curLevel]) delete chks[curLevel][id]; save(CHKS_KEY,chks);
  render(); showToast('Removed');
}

// SCANNER
function toggleScanner(){ scanning?stopScanner():startScanner(); }

function startScanner(){
  document.getElementById('scanner-container').classList.add('active');
  const btn=document.getElementById('scan-btn');
  btn.classList.add('scanning');
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Stop';
  scanning=true;
  scanner=new Html5Qrcode('reader');
  scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:140}},
    code=>onScan(code), ()=>{}).catch(err=>{ showToast('Camera: '+err); stopScanner(); });
}

function stopScanner(){
  if(scanner){ scanner.stop().catch(()=>{}); scanner=null; }
  document.getElementById('scanner-container').classList.remove('active');
  const btn=document.getElementById('scan-btn');
  btn.classList.remove('scanning');
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><line x1="16" y1="11" x2="21" y2="11"/><line x1="11" y1="3" x2="11" y2="5"/></svg> Scan Barcode';
  scanning=false;
}

function onScan(code){
  const locs=load(LOCS_KEY)[curLevel]||[];
  const match=locs.find(l=>l.id===code);
  if(match){
    const chks=load(CHKS_KEY); if(!chks[curLevel]) chks[curLevel]={};
    if(!chks[curLevel][code]){
      const n=new Date(); chks[curLevel][code]=n.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
      save(CHKS_KEY,chks); render(); showToast('✓ '+code);
      if(navigator.vibrate) navigator.vibrate(100);
    } else { showToast(code+' already checked'); }
  } else {
    showToast('Unknown barcode — add it below');
    stopScanner();
    document.getElementById('new-id').value=code;
    document.getElementById('add-form').classList.add('active');
    document.getElementById('new-loc').focus();
  }
}

// HISTORY
function renderHistory(){
  const records=loadArr(HIST_KEY).filter(r=>r.level===histLevel);
  const list=document.getElementById('history-list');
  if(!records.length){ list.innerHTML='<div class="no-data">No history saved yet<br>Complete a round and tap "Save Month"</div>'; return; }
  list.innerHTML=records.map(r=>{
    const done=r.items.filter(i=>i.checked).length;
    return `<div class="history-item">
      <div class="history-date">${fmtDate(r.date)}</div>
      <div class="history-meta">Level ${r.level} · ${done}/${r.items.length} checked</div>
      <div class="history-checks">${r.items.map(i=>`<span class="hc ${i.checked?'done':'missed'}">${i.id}${i.time?' '+i.time:''}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='history') renderHistory();
  if(scanning) stopScanner();
}

function fmtDate(d){
  if(!d) return '—';
  const [y,m,day]=d.split('-');
  return `${parseInt(day)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${y}`;
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('new-id').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('new-loc').focus(); });
document.getElementById('new-loc').addEventListener('keydown',e=>{ if(e.key==='Enter') addExt(); });

// Read level from URL
var urlLevel = new URLSearchParams(window.location.search).get('level');
if(urlLevel) currentLevel = urlLevel;
// Update back button
var bb = document.getElementById('back-btn');
if(bb && urlLevel) bb.href = 'level-reports.html?level=' + urlLevel;
// INIT
mkLevelTabs('level-tabs',curLevel,l=>{curLevel=l;if(scanning)stopScanner();mkLevelTabs('level-tabs',curLevel,ll=>{curLevel=ll;if(scanning)stopScanner();render();});render();});
mkLevelTabs('hist-level-tabs',histLevel,l=>{histLevel=l;mkLevelTabs('hist-level-tabs',histLevel,ll=>{histLevel=ll;renderHistory();});renderHistory();});
render();
</script>
