<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHAC — Room Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--card:#0d0800;--green:#22c55e;--red:#ef4444}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 4px)}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:rgba(15,10,3,.97);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:36px 32px;width:340px;max-width:92vw;box-shadow:0 0 60px rgba(0,0,0,.8)}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:8px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;filter:drop-shadow(0 0 20px rgba(255,183,0,.5))}
.login-sub{font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.35);text-transform:uppercase;text-align:center;margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.login-field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.login-field input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:6px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;padding:9px 12px;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:rgba(245,158,11,.55)}
.login-btn{width:100%;padding:11px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:6px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all .2s}
.login-btn:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff;box-shadow:0 0 20px rgba(245,158,11,.2)}
.login-err{font-size:10px;letter-spacing:1px;color:#f87171;text-align:center;margin-top:8px;text-transform:uppercase;min-height:16px}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 20px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97),rgba(12,7,0,.72));backdrop-filter:blur(14px)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.5;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,2.5vw,30px);letter-spacing:5px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 14px rgba(255,183,0,.5));animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 10px rgba(255,183,0,.35))}50%{filter:drop-shadow(0 0 24px rgba(255,183,0,.75))}}
.tb-line{width:2px;height:26px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-r{display:flex;align-items:center;gap:6px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 11px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.tb-btn:hover{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.tb-btn.danger{border-color:rgba(239,68,68,.3);color:rgba(239,68,68,.6)}
.tb-btn.danger:hover{background:rgba(239,68,68,.1);border-color:#ef4444;color:#f87171}
.admin-badge{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.5);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:3px;padding:2px 7px;text-transform:uppercase}

/* PAGE */
.page{position:relative;z-index:2;min-height:100vh;padding:68px 14px 48px;max-width:1000px;margin:0 auto}

/* LEVEL / ZONE TABS */
.lvl-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding-top:8px}
.lvl-btn{padding:5px 14px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.lvl-btn.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}

/* ROOM GRID */
.zone-section{margin-bottom:20px}
.zone-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(245,158,11,.1)}
.zone-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--amber)}
.room-grid{display:flex;flex-wrap:wrap;gap:6px}
.room-chip{padding:6px 12px;border:1px solid rgba(245,158,11,.18);border-radius:6px;background:rgba(245,158,11,.04);cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:rgba(245,158,11,.6);position:relative;-webkit-tap-highlight-color:transparent}
.room-chip:hover{border-color:rgba(245,158,11,.4);color:var(--amber-light);background:rgba(245,158,11,.08)}
.room-chip.active{border-color:var(--amber);color:#fff;background:rgba(245,158,11,.18);box-shadow:0 0 12px rgba(245,158,11,.2)}
.room-chip.has-issues{border-color:rgba(239,68,68,.4);color:#fca5a5}
.room-chip .issue-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#ef4444;box-shadow:0 0 4px #ef4444}
.room-chip .sub-label{display:block;font-size:8px;letter-spacing:1px;color:rgba(245,158,11,.35);font-weight:600;margin-top:1px}
.add-room-btn{padding:6px 12px;border:1px dashed rgba(245,158,11,.2);border-radius:6px;background:transparent;cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(245,158,11,.3)}
.add-room-btn:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.6);background:rgba(245,158,11,.04)}

/* ROOM PANEL - sticky header */
#room-panel{display:none;margin-top:16px}
.room-panel-header{position:sticky;top:62px;z-index:100;background:linear-gradient(180deg,rgba(10,6,0,.98),rgba(10,6,0,.92));border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px 16px;margin-bottom:12px;backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.room-panel-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.room-panel-sub{font-size:10px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase}
.room-panel-actions{display:flex;gap:6px;flex-wrap:wrap}

/* CHECKLIST TABS */
.check-tabs{display:flex;gap:6px;margin-bottom:14px}
.check-tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.45);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.check-tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.check-view{display:none}.check-view.active{display:block}

/* CHECKLIST ITEMS */
.check-section{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:10px}
.check-item-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.check-box-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px}
.check-cb{width:20px;height:20px;border-radius:4px;border:2px solid rgba(245,158,11,.3);cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .2s;background:transparent}
.check-cb:checked{background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.5 3.5l-7.5 7.5-3.5-3.5'/%3E%3C/svg%3E");background-size:12px;background-repeat:no-repeat;background-position:center}
.check-info{flex:1}
.check-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--amber-light);letter-spacing:.5px}
.check-desc{font-size:10px;color:rgba(245,158,11,.4);line-height:1.5;margin-top:2px;letter-spacing:.3px}
.check-note{width:100%;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:7px 10px;outline:none;resize:vertical;min-height:52px;transition:border-color .2s;margin-top:6px}
.check-note:focus{border-color:rgba(245,158,11,.4)}
.check-note::placeholder{color:rgba(245,158,11,.2)}
.check-note.issue{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.04)}
.admin-del-btn{background:none;border:none;color:rgba(245,158,11,.2);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:all .2s;line-height:1;flex-shrink:0}
.admin-del-btn:hover{color:#f87171;background:rgba(239,68,68,.1)}
.add-check-btn{width:100%;padding:8px;border:1px dashed rgba(245,158,11,.18);border-radius:6px;background:transparent;color:rgba(245,158,11,.3);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:4px}
.add-check-btn:hover{border-color:rgba(245,158,11,.35);color:rgba(245,158,11,.6);background:rgba(245,158,11,.04)}

/* SPECIAL FIELDS */
.field-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.field-label{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700;white-space:nowrap}
.field-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;padding:5px 9px;outline:none;width:90px;text-align:center;transition:border-color .2s}
.field-in:focus{border-color:rgba(245,158,11,.5)}
.field-in.ok{border-color:rgba(34,197,94,.4);color:#4ade80}
.field-in.hot{border-color:rgba(239,68,68,.4);color:#f87171}
.radio-row{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.radio-opt{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;font-weight:600;color:rgba(245,158,11,.6)}
.radio-opt input[type=radio]{accent-color:var(--amber);width:14px;height:14px}
.paint-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:22px;height:22px;border-radius:4px;border:1px solid rgba(245,158,11,.2);cursor:pointer;flex-shrink:0}
.paint-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:4px 8px;outline:none;flex:1;min-width:120px}
.paint-in::placeholder{color:rgba(245,158,11,.2)}

/* PHOTOS */
.photos-section{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:10px}
.photos-title{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase;font-weight:700;margin-bottom:10px}
.photos-grid{display:flex;flex-wrap:wrap;gap:8px}
.photo-thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid rgba(245,158,11,.2);cursor:pointer;transition:all .2s}
.photo-thumb:hover{border-color:var(--amber);transform:scale(1.04)}
.photo-add-btn{width:80px;height:80px;border:1px dashed rgba(245,158,11,.2);border-radius:6px;background:transparent;color:rgba(245,158,11,.3);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.photo-add-btn:hover{border-color:rgba(245,158,11,.4);color:rgba(245,158,11,.6);background:rgba(245,158,11,.04)}

/* HISTORY */
.history-section{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:10px}
.history-title{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.history-entry{border-bottom:1px solid rgba(245,158,11,.08);padding:8px 0}
.history-entry:last-child{border-bottom:none}
.history-date{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light)}
.history-issue{font-size:11px;color:rgba(245,158,11,.55);margin-top:2px;line-height:1.5}
.history-photos{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.history-photo{width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid rgba(245,158,11,.2);cursor:pointer}

/* TEMP TREND */
.temp-trend{margin-top:6px;background:rgba(0,0,0,.2);border-radius:4px;padding:6px 10px}
.temp-trend-title{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:4px}
.spark-row{display:flex;align-items:flex-end;gap:2px;height:28px}
.spark-b{width:10px;border-radius:1px 1px 0 0;min-height:2px}
.spark-ok{background:rgba(34,197,94,.5)}.spark-hot{background:rgba(239,68,68,.5)}.spark-cold{background:rgba(59,130,246,.5)}

/* STATUSBAR */
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:14px;padding:3px 20px;background:rgba(8,4,0,.9);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.modal-bg.active{display:flex}
.modal{background:#100b02;border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:22px;width:360px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.modal-field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.modal-field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.modal-field input,.modal-field select,.modal-field textarea{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:7px 10px;outline:none;width:100%}
.modal-field input::placeholder,.modal-field textarea::placeholder{color:rgba(245,158,11,.25)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btn{padding:8px 18px;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.modal-btn.primary{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);color:var(--amber-light)}
.modal-btn.primary:hover{background:rgba(245,158,11,.22);border-color:var(--amber)}
.modal-btn.secondary{background:transparent;border:1px solid rgba(245,158,11,.15);color:rgba(245,158,11,.4)}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:none;align-items:center;justify-content:center}
#lightbox.active{display:flex}
#lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;border:1px solid rgba(245,158,11,.2)}
#lightbox-close{position:absolute;top:16px;right:16px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amber-light);border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* PRINT SUMMARY */
@media print{
  .topbar,.statusbar,#room-panel,.zone-section,.print-hide{display:none!important}
  .print-summary{display:block!important}
  body{background:white;color:#000}
  .print-room{border:1px solid #ccc;border-radius:4px;padding:12px;margin-bottom:12px;break-inside:avoid}
  .print-room-title{font-size:16px;font-weight:bold;margin-bottom:6px}
  .print-issue{margin-left:12px;font-size:12px;margin-bottom:4px}
  .print-photo{width:80px;height:80px;object-fit:cover;border-radius:4px;margin:4px}
}
.print-summary{display:none}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 22px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="scanlines"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MHAC</div>
    <div class="login-sub">Room Inspection System</div>
    <div class="login-field"><label>Username</label><input type="text" id="login-user" placeholder="Enter username" autocomplete="off" autocapitalize="none"/></div>
    <div class="login-field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"/></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="app" style="display:none">

<nav class="topbar">
  <div class="tb-l">
    <div class="tb-badge">Inspection</div>
    <div class="tb-title">MHAC</div>
    <div class="tb-line"></div>
    <span class="admin-badge" id="role-badge" style="display:none">Admin</span>
    <span id="zone-filter-badge" style="display:none;font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.6);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:3px;padding:2px 8px;text-transform:uppercase"></span>
  </div>
  <div class="tb-r">
    <button class="tb-btn" onclick="printSummary()" title="Print floor summary">&#128438; Summary</button>
    <a class="tb-btn" id="back-map-btn" href="index.html">&#8592; Home</a>
    <button class="tb-btn danger" onclick="doLogout()">Sign Out</button>
  </div>
</nav>

<div class="page" id="main-page">
  <div class="lvl-row" id="lvl-tabs"></div>
  <div id="zone-container"></div>
  <div id="room-panel">
    <div class="room-panel-header">
      <div>
        <div class="room-panel-title" id="panel-room-title">Room</div>
        <div class="room-panel-sub" id="panel-room-sub"></div>
      </div>
      <div class="room-panel-actions">
        <button class="tb-btn" onclick="closeRoom()">&#x2715; Close</button>

// ═══════════════════════════════════════════════════════════════════
// STATE

// ═══════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════
// Read URL params — if zone is specified, filter to just that zone
var urlParams = new URLSearchParams(window.location.search);
var filterLevel = urlParams.get('level') || null;
var filterZone  = urlParams.get('zone')  || null;

function initApp(){

    document.getElementById('lvl-tabs').style.display = 'none';

    var backBtn = document.getElementById('back-map-btn');

  renderLevelTabs();

// ═══════════════════════════════════════════════════════════════════
// LEVEL TABS
// ═══════════════════════════════════════════════════════════════════
function renderLevelTabs(){
  var c = document.getElementById('lvl-tabs');
  c.innerHTML = '';
  var rooms = loadRooms();
  var levels = Object.keys(rooms).sort();
  // Always show at least levels 1-5
  ['1','2','3','4','5'].forEach(function(l){
    if(!levels.includes(l)) levels.push(l);
  });
  levels.sort();
  levels.forEach(function(l){
    var b = document.createElement('button');
    b.className = 'lvl-btn' + (l===curLevel?' active':'');
    b.textContent = 'Level ' + l;
    b.onclick = function(){
      document.querySelectorAll('.lvl-btn').forEach(function(t){ t.classList.remove('active'); });
      b.classList.add('active');
      curLevel = l;
      closeRoom();
      renderZones();
    };
    c.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════════════════════
// ZONES & ROOMS
// ═══════════════════════════════════════════════════════════════════
function renderZones(){
  var rooms = loadRooms();
  var data  = loadData();
  var container = document.getElementById('zone-container');
  container.innerHTML = '';
  var levelRooms = rooms[curLevel] || {};
  var zones = Object.keys(levelRooms);
  // Filter to specific zone if coming from map
  if(filterZone) zones = zones.filter(function(z){ return z===filterZone; });

  if(!zones.length){
    container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase">No rooms on Level '+curLevel+'</div>';
  }

  zones.forEach(function(zone){
    var section = document.createElement('div');
    section.className = 'zone-section';
    var hdr = document.createElement('div');
    hdr.className = 'zone-hdr';
    hdr.innerHTML = '<div class="zone-name">' + zone + '</div>';
    section.appendChild(hdr);

    var grid = document.createElement('div');
    grid.className = 'room-grid';
    var zoneRooms = levelRooms[zone] || [];

    zoneRooms.forEach(function(r){
      var chip = document.createElement('div');
      var hasIssues = roomHasIssues(r.num, data);
      chip.className = 'room-chip' + (r.num===curRoom?' active':'') + (hasIssues?' has-issues':'');
      chip.id = 'chip-' + r.num;
      chip.innerHTML = r.num + (r.label ? '<span class="sub-label">' + r.label + '</span>' : '') + (hasIssues ? '<span class="issue-dot"></span>' : '');
      chip.onclick = function(){ openRoom(r.num, zone); };
      grid.appendChild(chip);
    });

    if(isAdmin){
      var addBtn = document.createElement('button');
      addBtn.className = 'add-room-btn admin-only';
      addBtn.textContent = '+ Add Room';
      addBtn.onclick = function(){ openAddRoom(curLevel, zone); };
      grid.appendChild(addBtn);
    }

    section.appendChild(grid);
    container.appendChild(section);
  });

  if(isAdmin){
    var addZoneBtn = document.createElement('button');
    addZoneBtn.className = 'tb-btn admin-only';
    addZoneBtn.style.marginTop = '10px';
    addZoneBtn.textContent = '+ Add Zone';
    addZoneBtn.onclick = addZone;
    container.appendChild(addZoneBtn);
  }
}

function roomHasIssues(roomNum, data){
  var d = data[roomNum];
  if(!d) return false;
  var cats = ['electrical','plumbing','building'];
  for(var i=0;i<cats.length;i++){
    var cat = d[cats[i]] || {};
    var notes = cat.notes || {};
    if(Object.values(notes).some(function(n){ return n&&n.trim(); })) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════════
// OPEN / CLOSE ROOM
// ═══════════════════════════════════════════════════════════════════
function openRoom(roomNum, zone){
  // Deactivate all chips, activate this one
  document.querySelectorAll('.room-chip').forEach(function(c){ c.classList.remove('active'); });
  var chip = document.getElementById('chip-' + roomNum);
  if(chip) chip.classList.add('active');

  curRoom = roomNum;

  // Get room info
  var rooms = loadRooms();
  var levelRooms = rooms[curLevel] || {};
  var roomInfo = null;
  var zoneName = zone;
  Object.keys(levelRooms).forEach(function(z){
    var found = levelRooms[z].find(function(r){ return r.num===roomNum; });
    if(found){ roomInfo=found; zoneName=z; }
  });

  document.getElementById('panel-room-title').textContent = roomNum;
  document.getElementById('panel-room-sub').textContent = (roomInfo&&roomInfo.label?roomInfo.label+' · ':'')+zoneName+' · Level '+curLevel;
  document.getElementById('history-room-label').textContent = roomNum;

  var panel = document.getElementById('room-panel');
  panel.style.display = 'block';

  // Hide history panel
  document.getElementById('history-panel').style.display = 'none';

  // Switch to electrical tab
  switchCheckTab('electrical', document.querySelector('.check-tab'));

  // Render checklists
  renderChecklist('electrical', roomInfo);
  renderChecklist('plumbing', roomInfo);
  renderChecklist('building', roomInfo);
  renderPhotos();

  // Scroll panel into view
  panel.scrollIntoView({behavior:'smooth', block:'start'});
}

function closeRoom(){
  curRoom = null;
  document.getElementById('room-panel').style.display = 'none';
  document.querySelectorAll('.room-chip').forEach(function(c){ c.classList.remove('active'); });
}

function toggleHistory(){
  var panel = document.getElementById('history-panel');
  if(panel.style.display==='none'){
    renderHistory();
    panel.style.display = 'block';
  } else {
    panel.style.display = 'none';
  }
}

function switchCheckTab(cat, btn){
  document.querySelectorAll('.check-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.check-view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.check-tab').forEach(function(t){
    if(t.getAttribute('onclick') && t.getAttribute('onclick').includes("'"+cat+"'")) t.classList.add('active');
  });
  document.getElementById('cv-'+cat).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════
// CHECKLISTS
// ═══════════════════════════════════════════════════════════════════
function renderChecklist(cat, roomInfo){
  var checks = loadChecks()[cat] || [];
  var data = loadData();
  var roomData = (data[curRoom] && data[curRoom][cat]) || {};
  var checked = roomData.checked || {};
  var notes   = roomData.notes   || {};
  var extras  = roomData.extras  || {};

  var container = document.getElementById(cat+'-checks');
  container.innerHTML = '';

  checks.forEach(function(item){
    var isChecked = !!checked[item.id];
    var note = notes[item.id] || '';
    var hasNote = note.trim().length > 0;

    var section = document.createElement('div');
    section.className = 'check-section';

    var hdr = '<div class="check-item-hdr">' +
      '<div class="check-box-wrap">' +
        '<input type="checkbox" class="check-cb" id="cb_'+item.id+'" '+(isChecked?'checked':'')+' onchange="onCheck(\''+cat+'\',\''+item.id+'\',this.checked)"/>' +
      '</div>' +
      '<div class="check-info">' +
        '<div class="check-name">'+item.name+'</div>' +
        '<div class="check-desc">'+item.desc+'</div>' +
      '</div>' +
      (isAdmin ? '<button class="admin-del-btn" onclick="deleteCheck(\''+cat+'\',\''+item.id+'\')" title="Remove">&#x2715;</button>' : '') +
    '</div>';

    var extra = '';

    // Temp field
    if(item.hasTemp){
      var tempVal = extras[item.id+'_temp'] || '';
      var tempCls = '';
      if(tempVal){ var tv=parseFloat(tempVal); tempCls=tv>38?'hot':tv>=16?'ok':''; }
      extra += '<div class="field-row">' +
        '<span class="field-label">Temp (&deg;C)</span>' +
        '<input class="field-in '+tempCls+'" id="temp_'+item.id+'" type="number" step="0.1" placeholder="&mdash;" value="'+tempVal+'" oninput="onTempField(this,\''+cat+'\',\''+item.id+'\')" />' +
        renderTempSparkline(item.tempKey) +
      '</div>';
    }

    // Leak radio
    if(item.hasLeak){
      var leakVal = extras[item.id+'_leak'] || '';
      extra += '<div class="radio-row">' +
        '<span class="field-label" style="margin-right:4px">Leaking</span>' +
        '<label class="radio-opt"><input type="radio" name="leak_'+item.id+'" value="No" '+(leakVal==='No'?'checked':'')+' onchange="onExtra(\''+cat+'\',\''+item.id+'_leak\',this.value)"/> No</label>' +
        '<label class="radio-opt"><input type="radio" name="leak_'+item.id+'" value="Yes" '+(leakVal==='Yes'?'checked':'')+' onchange="onExtra(\''+cat+'\',\''+item.id+'_leak\',this.value)"/> Yes</label>' +
      '</div>';
      if(leakVal==='Yes'){
        var leakDesc = extras[item.id+'_leakdesc'] || '';
        extra += '<textarea class="check-note issue" id="leakdesc_'+item.id+'" placeholder="Describe leak location and how it was fixed..." onchange="onExtra(\''+cat+'\',\''+item.id+'_leakdesc\',this.value)">'+leakDesc+'</textarea>';
      }
    }

    // Paint colours
    if(item.hasPaint){
      var paintVal = extras[item.id+'_paint'] || '';
      extra += '<div class="paint-row">' +
        '<span class="field-label">Paint Colour</span>' +
        '<input type="color" class="color-swatch" id="swatch_'+item.id+'" value="'+(paintVal||'#ffffff')+'" oninput="onExtra(\''+cat+'\',\''+item.id+'_paint\',this.value)"/>' +
        '<input class="paint-in" id="paintname_'+item.id+'" placeholder="Paint name/code..." value="'+(extras[item.id+'_paintname']||'')+'" oninput="onExtra(\''+cat+'\',\''+item.id+'_paintname\',this.value)"/>' +
      '</div>';
    }

    // Note
    extra += '<textarea class="check-note'+(hasNote?' issue':'')+'" id="note_'+item.id+'" placeholder="Notes / issues..." oninput="onNote(\''+cat+'\',\''+item.id+'\',this.value)">'+note+'</textarea>';

    section.innerHTML = hdr + extra;
    container.appendChild(section);
  });
}

function renderTempSparkline(tempKey){
  if(!curRoom || !tempKey) return '';
  var temps = loadTemps();
  var key = curRoom+'_'+tempKey;
  var history = temps[key] || [];
  if(history.length < 2) return '';
  var vals = history.map(function(e){ return e.temp; });
  var max = Math.max.apply(null,vals), min = Math.min.apply(null,vals);
  var bars = history.slice(-8).map(function(e){
    var v=e.temp, h=Math.max(3,Math.round(((v-min)/(max-min||1))*24)+3);
    var cls = v>38?'spark-hot':v>=16?'spark-ok':'spark-cold';
    return '<div class="spark-b '+cls+'" style="width:8px;height:'+h+'px"></div>';
  }).join('');
  return '<div class="temp-trend"><div class="temp-trend-title">Trend</div><div class="spark-row">'+bars+'</div></div>';
}

function onCheck(cat, id, val){
  var data = loadData();
  if(!data[curRoom]) data[curRoom]={};
  if(!data[curRoom][cat]) data[curRoom][cat]={checked:{},notes:{},extras:{}};
  if(!data[curRoom][cat].checked) data[curRoom][cat].checked={};
  data[curRoom][cat].checked[id] = val;
  saveData(data);
}

function onNote(cat, id, val){
  var data = loadData();
  if(!data[curRoom]) data[curRoom]={};
  if(!data[curRoom][cat]) data[curRoom][cat]={checked:{},notes:{},extras:{}};
  if(!data[curRoom][cat].notes) data[curRoom][cat].notes={};
  data[curRoom][cat].notes[id] = val;
  // Update chip
  var chip = document.getElementById('chip-'+curRoom);
  if(chip){
    var hasIssues = roomHasIssues(curRoom, data);
    if(hasIssues){ chip.classList.add('has-issues'); if(!chip.querySelector('.issue-dot')){ var d=document.createElement('span'); d.className='issue-dot'; chip.appendChild(d); } }
    else { chip.classList.remove('has-issues'); var dot=chip.querySelector('.issue-dot'); if(dot) dot.remove(); }
  }
  saveData(data);
}

function onExtra(cat, key, val){
  var data = loadData();
  if(!data[curRoom]) data[curRoom]={};
  if(!data[curRoom][cat]) data[curRoom][cat]={checked:{},notes:{},extras:{}};
  if(!data[curRoom][cat].extras) data[curRoom][cat].extras={};
  data[curRoom][cat].extras[key] = val;
  saveData(data);
  // Re-render to show/hide leak description
  if(key.endsWith('_leak')){
    var rooms = loadRooms();
    var levelRooms = rooms[curLevel]||{};
    var roomInfo = null;
    Object.values(levelRooms).forEach(function(z){ var f=z.find(function(r){return r.num===curRoom;}); if(f) roomInfo=f; });
    renderChecklist(cat, roomInfo);
  }
}

function onTempField(el, cat, id){
  var v = parseFloat(el.value);
  el.classList.remove('ok','hot');
  if(!isNaN(v)){ if(v>38) el.classList.add('hot'); else if(v>=16) el.classList.add('ok'); }
  onExtra(cat, id+'_temp', el.value);
}

function saveRoomData(){
  if(!curRoom) return;
  var data = loadData();
  var today = new Date().toISOString().split('T')[0];

  // Save temps to trend log
  var temps = loadTemps();
  var checks = loadChecks();
  ['plumbing'].forEach(function(cat){
    var items = checks[cat] || [];
    items.forEach(function(item){
      if(item.hasTemp && item.tempKey){
        var val = (data[curRoom]&&data[curRoom][cat]&&data[curRoom][cat].extras) ? data[curRoom][cat].extras[item.id+'_temp'] : '';
        if(val){
          var key = curRoom+'_'+item.tempKey;
          if(!temps[key]) temps[key]=[];
          // Remove existing entry for today
          temps[key] = temps[key].filter(function(e){ return e.date!==today; });
          temps[key].push({date:today, temp:parseFloat(val)});
          temps[key].sort(function(a,b){ return a.date.localeCompare(b.date); });
        }
      }
    });
  });
  saveTemps(temps);

  // Save to history if there are issues
  if(roomHasIssues(curRoom, data)){
    var hist = loadHistory();
    if(!hist[curRoom]) hist[curRoom]=[];
    // Build issue summary
    var issues = [];
    ['electrical','plumbing','building'].forEach(function(cat){
      var catData = (data[curRoom]&&data[curRoom][cat])||{};
      var notes = catData.notes||{};
      Object.entries(notes).forEach(function(kv){
        if(kv[1]&&kv[1].trim()){
          var checkName = '';
          (loadChecks()[cat]||[]).forEach(function(c){ if(c.id===kv[0]) checkName=c.name; });
          issues.push({cat:cat, check:checkName, note:kv[1].trim()});
        }
      });
    });
    // Photos
    var photos = (data[curRoom]&&data[curRoom].photos)||[];
    // Remove existing today entry
    hist[curRoom] = hist[curRoom].filter(function(e){ return e.date!==today; });
    if(issues.length || photos.length){
      hist[curRoom].push({date:today, issues:issues, photos:photos});
      hist[curRoom].sort(function(a,b){ return b.date.localeCompare(a.date); });
    }
    saveHistory(hist);
  }

  showToast('Saved \u2713');
  renderZones();
  updateStatus();
}

// ═══════════════════════════════════════════════════════════════════
// PHOTOS
// ═══════════════════════════════════════════════════════════════════
function addPhotos(event){
  var files = Array.from(event.target.files);
  if(!files.length || !curRoom) return;
  var data = loadData();
  if(!data[curRoom]) data[curRoom]={};
  if(!data[curRoom].photos) data[curRoom].photos=[];
  var pending = files.length;
  files.forEach(function(file){
    var reader = new FileReader();
    reader.onload = function(e){
      data[curRoom].photos.push({src:e.target.result, date:new Date().toISOString().split('T')[0]});
      pending--;
      if(!pending){ saveData(data); renderPhotos(); showToast('Photo added \u2713'); }
    };
    reader.readAsDataURL(file);
  });
  event.target.value='';
}

function renderPhotos(){
  if(!curRoom) return;
  var data = loadData();
  var photos = (data[curRoom]&&data[curRoom].photos)||[];
  var grid = document.getElementById('photos-grid');
  grid.innerHTML = '';
  photos.forEach(function(p, i){
    var img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = p.src;
    img.title = p.date || '';
    img.onclick = function(){ openLightbox(p.src); };
    if(isAdmin){
      var wrap = document.createElement('div');
      wrap.style.position='relative'; wrap.style.display='inline-block';
      var del = document.createElement('button');
      del.style.cssText='position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);border:none;color:#f87171;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0';
      del.innerHTML='&#x2715;';
      del.onclick=function(e){ e.stopPropagation(); deletePhoto(i); };
      wrap.appendChild(img); wrap.appendChild(del);
      grid.appendChild(wrap);
    } else {
      grid.appendChild(img);
    }
  });
  var addBtn = document.createElement('button');
  addBtn.className='photo-add-btn';
  addBtn.innerHTML='+';
  addBtn.onclick=function(){ document.getElementById('photo-file').click(); };
  grid.appendChild(addBtn);
  grid.appendChild(document.getElementById('photo-file'));
}

function deletePhoto(idx){
  var data=loadData();
  if(data[curRoom]&&data[curRoom].photos){ data[curRoom].photos.splice(idx,1); saveData(data); renderPhotos(); }
}

function openLightbox(src){ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('active'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('active'); }

// ═══════════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════════
function renderHistory(){
  if(!curRoom) return;
  var hist = loadHistory();
  var entries = hist[curRoom] || [];
  var container = document.getElementById('history-content');
  if(!entries.length){ container.innerHTML='<div style="color:rgba(245,158,11,.3);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 0">No past issues recorded</div>'; return; }
  container.innerHTML = entries.map(function(e){
    var issueHtml = e.issues.map(function(i){
      return '<div class="history-issue"><span style="color:rgba(245,158,11,.5);text-transform:uppercase;font-size:9px;letter-spacing:1px">['+i.cat+'] '+i.check+'</span><br>'+i.note+'</div>';
    }).join('');
    var photoHtml = (e.photos||[]).map(function(p){ return '<img class="history-photo" src="'+p.src+'" onclick="openLightbox(\''+p.src+'\')" />'; }).join('');
    return '<div class="history-entry"><div class="history-date">'+fmtDate(e.date)+'</div>'+issueHtml+(photoHtml?'<div class="history-photos">'+photoHtml+'</div>':'')+'</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// ADD / DELETE CHECKS (Admin)
// ═══════════════════════════════════════════════════════════════════
function addCheck(cat){
  if(!isAdmin) return;
  addCheckCategory = cat;
  document.getElementById('new-check-name').value='';
  document.getElementById('new-check-desc').value='';
  document.getElementById('add-check-modal').classList.add('active');
  setTimeout(function(){ document.getElementById('new-check-name').focus(); },50);
}

function saveNewCheck(){
  var name = document.getElementById('new-check-name').value.trim();
  var desc = document.getElementById('new-check-desc').value.trim();
  if(!name){ showToast('Enter a name'); return; }
  var checks = loadChecks();
  var id = addCheckCategory[0]+Date.now();
  checks[addCheckCategory].push({id:id, name:name, desc:desc});
  saveChecks(checks);
  closeModal('add-check-modal');
  var rooms=loadRooms(), levelRooms=rooms[curLevel]||{};
  var roomInfo=null;
  Object.values(levelRooms).forEach(function(z){ var f=z.find(function(r){return r.num===curRoom;}); if(f) roomInfo=f; });
  renderChecklist(addCheckCategory, roomInfo);
  showToast('Check item added \u2713');
}

function deleteCheck(cat, id){
  if(!isAdmin) return;
  if(!confirm('Remove this check item?')) return;
  var checks=loadChecks();
  checks[cat]=checks[cat].filter(function(c){ return c.id!==id; });
  saveChecks(checks);
  var rooms=loadRooms(), levelRooms=rooms[curLevel]||{};
  var roomInfo=null;
  Object.values(levelRooms).forEach(function(z){ var f=z.find(function(r){return r.num===curRoom;}); if(f) roomInfo=f; });
  renderChecklist(cat, roomInfo);
}

// ═══════════════════════════════════════════════════════════════════
// ADD / DELETE ROOMS (Admin)
// ═══════════════════════════════════════════════════════════════════
function openAddRoom(level, zone){
  if(!isAdmin) return;
  pendingAddLevel=level; pendingAddZone=zone;
  document.getElementById('new-room-num').value='';
  document.getElementById('new-room-label').value='';
  document.getElementById('add-room-modal').classList.add('active');
  setTimeout(function(){ document.getElementById('new-room-num').focus(); },50);
}

function saveNewRoom(){
  var num=document.getElementById('new-room-num').value.trim();
  var label=document.getElementById('new-room-label').value.trim();
  var toilet=parseInt(document.getElementById('new-room-toilet').value);
  var shower=parseInt(document.getElementById('new-room-shower').value);
  var sink=parseInt(document.getElementById('new-room-sink').value);
  if(!num){ showToast('Enter a room number'); return; }
  var rooms=loadRooms();
  if(!rooms[pendingAddLevel]) rooms[pendingAddLevel]={};
  if(!rooms[pendingAddLevel][pendingAddZone]) rooms[pendingAddLevel][pendingAddZone]=[];
  rooms[pendingAddLevel][pendingAddZone].push({num:num,label:label,toilet:toilet,shower:shower,sink:sink});
  saveRooms(rooms);
  closeModal('add-room-modal');
  renderZones();
  showToast('Room added \u2713');
}

function addZone(){
  if(!isAdmin) return;
  var name=prompt('Zone name:');
  if(!name||!name.trim()) return;
  var rooms=loadRooms();
  if(!rooms[curLevel]) rooms[curLevel]={};
  rooms[curLevel][name.trim()]=[]; saveRooms(rooms); renderZones();
}

// ═══════════════════════════════════════════════════════════════════
// PRINT SUMMARY
// ═══════════════════════════════════════════════════════════════════
function printSummary(){
  var data=loadData(), rooms=loadRooms(), levelRooms=rooms[curLevel]||{};
  var allRooms=[];
  Object.values(levelRooms).forEach(function(z){ allRooms=allRooms.concat(z); });
  var html='<h2 style="font-size:18px;font-weight:bold;margin-bottom:16px">MHAC Room Inspection Summary — Level '+curLevel+' — '+new Date().toLocaleDateString()+'</h2>';
  var hasAny=false;
  allRooms.forEach(function(r){
    if(!roomHasIssues(r.num,data)) return;
    hasAny=true;
    html+='<div class="print-room"><div class="print-room-title">'+r.num+(r.label?' — '+r.label:'')+'</div>';
    ['electrical','plumbing','building'].forEach(function(cat){
      var catData=(data[r.num]&&data[r.num][cat])||{};
      var notes=catData.notes||{};
      Object.entries(notes).forEach(function(kv){
        if(!kv[1]||!kv[1].trim()) return;
        var checkName='';
        (loadChecks()[cat]||[]).forEach(function(c){ if(c.id===kv[0]) checkName=c.name; });
        html+='<div class="print-issue"><strong>['+cat.charAt(0).toUpperCase()+cat.slice(1)+'] '+checkName+':</strong> '+kv[1]+'</div>';
      });
    });
    var photos=(data[r.num]&&data[r.num].photos)||[];
    if(photos.length){ html+='<div>'; photos.forEach(function(p){ html+='<img class="print-photo" src="'+p.src+'" />'; }); html+='</div>'; }
    html+='</div>';
  });
  if(!hasAny) html+='<p>No issues recorded on Level '+curLevel+'.</p>';
  document.getElementById('print-summary').innerHTML=html;
  window.print();
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

function fmtDate(d){
  if(!d) return '—';
  var p=d.split('-');
  return parseInt(p[2])+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[1])-1]+' '+p[0];
}

function updateStatus(){
  var data=loadData(), rooms=loadRooms(), levelRooms=rooms[curLevel]||{};
  var total=0, issues=0;
  Object.values(levelRooms).forEach(function(z){ z.forEach(function(r){ total++; if(roomHasIssues(r.num,data)) issues++; }); });
  document.getElementById('status-lbl').textContent='· Level '+curLevel+' · '+total+' rooms'+(issues?' · '+issues+' with issues':'');
}

function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}

document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });
</script>
