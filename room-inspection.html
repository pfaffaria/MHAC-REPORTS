<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>MHAC — Room Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(typeof pdfjsLib!=='undefined')pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--amber-light:#fcd34d;--amber-pale:#fef3c7;--bg:#0f0a03;--green:#22c55e;--red:#ef4444}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fef3c7}
.water-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% 100%,#2a1500 0%,transparent 70%),radial-gradient(ellipse 70% 70% at 15% 15%,#1f1000 0%,transparent 60%),linear-gradient(160deg,#0a0600 0%,#140c02 40%,#0c0700 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 4px)}
/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:rgba(15,10,3,.97);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:36px 32px;width:340px;max-width:92vw;box-shadow:0 0 60px rgba(0,0,0,.8)}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:8px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.login-sub{font-size:9px;letter-spacing:3px;color:rgba(245,158,11,.35);text-transform:uppercase;text-align:center;margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.login-field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.login-field input{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:6px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;padding:9px 12px;outline:none}
.login-field input:focus{border-color:rgba(245,158,11,.55)}
.login-btn{width:100%;padding:11px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:6px;color:var(--amber-light);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all .2s}
.login-btn:hover{background:rgba(245,158,11,.22);border-color:var(--amber);color:#fff}
.login-err{font-size:10px;letter-spacing:1px;color:#f87171;text-align:center;margin-top:8px;text-transform:uppercase;min-height:16px}
/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:7px 20px 6px;border-bottom:1px solid rgba(245,158,11,.2);background:linear-gradient(180deg,rgba(12,7,0,.97),rgba(12,7,0,.72));backdrop-filter:blur(14px)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-badge{font-size:9px;letter-spacing:3px;color:var(--amber-light);opacity:.5;text-transform:uppercase}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,2.5vw,30px);letter-spacing:5px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tpulse 5s ease-in-out infinite}
@keyframes tpulse{0%,100%{filter:drop-shadow(0 0 10px rgba(255,183,0,.35))}50%{filter:drop-shadow(0 0 24px rgba(255,183,0,.75))}}
.tb-line{width:2px;height:26px;background:linear-gradient(180deg,transparent,var(--amber),transparent);animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:.3}50%{opacity:1}}
.tb-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 11px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:rgba(245,158,11,.05);color:var(--amber-pale);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.tb-btn:hover,.tb-btn.on{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fff}
.tb-btn.danger{border-color:rgba(239,68,68,.3);color:rgba(239,68,68,.6)}
.tb-btn.danger:hover{background:rgba(239,68,68,.1);border-color:#ef4444;color:#f87171}
.admin-badge{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.5);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:3px;padding:2px 7px;text-transform:uppercase}
/* PAGE */
.page{position:relative;z-index:2;min-height:100vh;padding:68px 14px 48px;max-width:1000px;margin:0 auto}
/* LEVEL TABS */
.lvl-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding-top:8px}
.lvl-btn{padding:5px 14px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.4);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.lvl-btn.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
/* VIEW TOGGLE */
.view-toggle{display:flex;gap:6px;margin-bottom:12px}
.view-toggle{display:flex;gap:6px;margin-bottom:12px}
.vt-btn{padding:6px 18px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.45);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.vt-btn.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
/* ROOM GRID */
.zone-section{margin-bottom:20px}
.zone-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(245,158,11,.1)}
.zone-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--amber)}
.room-grid{display:flex;flex-wrap:wrap;gap:6px}
.admin-only{display:none}
.room-chip{padding:6px 12px;border:1px solid rgba(245,158,11,.18);border-radius:6px;background:rgba(245,158,11,.04);cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:rgba(245,158,11,.6);position:relative;-webkit-tap-highlight-color:transparent}
.room-chip:hover{border-color:rgba(245,158,11,.4);color:var(--amber-light);background:rgba(245,158,11,.08)}
.room-chip.active{border-color:var(--amber);color:#fff;background:rgba(245,158,11,.18);box-shadow:0 0 12px rgba(245,158,11,.2)}
.room-chip.has-issues{border-color:rgba(239,68,68,.4);color:#fca5a5}
.room-chip.inspected{border-color:rgba(34,197,94,.3);color:rgba(34,197,94,.7)}
.room-chip.started{border-color:rgba(245,158,11,.5);color:rgba(245,158,11,.8)}
.room-chip .issue-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#ef4444;box-shadow:0 0 4px #ef4444}
.room-chip .done-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 4px #22c55e}
.room-chip .started-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#f59e0b;box-shadow:0 0 4px #f59e0b}
.room-chip .sub-label{display:block;font-size:8px;letter-spacing:1px;color:rgba(245,158,11,.35);font-weight:600;margin-top:1px}
.add-room-btn{padding:6px 12px;border:1px dashed rgba(245,158,11,.2);border-radius:6px;background:transparent;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(245,158,11,.3)}
/* CYCLE BANNER */
.cycle-banner{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:6px;padding:7px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cycle-label{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase}
.cycle-prog{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light)}
.reset-warn{font-size:9px;letter-spacing:1px;color:#f87171;text-transform:uppercase;animation:sblink 1.5s ease-in-out infinite}
/* MAP VIEW */
#map-view{display:block;padding-top:4px}
.map-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.map-wrap{position:relative;display:inline-block;max-width:100%;overflow:hidden;border-radius:8px;border:1px solid rgba(245,158,11,.2);background:rgba(0,0,0,.3);cursor:crosshair}
.map-wrap.no-pin-mode{cursor:default}
.map-img{display:block;max-width:100%;max-height:70vh;width:auto;height:auto;user-select:none;pointer-events:none}
.map-placeholder{width:100%;min-height:300px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:rgba(245,158,11,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.map-placeholder svg{width:40px;height:40px}
/* PIN */
.map-pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:transform .15s;pointer-events:all}
.map-pin:hover{transform:translate(-50%,-50%) scale(1.15)}
.yah-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:20;pointer-events:all;filter:drop-shadow(0 2px 6px rgba(59,130,246,.7))}
.yah-pin svg{width:32px;height:32px}
.yah-pulse{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(59,130,246,.25);transform:translate(-50%,-50%);top:88%;left:50%;animation:yahpulse 1.8s ease-in-out infinite}
@keyframes yahpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.8);opacity:0}}
.yah-btn.active{background:rgba(59,130,246,.2);border-color:#3b82f6;color:#93c5fd}
.pin-circle{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;color:#fff;letter-spacing:.5px;text-align:center;line-height:1.1;padding:2px;box-shadow:0 2px 8px rgba(0,0,0,.5);position:relative;overflow:hidden;transition:all .2s}
.pin-circle.pin-grey{background:rgba(255,255,255,.92);border-color:rgba(255,255,255,.9);color:#1a1200}
.pin-circle.pin-selected{background:#f59e0b;border-color:#fff;color:#000;font-weight:900;box-shadow:0 0 0 3px rgba(245,158,11,.35),0 0 18px rgba(245,158,11,.7);animation:pinGlow 1.2s ease-in-out infinite;width:32px;height:32px;font-size:9px}
@keyframes pinGlow{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,.3),0 0 14px rgba(245,158,11,.6)}50%{box-shadow:0 0 0 7px rgba(245,158,11,.15),0 0 26px rgba(245,158,11,.9)}}
.pin-pulse{position:absolute;width:54px;height:54px;border-radius:50%;background:rgba(245,158,11,.35);transform:translate(-50%,-50%);top:50%;left:50%;animation:pinPulseRing 1.2s ease-out infinite;pointer-events:none}
@keyframes pinPulseRing{0%{transform:translate(-50%,-50%) scale(.5);opacity:.8}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}
.pin-circle.pending{background:rgba(100,80,0,.85);border-color:rgba(245,158,11,.6)}
.pin-circle.done{background:rgba(10,60,20,.9);border-color:rgba(34,197,94,.7)}
.pin-circle.issues{background:rgba(80,10,10,.9);border-color:rgba(239,68,68,.6)}
.pin-check{position:absolute;top:1px;right:1px;width:10px;height:10px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pin-check svg{width:7px;height:7px}
.pin-del{position:absolute;top:-6px;right:-6px;width:14px;height:14px;background:#ef4444;border-radius:50%;border:none;color:#fff;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;z-index:20}
.map-wrap.admin-mode .pin-del{display:flex}
.pin-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(10,5,0,.95);border:1px solid rgba(245,158,11,.3);border-radius:5px;padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:#fff;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:30}
.map-pin:hover .pin-tooltip{opacity:1}
.pin-mode-btn.active{background:rgba(245,158,11,.2);border-color:var(--amber);color:#fff}
/* ROOM PANEL */
#room-panel{display:none;margin-top:16px}
.room-panel-header{position:sticky;top:62px;z-index:100;background:linear-gradient(180deg,rgba(10,6,0,.98),rgba(10,6,0,.92));border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px 16px;margin-bottom:12px;backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.room-panel-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.room-panel-sub{font-size:10px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase}
.room-panel-actions{display:flex;gap:6px;flex-wrap:wrap}
.check-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.check-tab{padding:6px 16px;border:1px solid rgba(245,158,11,.2);border-radius:4px;background:transparent;color:rgba(245,158,11,.45);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.check-tab.active{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber-light)}
.check-view{display:none}.check-view.active{display:block}
.check-section{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:10px}
.check-item-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.check-box-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px}
.check-cb{width:20px;height:20px;border-radius:4px;border:2px solid rgba(245,158,11,.3);cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .2s;background:transparent}
.check-cb:checked{background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.5 3.5l-7.5 7.5-3.5-3.5'/%3E%3C/svg%3E");background-size:12px;background-repeat:no-repeat;background-position:center}
.check-info{flex:1}
.check-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--amber-light);letter-spacing:.5px}
.check-desc{font-size:10px;color:rgba(245,158,11,.4);line-height:1.5;margin-top:2px}
.check-note{width:100%;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:7px 10px;outline:none;resize:vertical;min-height:52px;transition:border-color .2s;margin-top:6px}
.check-note:focus{border-color:rgba(245,158,11,.4)}
.check-note::placeholder{color:rgba(245,158,11,.2)}
.check-note.issue{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.04)}
.admin-del-btn{background:none;border:none;color:rgba(245,158,11,.2);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:all .2s;line-height:1;flex-shrink:0}
.admin-del-btn:hover{color:#f87171;background:rgba(239,68,68,.1)}
.add-check-btn{width:100%;padding:8px;border:1px dashed rgba(245,158,11,.18);border-radius:6px;background:transparent;color:rgba(245,158,11,.3);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:4px}
.field-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.field-label{font-size:9px;letter-spacing:1.5px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700;white-space:nowrap}
.field-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;padding:5px 9px;outline:none;width:90px;text-align:center;transition:border-color .2s}
.field-in.ok{border-color:rgba(34,197,94,.4);color:#4ade80}
.field-in.hot{border-color:rgba(239,68,68,.4);color:#f87171}
.radio-row{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.radio-opt{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;font-weight:600;color:rgba(245,158,11,.6)}
.radio-opt input[type=radio]{accent-color:var(--amber);width:14px;height:14px}
.paint-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}
.paint-in{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:4px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;padding:4px 8px;outline:none;flex:1;min-width:120px}
.paint-in::placeholder{color:rgba(245,158,11,.2)}
.photos-section{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:10px}
.photos-title{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase;font-weight:700;margin-bottom:10px}
.photos-grid{display:flex;flex-wrap:wrap;gap:8px}
.photo-thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid rgba(245,158,11,.2);cursor:pointer;transition:all .2s}
.photo-thumb:hover{border-color:var(--amber);transform:scale(1.04)}
.photo-add-btn{width:80px;height:80px;border:1px dashed rgba(245,158,11,.2);border-radius:6px;background:transparent;color:rgba(245,158,11,.3);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.history-section{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:8px;padding:14px;margin-bottom:10px}
.history-title{font-size:10px;letter-spacing:2px;color:rgba(245,158,11,.5);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.history-year-hdr{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--amber);margin:8px 0 4px;padding-bottom:4px;border-bottom:1px solid rgba(245,158,11,.12)}
.history-entry{border-bottom:1px solid rgba(245,158,11,.08);padding:8px 0}
.history-entry:last-child{border-bottom:none}
.history-date{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--amber-light)}
.history-issue{font-size:11px;color:rgba(245,158,11,.55);margin-top:2px;line-height:1.5}
.history-photos{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.history-photo{width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid rgba(245,158,11,.2);cursor:pointer}
.temp-trend{margin-top:6px;background:rgba(0,0,0,.2);border-radius:4px;padding:6px 10px}
.temp-trend-title{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase;margin-bottom:4px}
.spark-row{display:flex;align-items:flex-end;gap:2px;height:28px}
.spark-b{width:10px;border-radius:1px 1px 0 0;min-height:2px}
.spark-ok{background:rgba(34,197,94,.5)}.spark-hot{background:rgba(239,68,68,.5)}.spark-cold{background:rgba(59,130,246,.5)}
/* ARCHIVE NOTICE */
.archive-notice{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.25);border-radius:6px;padding:8px 14px;margin-bottom:10px;font-size:10px;letter-spacing:1.5px;color:rgba(34,197,94,.7);text-transform:uppercase}
/* STATUSBAR */
.statusbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:14px;padding:3px 20px;background:rgba(8,4,0,.9);border-top:1px solid rgba(245,158,11,.06);font-size:9px;letter-spacing:2px;color:rgba(245,158,11,.3);text-transform:uppercase}
.sdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;box-shadow:0 0 5px #f59e0b;animation:sblink 2.5s ease-in-out infinite}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.2}}
.wfall{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:12px}
.wb{width:3px;background:var(--amber);border-radius:1px;opacity:.4;animation:wa var(--d,1s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px;opacity:.15}to{height:10px;opacity:.6}}
/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.modal-bg.active{display:flex}
.modal{background:#100b02;border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:22px;width:360px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;background:linear-gradient(130deg,#fff8dc,#ffb700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.modal-field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.modal-field label{font-size:8px;letter-spacing:2px;color:rgba(245,158,11,.4);text-transform:uppercase;font-weight:700}
.modal-field input,.modal-field select,.modal-field textarea{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-radius:5px;color:#fef3c7;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:7px 10px;outline:none;width:100%}
.modal-field input::placeholder,.modal-field textarea::placeholder{color:rgba(245,158,11,.25)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btn{padding:8px 18px;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.modal-btn.primary{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);color:var(--amber-light)}
.modal-btn.primary:hover{background:rgba(245,158,11,.22);border-color:var(--amber)}
.modal-btn.secondary{background:transparent;border:1px solid rgba(245,158,11,.15);color:rgba(245,158,11,.4)}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:none;align-items:center;justify-content:center}
#lightbox.active{display:flex}
#lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;border:1px solid rgba(245,158,11,.2)}
#lightbox-close{position:absolute;top:16px;right:16px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amber-light);border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* PRINT */
@media print{
  .topbar,.statusbar,#room-panel,.view-toggle,.map-controls,#map-view,.cycle-banner,.print-hide{display:none!important}
  .print-summary{display:block!important}
  body{background:white;color:#000}
  .print-year{font-size:20px;font-weight:bold;border-bottom:2px solid #888;margin-bottom:12px;padding-bottom:6px}
  .print-room{border:1px solid #ccc;border-radius:4px;padding:12px;margin-bottom:10px;break-inside:avoid}
  .print-room-title{font-size:15px;font-weight:bold;margin-bottom:6px}
  .print-issue{margin-left:12px;font-size:12px;margin-bottom:3px}
  .print-photo{width:70px;height:70px;object-fit:cover;border-radius:4px;margin:3px}
}
.print-summary{display:none}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,5,0,.97);border:1px solid var(--amber);border-radius:6px;padding:10px 22px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber-light);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>

// ═══ ANNUAL RESET LOGIC ═══════════════════════════════════════════════
function yyyymm(date){return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0');}
function cycleLabel(startYM){
  var s=new Date(startYM+'-01');var e=new Date(s);e.setMonth(e.getMonth()+11);
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[s.getMonth()]+' '+s.getFullYear()+' – '+months[e.getMonth()]+' '+e.getFullYear();
}
function addMonths(ym,n){var d=new Date(ym+'-01');d.setMonth(d.getMonth()+n);return d;}

function checkAndResetRooms(){
  var dates=loadDates(),data=loadData(),archive=loadArchive();
  var now=new Date(),nowYM=yyyymm(now);
  var toReset=[],didArchive=false;

  Object.keys(dates).forEach(function(roomNum){
    var startYM=dates[roomNum];
    var resetDate=addMonths(startYM,11);
    if(now>=resetDate){toReset.push({roomNum:roomNum,startYM:startYM});}
  });

  if(toReset.length===0) return;

  toReset.forEach(function(item){
    var roomNum=item.roomNum,startYM=item.startYM;
    var label=cycleLabel(startYM);
    // Find or create archive entry for this cycle
    var entry=archive.find(function(a){return a.cycleLabel===label;});
    if(!entry){entry={cycleLabel:label,archivedAt:new Date().toISOString(),rooms:{}};archive.push(entry);}
    if(data[roomNum]){entry.rooms[roomNum]=JSON.parse(JSON.stringify(data[roomNum]));delete data[roomNum];}
    // Reset clock to this month
    dates[roomNum]=nowYM;
    didArchive=true;
  });

  if(didArchive){
    saveData(data);saveDates(dates);saveArchive(archive);
    showToast(toReset.length+' room(s) reset for new cycle');
  }
}

function recordFirstInspection(roomNum){
  var dates=loadDates();
  if(!dates[roomNum]){dates[roomNum]=yyyymm(new Date());saveDates(dates);}
}

function getRoomCycleStart(roomNum){
  var dates=loadDates();return dates[roomNum]||null;
}

function updateCycleBanner(){
  var dates=loadDates(),data=loadData();
  var rooms=loadRooms(),levelRooms=rooms[curLevel]||{};
  var allRooms=[];Object.values(levelRooms).forEach(function(z){allRooms=allRooms.concat(z);});
  // Find earliest start date for rooms on this level
  var earliest=null;
  allRooms.forEach(function(r){var d=dates[r.num];if(d&&(!earliest||d<earliest))earliest=d;});
  if(!earliest){document.getElementById('cycle-range').textContent='Not started yet';document.getElementById('cycle-prog').textContent='';document.getElementById('reset-warn').style.display='none';return;}
  document.getElementById('cycle-range').textContent=cycleLabel(earliest);
  // Count inspected vs total
  var total=allRooms.length,done=allRooms.filter(function(r){return roomIsInspected(r.num,data);}).length;
  document.getElementById('cycle-prog').textContent=done+' / '+total+' inspected';
  // Warn only if rooms on THIS level have been inspected AND are approaching reset
  var now=new Date(),warn=false;
  allRooms.forEach(function(r){
    var d=dates[r.num];
    if(!d)return; // never inspected — no warning
    var warn10=addMonths(d,10);
    if(now>=warn10)warn=true;
  });
  document.getElementById('reset-warn').style.display=warn?'inline':'none';
}

function roomIsInspected(roomNum,data){
  // Any activity at all
  var d=data[roomNum];if(!d)return false;
  var cats=['electrical','plumbing','building'];
  for(var i=0;i<cats.length;i++){
    var cat=d[cats[i]]||{};
    var checked=cat.checked||{};
    if(Object.values(checked).some(function(v){return v;}))return true;
    var notes=cat.notes||{};
    if(Object.values(notes).some(function(n){return n&&n.trim();}))return true;
  }
  if(d.photos&&d.photos.length)return true;
  return false;
}

function roomIsComplete(roomNum,data,checks){
  // All check items in all categories must be checked
  var d=data[roomNum];if(!d)return false;
  var cats=['electrical','plumbing','building'];
  for(var i=0;i<cats.length;i++){
    var cat=d[cats[i]]||{};
    var checked=cat.checked||{};
    var catChecks=checks[cats[i]]||[];
    if(!catChecks.length)continue;
    // Every check item must be checked
    for(var j=0;j<catChecks.length;j++){
      if(!checked[catChecks[j].id])return false;
    }
  }
  return roomIsInspected(roomNum,data);
}

function roomHasIssues(roomNum,data){
  var d=data[roomNum];if(!d)return false;
  var cats=['electrical','plumbing','building'];
  for(var i=0;i<cats.length;i++){var cat=d[cats[i]]||{};var notes=cat.notes||{};if(Object.values(notes).some(function(n){return n&&n.trim();}))return true;}
  return false;
}

function renderPin(wrap,pin,data,highlightRoom){
  var isHighlight=(pin.roomNum===highlightRoom);
  var div=document.createElement('div');div.className='map-pin';
  div.style.left=(pin.x*100)+'%';div.style.top=(pin.y*100)+'%';
  var shortNum=pin.roomNum.replace(/^\d[A-Z]-/,'');
  // Check if all checks complete (for checkmark)
  var checks=loadChecks();
  var allDone=roomIsComplete(pin.roomNum,data,checks);

  if(isHighlight){
    div.innerHTML=
      '<div class="pin-pulse"></div>'+
      '<div class="pin-circle pin-selected">'+shortNum+'</div>'+
      '<div class="pin-tooltip">'+pin.roomNum+'</div>'+
      (isAdmin?'<button class="pin-del" title="Remove pin">&#x2715;</button>':'');
  } else {
    var checkmark=allDone?'<div class="pin-check"><svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="2,5 4,7 8,3"/></svg></div>':'';
    div.innerHTML=
      '<div class="pin-circle pin-grey">'+shortNum+checkmark+'</div>'+
      '<div class="pin-tooltip">'+pin.roomNum+'</div>'+
      (isAdmin?'<button class="pin-del" title="Remove pin">&#x2715;</button>':'');
  }
  // Tap pin → open room (handles both click and touch)
  function handlePinTap(e){
    if(pinMode||dragMoved)return;
    e.stopPropagation();
    e.preventDefault();
    openRoom(pin.roomNum,null);
    setTimeout(function(){
      var panel=document.getElementById('room-panel');
      if(panel)panel.scrollIntoView({behavior:'smooth',block:'start'});
    },300);
  }
  div.querySelector('.pin-circle').addEventListener('click',handlePinTap);
  div.querySelector('.pin-circle').addEventListener('touchend',function(e){
    if(!dragMoved)handlePinTap(e);
  });
  if(isAdmin){
    var del=div.querySelector('.pin-del');
    if(del)del.addEventListener('click',function(e){e.stopPropagation();removePin(pin.roomNum);});
  }
  // Drag to reposition (admin only)
  var dragStartX,dragStartY,dragging=false,dragMoved=false;
  div.addEventListener('touchstart',function(e){
    dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
    dragging=true;dragMoved=false;
  },{passive:true});
  div.addEventListener('touchmove',function(e){
    if(!dragging||!isAdmin)return;
    var dx=e.touches[0].clientX-dragStartX,dy=e.touches[0].clientY-dragStartY;
    if(Math.sqrt(dx*dx+dy*dy)>8){dragMoved=true;e.preventDefault();
      var wrap=document.getElementById('map-wrap');if(!wrap)return;
      var rect=wrap.getBoundingClientRect();
      var nx=Math.max(0.01,Math.min(0.99,(e.touches[0].clientX-rect.left)/rect.width));
      var ny=Math.max(0.01,Math.min(0.99,(e.touches[0].clientY-rect.top)/rect.height));
      div.style.left=(nx*100)+'%';div.style.top=(ny*100)+'%';
      dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
    }
  },{passive:false});
  div.addEventListener('touchend',function(e){
    if(dragMoved&&isAdmin){
      // Save new position
      var pins2=loadPins();if(!pins2[zoneKey()])pins2[zoneKey()]=[];
      var p=pins2[zoneKey()].find(function(p){return p.roomNum===pin.roomNum;});
      if(p){
        var wrap=document.getElementById('map-wrap');if(!wrap)return;
        var rect=wrap.getBoundingClientRect();
        p.x=parseFloat(div.style.left)/100;
        p.y=parseFloat(div.style.top)/100;
        savePins(pins2);showToast('Pin moved ✓');
      }
    }
    dragging=false;
  },{passive:true});
  wrap.appendChild(div);
}

function handleMapUpload(event){
  var file=event.target.files[0];if(!file)return;
  showToast('Processing map...');
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onerror=function(){showToast('Could not read image');};
    img.onload=function(){
      var maxW=1400,sc=Math.min(1,maxW/img.width);
      var canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*sc);
      canvas.height=Math.round(img.height*sc);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      var b64=canvas.toDataURL('image/jpeg',0.82);
      if(!b64||b64.length<100){showToast('Image processing failed');return;}
      var testImg=new Image();
      testImg.onerror=function(){showToast('Compression failed — try a different image');};
      testImg.onload=function(){
        saveMap(curLevel,b64);
        renderMap();
        showToast('Map uploaded ✓ ('+canvas.width+'x'+canvas.height+'px)');
      };
      testImg.src=b64;
    };
    img.src=e.target.result;
  };
  reader.onerror=function(){showToast('Could not read file');};
  reader.readAsDataURL(file);
  event.target.value='';
}

function openRoom(roomNum,zone){
  document.querySelectorAll('.room-chip').forEach(function(c){c.classList.remove('active');});
  var chip=document.getElementById('chip-'+roomNum);if(chip)chip.classList.add('active');

  Object.keys(levelRooms).forEach(function(z){var found=levelRooms[z].find(function(r){return r.num===roomNum;});if(found){roomInfo=found;zoneName=z;}});
  document.getElementById('panel-room-title').textContent=roomNum;
  document.getElementById('panel-room-sub').textContent=(roomInfo&&roomInfo.label?roomInfo.label+' · ':'')+zoneName+(zoneName?' · ':'')+'Level '+curLevel;
  document.getElementById('history-room-label').textContent=roomNum;

function renderTempSparkline(tempKey){
  if(!curRoom||!tempKey)return'';
  var temps=loadTemps(),key=curRoom+'_'+tempKey,history=temps[key]||[];

  return'<div class="temp-trend"><div class="temp-trend-title">Trend</div><div class="spark-row">'+bars+'</div></div>';

// ═══ PHOTOS (Supabase Storage) ═══════════════════════════════════════
var BUCKET='room-photos';
var SB_STORAGE=SB_URL+'/storage/v1/object';
var SB_STORAGE_PUB=SB_URL+'/storage/v1/object/public';

function uploadPhotoToStorage(file, roomNum, callback){
  var ext=file.name.split('.').pop()||'jpg';
  var filename=roomNum.replace(/[^a-zA-Z0-9]/g,'-')+'-'+Date.now()+'.'+ext;
  var path=BUCKET+'/'+filename;
  fetch(SB_STORAGE+'/'+path,{
    method:'POST',
    headers:{'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB,'Content-Type':file.type,'x-upsert':'true'},
    body:file
  }).then(function(r){
    if(r.ok){callback(null,SB_STORAGE_PUB+'/'+path+'?t='+Date.now());}
    else{r.text().then(function(t){callback('Upload failed: '+t,null);});}
  }).catch(function(e){callback(e.message,null);});
}

function deletePhotoFromStorage(url){
  // Extract path from URL
  var match=url.match(/\/object\/public\/(.+?)(\?|$)/);
  if(!match)return;
  var path=match[1];
  fetch(SB_STORAGE+'/'+path,{
    method:'DELETE',
    headers:{'apikey':SB_PUB,'Authorization':'Bearer '+SB_PUB}
  }).catch(function(){});
}

function addPhotos(event){
  var files=Array.from(event.target.files);
  if(!files.length||!curRoom)return;
  showToast('Uploading...');
  var pending=files.length;
  files.forEach(function(file){
    uploadPhotoToStorage(file,curRoom,function(err,url){
      pending--;
      if(!err){
        var data=loadData();
        if(!data[curRoom])data[curRoom]={};
        if(!data[curRoom].photos)data[curRoom].photos=[];
        data[curRoom].photos.push({url:url,date:new Date().toISOString().split('T')[0]});
        saveData(data);
      } else {
        showToast('Upload error');
      }
      if(!pending){renderPhotos();showToast('Photo added \u2713');}
    });
  });
  event.target.value='';
}

  var grid=document.getElementById('photos-grid');grid.innerHTML='';

function saveBulkRooms(){
  var zone=document.getElementById('bulk-zone').value.trim();
  var level=document.getElementById('bulk-level-sel').value;
  var start=parseInt(document.getElementById('bulk-start').value);
  var end=parseInt(document.getElementById('bulk-end').value);
  var label=document.getElementById('bulk-label').value.trim();
  var toilet=document.getElementById('bulk-toilet').checked?1:0;
  var shower=document.getElementById('bulk-shower').checked?1:0;
  var sink=document.getElementById('bulk-sink').checked?1:0;

  if(!zone){showToast('Enter a zone name');return;}
  if(isNaN(start)||isNaN(end)||start>end){showToast('Enter a valid number range');return;}
  if(end-start>200){showToast('Max 200 rooms at once');return;}

  var prefix=level==='PH'?'PH-':level+'A-';
  var rooms=loadRooms();
  if(!rooms[level])rooms[level]={};
  if(!rooms[level][zone])rooms[level][zone]=[];

  var existing=rooms[level][zone].map(function(r){return r.num;});
  var added=0;
  for(var n=start;n<=end;n++){
    var num=prefix+n;
    if(existing.includes(num))continue;
    rooms[level][zone].push({num:num,label:label,toilet:toilet,shower:shower,sink:sink});
    added++;
  }

  saveRooms(rooms);
  closeModal('bulk-add-modal');
  // Switch to the level we just added to
  curLevel=level;
  document.querySelectorAll('.lvl-btn').forEach(function(b){
    b.classList.toggle('active',b.textContent===(level==='PH'?'Penthouse':'Level '+level));
  });

  // If number changed, update data keys too
  if(newNum!==editingRoom){
    var data=loadData(),dates=loadDates(),hist=loadHistory();
    if(data[editingRoom]){data[newNum]=data[editingRoom];delete data[editingRoom];saveData(data);}
    if(dates[editingRoom]){dates[newNum]=dates[editingRoom];delete dates[editingRoom];saveDates(dates);}
    if(hist[editingRoom]){hist[newNum]=hist[editingRoom];delete hist[editingRoom];saveHistory(hist);}
  }
  zoneRooms[idx]={num:newNum,label:newLabel,toilet:toilet,shower:shower,sink:sink};
  rooms[curLevel][editingZone]=zoneRooms;
  saveRooms(rooms);
  closeModal('edit-room-modal');
  renderZones();updateCycleBanner();
  showToast('Room updated ✓');
}

function deleteRoom(){
  if(!confirm('Delete '+editingRoom+'? This will also remove all inspection data for this room.'))return;
  var rooms=loadRooms();
  rooms[curLevel][editingZone]=(rooms[curLevel][editingZone]||[]).filter(function(r){return r.num!==editingRoom;});
  saveRooms(rooms);
  // Clean up data
  var data=loadData();delete data[editingRoom];saveData(data);
  var dates=loadDates();delete dates[editingRoom];saveDates(dates);
  var hist=loadHistory();delete hist[editingRoom];saveHistory(hist);
  closeModal('edit-room-modal');
  if(curRoom===editingRoom)closeRoom();
  renderZones();updateCycleBanner();
  showToast('Room deleted');
}

// ═══ PRINT ═══════════════════════════════════════════════════════════
function printYearSummary(){
  // Use fresh data from Supabase if possible, fallback to localStorage
  var data=loadData(),rooms=loadRooms(),levelRooms=rooms[curLevel]||{};
  var dates=loadDates(),checks=loadChecks();
  var earliest=null;
  var allRooms=[];
  Object.values(levelRooms).forEach(function(z){allRooms=allRooms.concat(z);});
  allRooms.forEach(function(r){var d=dates[r.num];if(d&&(!earliest||d<earliest))earliest=d;});
  var yearLabel=earliest?cycleLabel(earliest):'Current Cycle';

  var html='<div class="print-year">MHAC Room Inspection Report &mdash; Level '+curLevel+'</div>';
  html+='<div style="font-size:13px;color:#444;margin-bottom:4px">'+yearLabel+'</div>';
  html+='<div style="font-size:11px;color:#666;margin-bottom:16px">Printed: '+new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'})+'</div>';

  var hasAny=false;

  // Group by zone
  Object.keys(levelRooms).forEach(function(zone){
    var zoneRooms=levelRooms[zone]||[];
    var zoneHtml='';
    zoneRooms.forEach(function(r){
      var d=data[r.num];if(!d)return;
      var roomHtml='';
      ['electrical','plumbing','building'].forEach(function(cat){
        var catData=d[cat]||{};
        var notes=catData.notes||{};
        var extras=catData.extras||{};
        Object.entries(notes).forEach(function(kv){
          if(!kv[1]||!kv[1].trim())return;
          var cn='';
          (checks[cat]||[]).forEach(function(c){if(c.id===kv[0])cn=c.name;});
          roomHtml+='<div class="print-issue">&#9679; <strong>['+cat.charAt(0).toUpperCase()+cat.slice(1)+']</strong> '+cn+': '+kv[1]+'</div>';
        });
        // Also include leak notes
        Object.keys(extras).forEach(function(k){
          if(k.endsWith('_leakdesc')&&extras[k]&&extras[k].trim()){
            roomHtml+='<div class="print-issue">&#9679; <strong>[Plumbing]</strong> Leak: '+extras[k]+'</div>';
          }
        });
      });
      if(roomHtml){
        hasAny=true;
        zoneHtml+='<div class="print-room">';
        zoneHtml+='<div class="print-room-title">'+r.num+(r.label?' &mdash; '+r.label:'')+'</div>';
        zoneHtml+=roomHtml;
        zoneHtml+='</div>';
      }
    });
    if(zoneHtml){
      html+='<div style="font-size:12px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#888;margin:16px 0 6px;border-bottom:1px solid #ddd;padding-bottom:4px">'+zone+'</div>';
      html+=zoneHtml;
    }
  });

  if(!hasAny){
    html+='<p style="color:#888;margin-top:16px">No issues recorded on Level '+curLevel+' for this cycle.</p>';
  }

  document.getElementById('print-summary').innerHTML=html;
  window.print();
}

// ═══ HELPERS ═════════════════════════════════════════════════════════
function closeModal(id){document.getElementById(id).classList.remove('active');}
function fmtDate(d){if(!d)return'—';var p=d.split('-');return parseInt(p[2])+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[1])-1]+' '+p[0];}
function updateStatus(){var data=loadData(),rooms=loadRooms(),levelRooms=rooms[curLevel]||{},total=0,done=0,issues=0;Object.values(levelRooms).forEach(function(z){z.forEach(function(r){total++;if(roomHasIssues(r.num,data))issues++;else if(roomIsInspected(r.num,data))done++;});});document.getElementById('status-lbl').textContent='· Level '+curLevel+' · '+total+' rooms · '+done+' done'+(issues?' · '+issues+' with issues':'');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ═══ CLOUD INIT ══════════════════════════════════════════════════════
(function(){
  // Only fetch the keys needed for this level/zone — not maps
  var KEYS=[ROOMS_KEY,CHECKS_KEY,DATA_KEY,HISTORY_KEY,TEMPS_KEY,DATES_KEY,ARCHIVE_KEY,PINS_KEY];
  // Also fetch map for current level into memory cache
  var mapKey='mhac-ri-map-'+(curLevel+(filterZone?'-'+filterZone.replace(/[^a-zA-Z0-9]/g,'-'):''));
  var done=false;
  function finish(){
    if(done)return; done=true;
    document.getElementById('cloud-overlay').style.display='none';
    try{
      var s=JSON.parse(sessionStorage.getItem('mhac-session'));
      if(s&&s.role){
        currentRole=s.role;isAdmin=(s.role==='admin');
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='block';
        if(isAdmin){document.getElementById('role-badge').style.display='inline';document.querySelectorAll('.admin-only').forEach(function(el){el.style.display='';});
        var uz=document.getElementById('map-upload-zone');if(uz)uz.style.display='flex';}
        if(filterZone){var zb=document.getElementById('zone-filter-badge');if(zb){zb.textContent=filterZone;zb.style.display='inline';}}
        initApp();

      } else {
        document.getElementById('login-screen').style.display='flex';
      }
    }catch(e){document.getElementById('login-screen').style.display='flex';}
  }
  // Hard fallback — show UI after 4s no matter what
  setTimeout(finish, 4000);
  // Fetch all keys in parallel
  // Fetch data keys into localStorage, map into memory cache
  Promise.all(KEYS.map(function(k){
    return sbGet(k).then(function(v){
      if(v!==null)localStorage.setItem(k,JSON.stringify(v));
    }).catch(function(){});
  })).then(function(){
    // Fetch map separately into memory
    sbGet(mapKey).then(function(v){
      if(v!==null)_mapCache[zoneKey()]=v;
    }).catch(function(){}).then(finish);
  }).catch(finish);
})();
</script>
